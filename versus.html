<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta property="og:type" content="website" /><meta property="og:locale" content="ko_KR" />

<meta property="og:description" content="코드 공유로 가족과 실시간 2인 탁구 대결. 먼저 7점이면 승리." />

<meta property="og:image:width" content="1200" /><meta property="og:image:height" content="630" />

<style>
  html, body {
    margin: 0;
    min-height: 100%;
    background: #0d1117;
    color: #e6edf3;
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding: 16px;
    box-sizing: border-box;
    /* 1인용과 동일: 캔버스 밖 드래그로 화면이 패닝/바운스되지 않게 */
    overscroll-behavior: none;
    touch-action: none;
  }
  h1 {
    font-weight: 600;
    font-size: clamp(15px, 5vw, 19px);
    margin: 0 0 10px;
    letter-spacing: 1px;
    text-align: center;
  }
  #conn {
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 8px;
    min-height: 16px;
    text-align: center;
  }
  #conn .ok { color: #3fb950; }
  #conn .bad { color: #f85149; }
  #stage { position: relative; }
  #game {
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    touch-action: none;
    cursor: none;
    display: block;
    width: auto;
    height: auto;
    max-width: 94vw;
    max-height: calc(100vh - 210px);
    max-height: calc(100dvh - 210px);
  }
  /* 화면 위에 겹치는 패널(메뉴/로비/결과) 공통 */
  .panel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(13, 17, 23, 0.9);
    border-radius: 8px;
    cursor: default;
    padding: 16px;
    box-sizing: border-box;
    text-align: center;
  }
  .panel.hidden { display: none; }
  .panel h2 { font-size: clamp(20px, 6vw, 28px); font-weight: 700; margin: 0; }
  .panel .sub { font-size: 14px; color: #8b949e; margin-top: -6px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button.btn {
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #21262d;
    color: #e6edf3;
    padding: 11px 22px;
    font-size: 15px;
    transition: filter 0.1s;
  }
  button.btn:hover { filter: brightness(1.25); }
  button.primary { background: #238636; border-color: #238636; font-weight: 600; }
  button.host { background: #1f6feb; border-color: #1f6feb; font-weight: 600; }
  #codeInput {
    font-family: inherit;
    font-size: 22px;
    letter-spacing: 6px;
    text-align: center;
    text-transform: uppercase;
    width: 160px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
  }
  /* 로비에서 보여줄 큰 방 코드 */
  #roomCode {
    font-size: clamp(36px, 12vw, 56px);
    font-weight: 800;
    letter-spacing: 10px;
    color: #f2cc60;
    margin: 4px 0;
  }
  .err { color: #f85149; font-size: 13px; min-height: 16px; }
  #hint {
    margin-top: 12px;
    font-size: 13px;
    color: #8b949e;
    text-align: center;
    line-height: 1.6;
  }
  kbd {
    background: #21262d; border: 1px solid #30363d; border-radius: 4px;
    padding: 1px 6px; font-size: 12px;
  }
  a { color: #58a6ff; }
</style>
</head>
<body>
  <h1>🏓 탁구 2인 온라인 대전</h1>
  <div id="conn">서버 연결 중…</div>

  <div id="stage">
    <canvas id="game" width="800" height="500"></canvas>

    <!-- 메뉴: 방 만들기 / 입장 -->
    <div id="menu" class="panel">
      <h2>온라인 대전</h2>
      <div class="sub">방을 만들어 코드를 공유하거나, 받은 코드로 입장하세요</div>
      <div class="row">
        <button id="createBtn" class="btn host">방 만들기</button>
      </div>
      <div class="row">
        <input id="codeInput" maxlength="4" placeholder="코드" autocomplete="off" />
        <button id="joinBtn" class="btn primary">입장하기</button>
      </div>
      <div id="menuErr" class="err"></div>
    </div>

    <!-- 로비: 상대 대기 -->
    <div id="lobby" class="panel hidden">
      <h2 id="lobbyTitle">상대를 기다리는 중…</h2>
      <div id="lobbyCodeWrap">
        <div class="sub">이 코드를 상대에게 알려주세요</div>
        <div id="roomCode">----</div>
        <button id="copyBtn" class="btn">코드 복사</button>
      </div>
      <button id="cancelBtn" class="btn">취소</button>
    </div>

    <!-- 결과 -->
    <div id="over" class="panel hidden">
      <h2 id="overTitle">🎉 승리!</h2>
      <div class="sub" id="overSub"></div>
      <button id="againBtn" class="btn primary">다시 하기</button>
    </div>
  </div>

  <div id="hint">
    마우스·터치·<kbd>↑</kbd> <kbd>↓</kbd>로 내 패들 이동 ·
    공을 받을수록 게이지가 차고 가득 차면 <b style="color:#f2cc60">자동 스매시 ⚡</b><br />
    먼저 <b>7점</b> 내면 승리 · <a href="./pong.html">1인용 탁구</a> · <a href="./index.html">🎲 메인</a>
  </div>

<script>
(() => {
  "use strict";

  // ===== 서버 주소 =====
  // 우선순위: ?server= 쿼리 > 로컬개발(localhost/file) 자동 > 운영(Render) 주소.
  // ▼▼▼ Render 배포 후 아래 wss 주소를 실제 서비스 주소로 교체하세요 ▼▼▼
  const RENDER_URL = "wss://pingpong-server-hgl2.onrender.com";
  const override = new URLSearchParams(location.search).get("server");
  const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname) || location.protocol === "file:";
  const SERVER_URL = override || (isLocal ? "ws://localhost:8080" : RENDER_URL);

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;   // 800
  const H = canvas.height;  // 500

  // ===== 게임 설정값 (1인용과 동일 감각) =====
  const PADDLE_W = 12;
  const PADDLE_H = 90;
  const PADDLE_MARGIN = 24;
  const PLAYER_SPEED = 9;
  const BALL_SPEED_UP = 1.04;
  const BALL_SPEED_MAX = 14;
  const SMASH_MULTIPLIER = 1.9;
  const SMASH_SPEED_MAX = 22;
  const SMASH_GAUGE_MAX = 3;
  const WIN_SCORE = 7;
  const BALL_SPEED_START = 6;
  const RAMP_PER_SECOND = 0.05;
  const RAMP_MAX = 1.8;

  // ===== 네트워크 상태 =====
  let ws = null;
  let role = null;            // 'host' | 'guest'
  let mySide = null;          // 'L'(host) | 'R'(guest)
  let connected = false;

  // ===== 앱 화면 상태 =====
  const SCREEN = { CONNECTING: "connecting", MENU: "menu", LOBBY: "lobby", PLAYING: "playing", OVER: "over" };
  let screen = SCREEN.CONNECTING;

  // ===== 게임 상태(호스트가 권한, 게스트는 스냅샷 수신) =====
  const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: 8, smash: false };
  const left  = { y: H / 2 - PADDLE_H / 2, score: 0, gauge: 0 };
  const right = { y: H / 2 - PADDLE_H / 2, score: 0, gauge: 0 };
  let rally = 0, rallyTimer = 0, speedScale = 1;
  let winSide = "";  // 'L' | 'R' | ''

  // 내 패들 입력(이 클라이언트가 조작하는 패들의 top y)
  let myInputY = H / 2 - PADDLE_H / 2;
  const keys = { up: false, down: false };

  // 게스트가 받은 최신 스냅샷(렌더용)
  let snap = null;
  // 게스트 렌더 보간용(지터 완화)
  let rbx = W / 2, rby = H / 2, rLy = left.y;
  // 호스트가 받은 게스트 패들 위치
  let guestInputY = H / 2 - PADDLE_H / 2;
  // 게스트 사운드용 직전 상태(변화 감지)
  let prevSm = false, prevSL = 0, prevSR = 0;

  // 시각 효과(양쪽 로컬에서 처리 — 동기화 불필요)
  let shake = 0;
  const trail = [];
  const particles = [];

  // ===== 사운드 =====
  let audioCtx = null, muted = false;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { audioCtx = null; } }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function beep(freq, dur, type = "square", vol = 0.15) {
    if (muted || !audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }
  const sfx = {
    hit: () => beep(440, 0.06), wall: () => beep(300, 0.05),
    smash: () => beep(660, 0.12, "sawtooth", 0.2), score: () => beep(200, 0.25, "triangle", 0.2),
    win: () => { beep(523, 0.15); setTimeout(() => beep(784, 0.3), 150); },
  };

  // ===== 헬퍼 =====
  const randRange = (a, b) => Math.random() * (b - a) + a;
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = randRange(0, Math.PI * 2), sp = randRange(1, 5);
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color });
    }
  }

  // ===== 화면 전환 =====
  const elMenu = document.getElementById("menu");
  const elLobby = document.getElementById("lobby");
  const elOver = document.getElementById("over");
  const elConn = document.getElementById("conn");
  function setScreen(s) {
    screen = s;
    elMenu.classList.toggle("hidden", s !== SCREEN.MENU);
    elLobby.classList.toggle("hidden", s !== SCREEN.LOBBY);
    elOver.classList.toggle("hidden", s !== SCREEN.OVER);
    canvas.style.cursor = (s === SCREEN.PLAYING) ? "none" : "default";
  }

  // ===== WebSocket 연결 =====
  function connect() {
    elConn.innerHTML = "서버 연결 중… <span style='color:#8b949e'>(무료 서버는 첫 접속에 30~60초 걸릴 수 있어요)</span>";
    try { ws = new WebSocket(SERVER_URL); }
    catch (e) { elConn.innerHTML = "<span class='bad'>서버 주소 오류</span>"; return; }

    ws.addEventListener("open", () => {
      connected = true;
      elConn.innerHTML = "<span class='ok'>● 서버 연결됨</span>";
      setScreen(SCREEN.MENU);
    });
    ws.addEventListener("close", () => {
      connected = false;
      elConn.innerHTML = "<span class='bad'>● 서버 연결 끊김</span> — 새로고침하세요";
      if (screen === SCREEN.PLAYING || screen === SCREEN.LOBBY) showMenuWithError("서버 연결이 끊겼습니다.");
    });
    ws.addEventListener("error", () => {
      elConn.innerHTML = "<span class='bad'>● 서버에 연결할 수 없습니다</span> (주소/서버 상태 확인)";
    });
    ws.addEventListener("message", (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      onMessage(m);
    });
  }

  function showMenuWithError(text) {
    document.getElementById("menuErr").textContent = text || "";
    setScreen(SCREEN.MENU);
  }

  function onMessage(m) {
    switch (m.type) {
      case "created":
        role = "host"; mySide = "L";
        document.getElementById("roomCode").textContent = m.code;
        document.getElementById("lobbyTitle").textContent = "상대를 기다리는 중…";
        document.getElementById("lobbyCodeWrap").style.display = "";
        setScreen(SCREEN.LOBBY);
        break;
      case "joined":
        role = "guest"; mySide = "R";
        document.getElementById("lobbyTitle").textContent = "입장 완료! 시작 대기 중…";
        document.getElementById("lobbyCodeWrap").style.display = "none";
        setScreen(SCREEN.LOBBY);
        break;
      case "peer-joined":
        startMatch();
        break;
      case "error":
        document.getElementById("menuErr").textContent = m.message || "오류가 발생했습니다.";
        break;
      case "peer-left":
        showMenuWithError("상대가 나갔습니다. 새 방을 만들거나 다시 입장하세요.");
        break;
      case "state":      // 게스트: 호스트 스냅샷 수신
        if (role === "guest") {
          snap = m;
          // 호스트가 재시작하면(over→play) 결과 화면을 닫고 플레이로 복귀.
          // (게스트의 스냅샷 렌더는 PLAYING에서만 도므로, 복귀 판단은 수신 시점에 해야 함)
          if (m.st === "play" && screen === SCREEN.OVER) { winSide = ""; setScreen(SCREEN.PLAYING); }
        }
        break;
      case "input":      // 호스트: 게스트 패들 위치 수신
        if (role === "host") guestInputY = m.y;
        break;
      case "restart":    // 호스트: 게스트의 재시작 요청 → 새 게임
        if (role === "host") resetMatch();
        break;
    }
  }

  function send(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

  // ===== 게임 시작/리셋 =====
  function resetBall(serveDir) {
    ball.x = W / 2; ball.y = H / 2;
    const angle = (Math.random() * 0.5 - 0.25) * Math.PI;
    ball.vx = serveDir * BALL_SPEED_START * Math.cos(angle);
    ball.vy = BALL_SPEED_START * Math.sin(angle);
    ball.smash = false;
    rally = 0; rallyTimer = 0; speedScale = 1; trail.length = 0;
  }
  function resetMatch() {
    left.score = 0; right.score = 0; left.gauge = 0; right.gauge = 0;
    left.y = right.y = H / 2 - PADDLE_H / 2;
    winSide = "";
    resetBall(Math.random() < 0.5 ? -1 : 1);
    setScreen(SCREEN.PLAYING);
  }
  function startMatch() {
    ensureAudio();
    myInputY = H / 2 - PADDLE_H / 2;
    if (role === "host") resetMatch();
    else { snap = null; setScreen(SCREEN.PLAYING); }  // 게스트는 첫 스냅샷 대기
  }

  // ===== 충돌·반사 (호스트 전용) =====
  function hitsPaddle(px, py) {
    return ball.x - ball.r < px + PADDLE_W && ball.x + ball.r > px &&
           ball.y - ball.r < py + PADDLE_H && ball.y + ball.r > py;
  }
  function bounceFrom(py, dir, isSmash, color) {
    const relative = (ball.y - (py + PADDLE_H / 2)) / (PADDLE_H / 2);
    let speed = Math.hypot(ball.vx, ball.vy) * BALL_SPEED_UP;
    if (isSmash) {
      speed = Math.min(speed * SMASH_MULTIPLIER, SMASH_SPEED_MAX);
      ball.smash = true; shake = 12; spawnParticles(ball.x, ball.y, "#f2cc60", 18); sfx.smash();
    } else {
      speed = Math.min(speed, BALL_SPEED_MAX);
      ball.smash = false; spawnParticles(ball.x, ball.y, color, 8); sfx.hit();
    }
    const bounceAngle = relative * (Math.PI / 4);
    ball.vx = dir * speed * Math.cos(bounceAngle);
    ball.vy = speed * Math.sin(bounceAngle);
    rally++;
  }

  // ===== 업데이트 =====
  function hostUpdate(dt) {
    const f = dt * 60;
    // 내 패들(왼쪽) = 입력, 상대(오른쪽) = 게스트 입력
    left.y = clampY(myInputY);
    right.y = clampY(guestInputY);

    rallyTimer += dt;
    speedScale = Math.min(RAMP_MAX, 1 + rallyTimer * RAMP_PER_SECOND);
    const moveScale = speedScale * f;

    trail.push({ x: ball.x, y: ball.y });
    if (trail.length > 12) trail.shift();
    ball.x += ball.vx * moveScale;
    ball.y += ball.vy * moveScale;

    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; sfx.wall(); }
    else if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy *= -1; sfx.wall(); }

    const leftX = PADDLE_MARGIN;
    const rightX = W - PADDLE_MARGIN - PADDLE_W;
    if (ball.vx < 0 && hitsPaddle(leftX, left.y)) {
      ball.x = leftX + PADDLE_W + ball.r;
      const ready = left.gauge >= SMASH_GAUGE_MAX;
      bounceFrom(left.y, 1, ready, "#58a6ff");
      left.gauge = ready ? 0 : left.gauge + 1;
    } else if (ball.vx > 0 && hitsPaddle(rightX, right.y)) {
      ball.x = rightX - ball.r;
      const ready = right.gauge >= SMASH_GAUGE_MAX;
      bounceFrom(right.y, -1, ready, "#f85149");
      right.gauge = ready ? 0 : right.gauge + 1;
    }

    // 득점
    if (ball.x + ball.r < 0) { right.score++; onScore(1); }
    else if (ball.x - ball.r > W) { left.score++; onScore(-1); }
  }
  function onScore(serveDir) {
    shake = 10; sfx.score();
    if (left.score >= WIN_SCORE || right.score >= WIN_SCORE) {
      winSide = left.score > right.score ? "L" : "R";
      sfx.win();
      showOver();
    } else {
      resetBall(serveDir);
    }
  }
  function clampY(y) { return Math.max(0, Math.min(H - PADDLE_H, y)); }

  function showOver() {
    const iWon = winSide === mySide;
    document.getElementById("overTitle").textContent = iWon ? "🎉 승리!" : "😢 패배";
    document.getElementById("overSub").textContent =
      `최종 점수  ${left.score} : ${right.score}  (${iWon ? "당신이 이겼습니다" : "상대가 이겼습니다"})`;
    setScreen(SCREEN.OVER);
  }

  // ===== 렌더 =====
  function drawNet() {
    ctx.strokeStyle = "#30363d"; ctx.lineWidth = 2; ctx.setLineDash([10, 14]);
    ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke(); ctx.setLineDash([]);
  }
  function render(view) {
    ctx.save();
    if (shake > 0) ctx.translate(randRange(-shake, shake) * 0.5, randRange(-shake, shake) * 0.5);
    ctx.clearRect(-20, -20, W + 40, H + 40);
    drawNet();

    // 점수
    ctx.fillStyle = "#8b949e"; ctx.textAlign = "center";
    ctx.font = "48px 'Segoe UI', sans-serif";
    ctx.fillText(view.sl, W / 2 - 60, 60);
    ctx.fillText(view.sr, W / 2 + 60, 60);

    // 스매시 게이지(좌/우)
    drawGauge(16, view.gl, "left");
    drawGauge(W - 16 - 96, view.gr, "right");

    // "나" 표시(내 패들 쪽)
    ctx.font = "12px 'Segoe UI', sans-serif"; ctx.fillStyle = "#8b949e";
    ctx.textAlign = mySide === "L" ? "left" : "right";
    ctx.fillText(mySide === "L" ? "◀ 나 (왼쪽)" : "나 (오른쪽) ▶", mySide === "L" ? 16 : W - 16, H - 14);

    // 패들
    ctx.fillStyle = "#58a6ff"; ctx.fillRect(PADDLE_MARGIN, view.ly, PADDLE_W, PADDLE_H);
    ctx.fillStyle = "#f85149"; ctx.fillRect(W - PADDLE_MARGIN - PADDLE_W, view.ry, PADDLE_W, PADDLE_H);

    // 공 잔상
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      ctx.globalAlpha = (i / trail.length) * 0.4;
      ctx.fillStyle = view.sm ? "#f2cc60" : "#e6edf3";
      ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * (i / trail.length), 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 공
    if (view.sm) { ctx.shadowColor = "#f2cc60"; ctx.shadowBlur = 20; ctx.fillStyle = "#f2cc60"; }
    else { ctx.shadowBlur = 0; ctx.fillStyle = "#e6edf3"; }
    ctx.beginPath(); ctx.arc(view.bx, view.by, ball.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // 파티클
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  function drawGauge(gx, gNorm, side) {
    const gy = 80, gw = 96, gh = 9;
    const ready = gNorm >= 1;
    ctx.fillStyle = "#21262d"; ctx.fillRect(gx, gy, gw, gh);
    ctx.fillStyle = ready ? "#f2cc60" : (side === "left" ? "#58a6ff" : "#f85149");
    ctx.fillRect(gx, gy, gw * Math.min(1, gNorm), gh);
    ctx.font = "11px 'Segoe UI', sans-serif"; ctx.textAlign = "left";
    ctx.fillStyle = ready ? "#f2cc60" : "#8b949e";
    ctx.fillText(ready ? "⚡ 스매시!" : "충전", gx, gy + gh + 12);
  }

  // ===== 효과 갱신 =====
  function updateEffects() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life -= 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shake > 0) shake = Math.max(0, shake - 0.6);
  }

  // ===== 메인 루프 =====
  let lastT = 0, lastSent = 0;
  function loop(t) {
    const dt = lastT ? Math.min((t - lastT) / 1000, 0.05) : 0;
    lastT = t;

    if (screen === SCREEN.PLAYING) {
      // 키보드 패들 이동(연속)
      if (keys.up) myInputY -= PLAYER_SPEED * (dt * 60);
      if (keys.down) myInputY += PLAYER_SPEED * (dt * 60);
      myInputY = clampY(myInputY);

      if (role === "host") {
        hostUpdate(dt);
        updateEffects();
        // 스냅샷 전송(약 40Hz로 제한해 대역폭 절약)
        if (t - lastSent > 25) {
          lastSent = t;
          send({ type: "state",
            bx: Math.round(ball.x), by: Math.round(ball.y), sm: ball.smash ? 1 : 0,
            ly: Math.round(left.y), ry: Math.round(right.y),
            sl: left.score, sr: right.score,
            gl: left.gauge / SMASH_GAUGE_MAX, gr: right.gauge / SMASH_GAUGE_MAX,
            st: winSide ? "over" : "play", win: winSide });
        }
        render({ bx: ball.x, by: ball.y, sm: ball.smash,
                 ly: left.y, ry: right.y, sl: left.score, sr: right.score,
                 gl: left.gauge / SMASH_GAUGE_MAX, gr: right.gauge / SMASH_GAUGE_MAX });
      } else {
        // 게스트: 내 입력(오른쪽 패들) 전송
        if (t - lastSent > 25) { lastSent = t; send({ type: "input", y: Math.round(myInputY) }); }
        updateEffects();
        if (snap) {
          // 사운드: 점수/스매시 변화 감지 후 재생
          if (snap.sm && !prevSm) sfx.smash();
          if (snap.sl !== prevSL || snap.sr !== prevSR) sfx.score();
          prevSm = !!snap.sm; prevSL = snap.sl; prevSR = snap.sr;

          // 공·왼쪽 패들은 보간(지터 완화), 오른쪽 패들은 내 입력 즉시 반영
          rbx += (snap.bx - rbx) * 0.5; rby += (snap.by - rby) * 0.5;
          rLy += (snap.ly - rLy) * 0.5;
          trail.push({ x: rbx, y: rby }); if (trail.length > 12) trail.shift();

          render({ bx: rbx, by: rby, sm: !!snap.sm,
                   ly: rLy, ry: myInputY, sl: snap.sl, sr: snap.sr,
                   gl: snap.gl, gr: snap.gr });

          if (snap.st === "over" && screen === SCREEN.PLAYING) {
            winSide = snap.win; left.score = snap.sl; right.score = snap.sr;
            showOver();
          }
        }
      }
    }
    requestAnimationFrame(loop);
  }

  // ===== 입력 =====
  function pointerY(clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleY = canvas.height / rect.height;
    return clampY((clientY - rect.top) * scaleY - PADDLE_H / 2);
  }
  window.addEventListener("mousemove", (e) => { if (screen === SCREEN.PLAYING) myInputY = pointerY(e.clientY); });
  window.addEventListener("touchmove", (e) => {
    if (screen !== SCREEN.PLAYING) return;
    myInputY = pointerY(e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });
  document.addEventListener("keydown", (e) => {
    if (e.code === "ArrowUp") { keys.up = true; e.preventDefault(); }
    if (e.code === "ArrowDown") { keys.down = true; e.preventDefault(); }
    if (e.code === "KeyM") muted = !muted;
  });
  document.addEventListener("keyup", (e) => {
    if (e.code === "ArrowUp") keys.up = false;
    if (e.code === "ArrowDown") keys.down = false;
  });

  // ===== 버튼 =====
  document.getElementById("createBtn").addEventListener("click", () => {
    ensureAudio(); document.getElementById("menuErr").textContent = ""; send({ type: "create" });
  });
  document.getElementById("joinBtn").addEventListener("click", () => {
    ensureAudio();
    const code = document.getElementById("codeInput").value.trim().toUpperCase();
    if (code.length !== 4) { document.getElementById("menuErr").textContent = "4자리 코드를 입력하세요."; return; }
    document.getElementById("menuErr").textContent = "";
    send({ type: "join", code });
  });
  document.getElementById("codeInput").addEventListener("keydown", (e) => {
    if (e.code === "Enter") document.getElementById("joinBtn").click();
  });
  document.getElementById("copyBtn").addEventListener("click", () => {
    const code = document.getElementById("roomCode").textContent;
    navigator.clipboard?.writeText(code).then(() => {
      const b = document.getElementById("copyBtn"); const old = b.textContent;
      b.textContent = "복사됨!"; setTimeout(() => (b.textContent = old), 1200);
    }).catch(() => {});
  });
  document.getElementById("cancelBtn").addEventListener("click", () => {
    // 방을 떠나려면 소켓을 닫고 재연결(서버가 close로 방을 정리)
    if (ws) { try { ws.close(); } catch {} }
    role = null; mySide = null;
    connect();
  });
  document.getElementById("againBtn").addEventListener("click", () => {
    if (role === "host") resetMatch();
    else send({ type: "restart" });  // 게스트는 호스트에게 재시작 요청
  });

  // ===== 진단 훅 (?debug 일 때만 노출, 평소엔 비활성) =====
  if (location.search.includes("debug")) {
    window.__dbg = () => ({
      screen, role, sl: left.score, sr: right.score,
      bx: Math.round(ball.x), by: Math.round(ball.y),
      vx: +ball.vx.toFixed(2), vy: +ball.vy.toFixed(2),
      ly: Math.round(left.y), ry: Math.round(right.y),
    });
  }

  // ===== 시작 =====
  setScreen(SCREEN.CONNECTING);
  connect();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
