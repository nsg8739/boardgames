<!DOCTYPE html>
<html lang="ko">
<head>

<style>
  :root {
    --bg: #17110a; --card: rgba(26, 19, 11, 0.94); --warm-bg: #241a0e; --warm-bg2: #2e2211;
    --warm-border: #3a2c15; --gold: #c9a227; --gold-bright: #e6c04a; --gold-soft: #f2cc60; --gold-deep: #6b5417;
    --parchment: #e9dcc0; --muted: #9c8a63; --ink: #201607;
    --serif: "Georgia", "Nanum Myeongjo", serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; width: 100%; background: var(--bg); color: var(--parchment); font-family: "Segoe UI", "Malgun Gothic", sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; padding: 14px 12px 40px; }
  .wrap { width: 100%; max-width: 500px; }
  #conn { position: fixed; top: 8px; right: 10px; z-index: 20; font-size: 11px; color: var(--muted); background: rgba(13,10,5,0.72); border: 1px solid var(--warm-border); border-radius: 999px; padding: 4px 10px; max-width: 62vw; text-align: right; }
  #conn .ok { color: #7fd18f; } #conn .bad { color: #e08a7a; }
  .top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .home { text-decoration: none; color: var(--gold-bright); font-size: 13px; font-weight: 700; } .home:hover { color: var(--gold-soft); }
  h1 { font-family: var(--serif); font-size: clamp(19px, 5.5vw, 24px); font-weight: 800; margin: 0; color: var(--gold-bright); text-align: center; letter-spacing: .5px; flex: 1; }
  .panel { background: var(--card); border: 1px solid var(--warm-border); border-radius: 12px; padding: 18px 16px; margin-top: 6px; display: flex; flex-direction: column; gap: 14px; }
  .rules { font-size: 12px; color: var(--muted); line-height: 1.6; text-align: center; }
  .optRow { display: flex; flex-direction: column; gap: 6px; }
  .optLabel { font-size: 13px; color: var(--parchment); font-weight: 700; }
  .seg { display: flex; width: 100%; border: 1px solid var(--warm-border); border-radius: 8px; overflow: hidden; }
  .seg button { flex: 1; min-width: 0; font-family: var(--serif); cursor: pointer; border: none; background: linear-gradient(180deg, var(--warm-bg2), var(--warm-bg)); color: var(--muted); padding: 11px 4px; font-size: 14px; border-right: 1px solid var(--warm-border); white-space: nowrap; }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep)); color: var(--ink); font-weight: 800; }
  .cta { width: 100%; font-family: var(--serif); cursor: pointer; border: 1px solid #7b2419; border-radius: 9px; background: linear-gradient(180deg, #b5442f, #7b2419); color: #fff; font-weight: 800; font-size: 16px; padding: 13px 0; }
  .cta:hover { filter: brightness(1.08); }
  .orDivider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; letter-spacing: 2px; }
  .orDivider::before, .orDivider::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-deep), transparent); }
  #onlineBox { display: flex; flex-direction: column; gap: 12px; }
  .nick { width: 100%; font-family: var(--serif); font-size: 15px; text-align: center; padding: 11px; border-radius: 8px; border: 1px solid var(--warm-border); background: #0d0b05; color: var(--gold-bright); }
  .joinGroup { display: flex; }
  .joinGroup input { flex: 1; min-width: 0; font-family: var(--serif); font-size: 20px; letter-spacing: 6px; text-align: center; text-transform: uppercase; padding: 12px; border-radius: 8px 0 0 8px; border: 1px solid var(--warm-border); border-right: none; background: #0d0b05; color: var(--gold-bright); }
  .cta2 { flex: none; font-family: var(--serif); cursor: pointer; border: 1.5px solid var(--gold); border-radius: 0 8px 8px 0; background: rgba(201,162,39,0.12); color: var(--gold-bright); font-weight: 700; padding: 0 18px; }
  .btn { font-family: var(--serif); cursor: pointer; border: 1px solid var(--warm-border); border-radius: 8px; background: linear-gradient(180deg, var(--warm-bg2), var(--warm-bg)); color: var(--parchment); padding: 11px 18px; font-size: 15px; }
  .menuErr { color: #e08a7a; font-size: 13px; text-align: center; min-height: 16px; }
  .menuHome { text-align: center; margin-top: 4px; } .menuHome a { color: var(--gold-bright); font-size: 13px; font-weight: 700; text-decoration: none; }

  #lobby { text-align: center; }
  #roomCode { font-family: var(--serif); font-size: clamp(34px, 12vw, 52px); font-weight: 800; letter-spacing: 10px; color: var(--gold-soft); margin: 4px 0; text-shadow: 0 2px 3px #000; }
  #lobbyTitle { font-family: var(--serif); font-size: 18px; color: var(--gold-bright); margin: 8px 0; }
  #rosterInfo { color: var(--muted); font-size: 13px; }
  .hint { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .gameMeta { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 10px; border: 1px solid rgba(201,162,39,0.35); border-radius: 8px; background: rgba(13,10,5,0.46); font-family: var(--serif); font-size: 13px; margin-bottom: 8px; }
  .gameMeta b { color: var(--gold-bright); font-weight: 800; }
  #gameCodeWrap { cursor: pointer; white-space: nowrap; font-size: 12px; }

  .path { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; min-height: 52px; padding: 8px; background: rgba(13,10,5,0.4); border: 1px solid var(--warm-border); border-radius: 8px; margin-bottom: 6px; }
  .pcard { min-width: 40px; height: 48px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 800; font-size: 18px; }
  .pcard.tr { background: linear-gradient(180deg,#f3e6c6,#e2cf9f); color: #4a2f14; }
  .pcard.hz { background: #3a1b16; color: #f0a; border: 1px solid #7a2418; font-size: 22px; }
  .pathgems { text-align: center; font-size: 14px; color: var(--gold-soft); font-weight: 700; margin-bottom: 8px; }
  #eventLog { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5; min-height: 30px; margin-bottom: 6px; }
  #eventLog div:last-child { color: var(--parchment); }

  .players { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .prow { display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--warm-border); border-radius: 8px; padding: 6px 10px; font-size: 13px; }

  .prow.out { opacity: 0.5; }
  .prow .pn { font-weight: 700; color: var(--gold-bright); }
  .prow .pg { color: var(--parchment); }
  .prow .badge { font-size: 11px; padding: 2px 6px; border-radius: 6px; }
  .prow .din { background: rgba(126,209,143,0.2); color: #7fd18f; }

  .decideBtns { display: flex; gap: 10px; justify-content: center; margin-top: 6px; }
  .decideBtns button { flex: 1; max-width: 180px; font-family: var(--serif); font-size: 16px; font-weight: 800; padding: 14px 0; border-radius: 10px; cursor: pointer; }
  #goBtn { border: 1px solid #7b2419; background: linear-gradient(180deg,#b5442f,#7b2419); color: #fff; }
  #leaveBtn { border: 1px solid var(--gold-deep); background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep)); color: var(--ink); }
  .backHome { text-align: center; margin-top: 14px; } .backHome a { color: var(--gold-bright); font-size: 13px; font-weight: 700; text-decoration: none; }

  #over { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 18px; background: rgba(8,5,2,0.72); }
  #over.hidden { display: none; }
  .overCard { width: min(360px, 100%); background: var(--card); border: 2px solid var(--warm-border); border-radius: 12px; padding: 22px; text-align: center; box-shadow: 0 16px 44px rgba(0,0,0,0.7); }
  .overCard h2 { font-family: var(--serif); font-size: 24px; margin: 0 0 10px; color: var(--gold-bright); }
  #scoreTable { font-size: 14px; margin-bottom: 14px; }
  #scoreTable .sr { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid rgba(201,162,39,0.15); }
  #scoreTable .sr.win { color: var(--gold-soft); font-weight: 800; }
  .overCard button { width: 100%; font-family: var(--serif); font-size: 16px; font-weight: 800; padding: 13px 0; border-radius: 9px; cursor: pointer; border: 1px solid var(--gold-deep); background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-deep)); color: var(--ink); }
  .hidden { display: none !important; }

  #chatToggle { position: fixed; left: 10px; bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 45; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--warm-border); background: rgba(26,19,11,0.9); color: #f2cc60; font-size: 18px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.5); opacity: .55; transition: opacity .15s; }
  #chatToggle:hover, #chatToggle:focus { opacity: 1; }
  #chatBadge { position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; border-radius: 9px; background: #a6402f; color: #fff; font-size: 11px; line-height: 18px; padding: 0 4px; }
  #chatPanel { position: fixed; left: 12px; bottom: calc(70px + env(safe-area-inset-bottom)); z-index: 46; width: min(300px, calc(100vw - 24px)); background: rgba(20,14,7,0.98); border: 1px solid var(--warm-border); border-radius: 12px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 8px; }
  #chatHead { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
  #chatClose { background: rgba(166,64,47,0.85); border: 1px solid var(--warm-border); color: #fff; font-size: 12px; font-weight: 700; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  #chatFeed { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
  .cmsg { background: rgba(13,10,5,0.5); border-radius: 6px; padding: 4px 7px; line-height: 1.4; word-break: break-word; }
  .cmsg.mine { background: rgba(201,162,39,0.14); }
  .cmsg b { color: var(--gold-soft); margin-right: 5px; }
  #chatEmojis { display: flex; gap: 4px; flex-wrap: wrap; }
  .chatEmoji { font-size: 20px; border: 1px solid var(--warm-border); border-radius: 8px; background: var(--warm-bg); cursor: pointer; padding: 4px 8px; }
  #chatInputRow { display: flex; gap: 6px; }
  #chatInput { flex: 1; min-width: 0; font-size: 14px; padding: 8px; border-radius: 8px; border: 1px solid var(--warm-border); background: #0d0b05; color: var(--parchment); }
  #chatSend { font-family: var(--serif); border: 1px solid var(--gold); border-radius: 8px; background: rgba(201,162,39,0.14); color: var(--gold-bright); padding: 0 12px; cursor: pointer; }
</style>

<body>
  <div id="conn">서버 연결 중…</div>
  <div class="wrap">
    <div class="top">
      <a class="home" href="./index.html">🎲 메인</a>
      <h1>잉카의 황금</h1>
      <span style="width:44px"></span>
    </div>

    <div id="menu" class="panel">
      <div class="rules">유적을 탐험하며 보석을 나눠 갖습니다.<br>매 카드마다 <b>계속 전진</b>할지 <b>복귀</b>할지 동시에 결정!<br>같은 함정이 <b>두 번</b> 나오면 남은 탐험가는 빈손. 5번 탐험 후 최다 보석 승.</div>
      <div class="optRow">
        <span class="optLabel">인원</span>
        <div class="seg" id="segCount"><button data-v="2" class="on">2명</button><button data-v="3">3명</button><button data-v="4">4명</button></div>
      </div>
      <div class="optRow">
        <span class="optLabel">방식</span>
        <div class="seg" id="segMode"><button data-v="solo" class="on">혼자 (vs 컴퓨터)</button><button data-v="online">온라인</button></div>
      </div>
      <button id="startSoloBtn" class="cta">게임 시작</button>
      <div id="onlineBox" class="hidden">
        <input id="nickInput" class="nick" maxlength="8" placeholder="닉네임 (예: 아빠)" autocomplete="off" />
        <div class="orDivider"><span>온라인</span></div>
        <button id="createBtn" class="cta">방 만들기</button>
        <div class="joinGroup"><input id="codeInput" maxlength="4" placeholder="방 코드" autocomplete="off" /><button id="joinBtn" class="cta2">입장</button></div>
      </div>
      <div class="menuErr" id="menuErr"></div>
      <div class="menuHome"><a href="./index.html">← 다른 게임 고르기</a></div>
    </div>

    <div id="lobby" class="panel hidden">
      <div id="lobbyTitle">상대를 기다리는 중…</div>
      <div id="lobbyCodeWrap"><div class="hint">이 코드를 상대에게 알려주세요</div><div id="roomCode">----</div><button id="copyBtn" class="btn">코드 복사</button></div>
      <div id="rosterInfo"></div>
      <button id="cancelBtn" class="btn" style="margin-top:12px;">나가기</button>
    </div>

    <div id="board" class="hidden">
      <div class="gameMeta">
        <span>탐험 <b id="metaRound">1</b> / 5</span>
        <span id="gameCodeWrap" class="hidden" title="탭하면 코드 복사">CODE <b id="metaCode">----</b></span>
        <span id="metaMode">혼자</span>
      </div>
      <div class="path" id="path"></div>
      <div class="pathgems" id="pathGems">바닥 보석 0💎</div>
      <div id="eventLog"></div>
      <div class="players" id="players"></div>
      <div id="statusBar"></div>
      <div class="decideBtns" id="decideBtns">
        <button id="goBtn">⛏️ 계속 전진</button>
        <button id="leaveBtn">🏃 복귀</button>
      </div>
      <div class="backHome"><button id="toMenuBtn" style="background:none;border:none;color:var(--gold-bright);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">↩ 게임 메뉴</button> · <a href="./index.html">🎲 메인</a></div>
    </div>
  </div>

  <div id="over" class="hidden">
    <div class="overCard">
      <h2 id="overTitle">탐험 종료</h2>
      <div id="scoreTable"></div>
      <button id="againBtn">다시 하기</button>
      <button id="otherGameBtn" class="hidden" style="margin-top:8px;background:linear-gradient(180deg,var(--warm-bg2),var(--warm-bg));border:1px solid var(--warm-border);color:var(--parchment);">🔀 다른 게임</button>
      <div id="gamePicker" class="hidden" style="display:flex;flex-direction:column;gap:8px;margin-top:8px;"></div>
    </div>
  </div>

  <button id="chatToggle" class="hidden" title="채팅">💬<span id="chatBadge" class="hidden"></span></button>
  <div id="chatPanel" class="hidden">
    <div id="chatHead"><span>채팅</span><button id="chatClose" title="닫기">✕ 닫기</button></div>
    <div id="chatFeed"></div>
    <div id="chatEmojis"></div>
    <div id="chatInputRow"><input id="chatInput" maxlength="60" placeholder="메시지…" autocomplete="off" /><button id="chatSend">보내기</button></div>
  </div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const RENDER_URL = "wss://pingpong-server-hgl2.onrender.com";
  const override = new URLSearchParams(location.search).get("server");
  const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname) || location.protocol === "file:";
  const SERVER_URL = override || (isLocal ? "ws://localhost:8080" : RENDER_URL);

  const HAZ = ["🐍", "🕷️", "🧟", "🔥", "🪨"];
  const HAZ_KR = ["뱀", "거미", "미라", "불", "돌"];
  const TREASURES = [1, 2, 3, 4, 5, 5, 7, 7, 9, 11, 11, 13, 14, 15, 17];
  const ROUNDS = 5;
  const SCREEN = { MENU: "menu", LOBBY: "lobby", PLAYING: "playing", OVER: "over" };
  let screen = SCREEN.MENU;
  let ws = null, myIndex = null, isHost = false, myCode = null, myToken = null;
  let optCount = 2, optMode = "solo", onlineMode = false;
  let soloMode = false, aiTimer = null;
  let G = null, lastView = null;
  let myNick = ""; try { myNick = (localStorage.getItem("bg_nick") || "").trim().slice(0, 8); } catch (e) {}
  let hostNames = {};
  let handoffMode = false, handoffCap = 0, intentionalNav = false;
  const missingPeers = new Set();

  const SESS_KEY = "incan_session", STATE_KEY = "incan_state", REJOIN_WINDOW_MS = 300000;
  function saveSession() { try { localStorage.setItem(SESS_KEY, JSON.stringify({ code: myCode, index: myIndex, token: myToken, isHost, ts: Date.now() })); } catch {} }
  function touchSession() { try { const s = JSON.parse(localStorage.getItem(SESS_KEY) || "null"); if (s) { s.ts = Date.now(); localStorage.setItem(SESS_KEY, JSON.stringify(s)); } } catch {} }
  function getSession() { try { return JSON.parse(localStorage.getItem(SESS_KEY) || "null"); } catch { return null; } }
  function sessionFresh(s) { return !!(s && s.ts && Date.now() - s.ts < REJOIN_WINDOW_MS); }
  function clearSession() { try { localStorage.removeItem(SESS_KEY); localStorage.removeItem(STATE_KEY); localStorage.removeItem(STATE_KEY + "_n"); } catch {} }
  function saveState() { if (isHost && G) { try { localStorage.setItem(STATE_KEY, JSON.stringify(G)); localStorage.setItem(STATE_KEY + "_n", JSON.stringify(hostNames)); } catch {} } }
  function loadState() { try { return JSON.parse(localStorage.getItem(STATE_KEY) || "null"); } catch { return null; } }
  function restoreConn() { $("conn").innerHTML = "<span class='ok'>● 서버 연결됨</span>"; }

  // ===== 엔진 =====
  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
  function buildDeck() { const d = TREASURES.map((v) => ({ t: "tr", v })); for (let h = 0; h < 5; h++) for (let k = 0; k < 3; k++) d.push({ t: "hz", h }); return d; }
  function inCount() { return G.inTemple.filter(Boolean).length; }
  function log(msg) { G.log.push(msg); if (G.log.length > 20) G.log.shift(); }
  function newGame(count) {
    G = { count, round: 1, phase: "decide", deck: buildDeck(), roundDeck: [], path: [], seenHaz: {}, pathGems: 0,
      inTemple: new Array(count).fill(true), roundGems: new Array(count).fill(0), banked: new Array(count).fill(0),
      decisions: new Array(count).fill(null), log: [], winner: null };
    startRound();
  }
  function startRound() {
    G.roundDeck = shuffle(G.deck.slice());
    G.path = []; G.seenHaz = {}; G.pathGems = 0;
    G.inTemple = new Array(G.count).fill(true);
    G.roundGems = new Array(G.count).fill(0);
    G.decisions = new Array(G.count).fill(null);
    log(`── ${G.round}번째 탐험 시작 ──`);
    revealNext();
  }
  function revealNext() {
    if (G.roundDeck.length === 0) { endRound(false); return; }
    const c = G.roundDeck.pop(); G.path.push(c);
    if (c.t === "tr") {
      const n = inCount(); const share = n > 0 ? Math.floor(c.v / n) : 0;
      if (n > 0) { for (let i = 0; i < G.count; i++) if (G.inTemple[i]) G.roundGems[i] += share; G.pathGems += c.v - share * n; }
      else G.pathGems += c.v;
      log(`💎 보물 ${c.v} — 탐험가 각자 +${share} (바닥에 ${c.v - share * n})`);
      G.decisions = new Array(G.count).fill(null); G.phase = "decide";
    } else {
      if (G.seenHaz[c.h]) {
        log(`${HAZ[c.h]} ${HAZ_KR[c.h]} 두 번째 등장! 남은 탐험가 전멸 — 소득 상실`);
        const idx = G.deck.findIndex((x) => x.t === "hz" && x.h === c.h); if (idx >= 0) G.deck.splice(idx, 1);
        endRound(true);

    { key: "setgame",    file: "setgame.html",    label: "🔺 세트",       min: 2, max: 4 },
    { key: "incan",      file: "incangold.html",  label: "💎 잉카의 황금", min: 2, max: 4 },
    { key: "baseball",   file: "baseball.html",   label: "🔢 숫자야구",   min: 2, max: 2 },
    { key: "grid",       file: "gridgames.html",  label: "🔷 격자 대전",  min: 2, max: 2 },
    { key: "battleship", file: "battleship.html", label: "🚢 배틀십",     min: 2, max: 2 },
  ];
  const ROOM_HANDOFF_MS = 90 * 1000;
  function roomCap() { return (G && G.count) || handoffCap || optCount || 2; }
  function isOnlineRoom() { return onlineMode && !!myCode && myIndex != null && myToken != null; }
  function saveRoomHandoff() { if (!isOnlineRoom()) return; try { localStorage.setItem("bg_room", JSON.stringify({ code: myCode, index: myIndex, token: myToken, cap: roomCap(), ts: Date.now() })); } catch {} }
  function getRoomHandoff() { try { const r = JSON.parse(localStorage.getItem("bg_room") || "null"); if (r && r.code && r.token != null && (Date.now() - r.ts) < ROOM_HANDOFF_MS) return r; } catch {} return null; }
  function clearRoomHandoff() { try { localStorage.removeItem("bg_room"); } catch {} }
  function handoffUrl(file) { const cur = new URLSearchParams(location.search); const q = new URLSearchParams(); q.set("room", "1"); if (cur.get("server")) q.set("server", cur.get("server")); if (cur.has("debug")) q.set("debug", cur.get("debug") || "1"); return file + "?" + q.toString(); }
  function gotoGame(key) { const g = ROOM_GAMES.find((x) => x.key === key); if (!g) return; if (missingPeers.size > 0) { toast("접속이 끊긴 사람이 있어 방을 유지할 수 없어요. 새 방을 만들어 주세요."); return; } saveRoomHandoff(); send({ type: "goto", game: key }); intentionalNav = true; setTimeout(() => { location.href = handoffUrl(g.file); }, 150); }
  function maybeStartHandoff(count) { if (!handoffMode || !isHost) return; if (count >= (handoffCap || 2)) { handoffMode = false; optCount = handoffCap || optCount; newOnlineGame(); sendNick(); } }
  function openGamePicker() {
    if (missingPeers.size > 0) { toast("접속이 끊긴 사람이 있어 방을 유지한 채 다른 게임을 시작할 수 없어요. 재접속을 기다리거나 새 방을 만들어 주세요."); return; }
    const cap = roomCap();
    const list = ROOM_GAMES.filter((g) => g.key !== THIS_GAME && cap >= g.min && cap <= g.max);
    const box = $("gamePicker"); box.innerHTML = "";
    list.forEach((g) => { const b = document.createElement("button"); b.textContent = g.label; b.style.cssText = "background:linear-gradient(180deg,var(--warm-bg2),var(--warm-bg));border:1px solid var(--warm-border);color:var(--parchment);font-weight:700;"; b.addEventListener("click", () => gotoGame(g.key)); box.appendChild(b); });
    const cancel = document.createElement("button"); cancel.textContent = "취소"; cancel.style.cssText = "background:transparent;border:1px solid var(--warm-border);color:var(--muted);"; cancel.addEventListener("click", () => { box.classList.add("hidden"); $("otherGameBtn").classList.remove("hidden"); $("againBtn").classList.remove("hidden"); });
    box.appendChild(cancel); box.classList.remove("hidden");
    $("otherGameBtn").classList.add("hidden"); $("againBtn").classList.add("hidden");
  }
  $("otherGameBtn").addEventListener("click", openGamePicker);

  setScreen(SCREEN.MENU);
  connect();

  if (location.search.includes("debug")) {
    window.__ig = () => ({ screen, soloMode, onlineMode, isHost, myIndex, myCode, G, lastView, handoffMode, intentionalNav, missing: missingPeers.size });
    window.__igact = (a) => dispatch(a);
    window.__goto = (k) => gotoGame(k);
    window.__st = () => ({ screen, isHost, myIndex, myCode, handoffMode, intentionalNav, phase: G && G.phase, round: G && G.round });
  }
})();
</script>
</body>
</html>
