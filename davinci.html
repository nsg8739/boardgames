<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>다빈치코드 — 온라인 대전 (2~4인)</title>
<meta property="og:type" content="website" /><meta property="og:locale" content="ko_KR" />
<meta property="og:site_name" content="보드게임 모음" />
<meta property="og:title" content="다빈치코드 — 온라인 추리 대전" />
<meta property="og:description" content="상대의 가려진 숫자 타일을 추리해 공개! 혼자(vs 컴퓨터)도, 온라인 2~4인도." />
<meta property="og:url" content="https://nsg8739.github.io/boardgames/davinci.html" />
<meta property="og:image" content="https://nsg8739.github.io/boardgames/og-davinci.png" />
<meta property="og:image:width" content="1200" /><meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" /><meta name="twitter:image" content="https://nsg8739.github.io/boardgames/og-davinci.png" />
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#17110a" />
<style>
  /* 앤틱(양피지·황동·인장) 팔레트 */
  :root {
    --gold: #c9a227;         /* 기본 골드(버튼/선택) */
    --gold-bright: #e6c04a;  /* 밝은 골드(강조/호버) */
    --gold-soft: #f2cc60;    /* 밝은 강조(뽑은 타일/조커) */
    --gold-deep: #8a6d1f;    /* 깊은 황동(프레임 라인) */
    --warm-bg: #2a2015;      /* 가죽/원목 버튼 바탕 */
    --warm-bg2: #35291a;     /* 밝은 원목(그라데이션 상단) */
    --warm-border: #6b5427;  /* 황동 테두리 */
    --parchment: #efe3c7;    /* 양피지 크림(본문 글자) */
    --warm-text: #efe3c7;    /* = parchment */
    --muted: #cbb78d;        /* 바랜 세피아(보조 글자, 대비 강화) */
    --seal: #a6402f;         /* 밀랍 인장 붉은색(보조 강조) */
    --ink: #201406;          /* 골드 위 짙은 잉크 글자 */
    --card: rgba(26, 19, 11, 0.94);      /* 카드 바탕(짙은 원목, 대비 위해 더 불투명) */
    --serif: Georgia, "Nanum Myeongjo", "Batang", "Times New Roman", serif;  /* 앤틱 표제 */
  }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #17110a;
    color: var(--parchment);
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    display: block;
    padding: 16px;
    box-sizing: border-box;
    overscroll-behavior: none;
    overflow-x: hidden;
    overflow-y: auto;
  }
  /* body를 뷰포트 폭으로 '확정'해, 자식의 max-content가 퍼센트 조상을 통해 body를
     shrink-to-fit로 부풀리는 flex 피드백 루프를 차단(모바일 가로 넘침 방지). */
  html { width: 100%; }
  body { width: 100%; max-width: 100%; }
  body.screen-menu {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  body.screen-playing,
  body.screen-lobby,
  body.screen-over {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  /* 게임 배경 이미지(파일명 공백은 %20). 어두운 오버레이를 얹어 전경 텍스트 가독성 확보.
     뷰포트 전체를 덮는 고정 레이어(::before)로 깔아, 창 크기·스크롤과 무관하게 항상 빈틈없이 채운다.
     (body 배경+attachment:fixed 방식은 일부 환경에서 가장자리가 안 채워지는 문제가 있어 이 방식으로.) */
  body { background: #17110a; }  /* 이미지 가장자리와 어울리는 어두운 폴백 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      linear-gradient(180deg, rgba(10, 6, 3, 0) 0%, rgba(10, 6, 3, 0.08) 52%, rgba(10, 6, 3, 0.22) 100%),
      url("DA%20VINCI%20CODE_1.png") center top / min(100vw, 1536px) auto no-repeat;
    pointer-events: none;
  }
  body > * {
    position: relative;
    z-index: 1;
  }
  h1 {
    position: absolute;
    width: 1px; height: 1px; overflow: hidden;
    clip-path: inset(50%);
    white-space: nowrap;
  }
  h1 .tagline {
    display: block; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-weight: 500;
    font-size: 11px; letter-spacing: 5px; color: var(--muted); margin-top: 6px;
  }
  /* 서버 연결 상태 — 중요도 낮음: 우측 상단 작은 배지로 고정 */
  #conn {
    position: fixed; top: 10px; right: 12px; z-index: 20;
    font-size: 11px; color: var(--muted); letter-spacing: .3px;
    background: rgba(13, 10, 5, 0.72); border: 1px solid var(--warm-border);
    border-radius: 999px; padding: 5px 11px; backdrop-filter: blur(4px);
    max-width: 62vw; text-align: right; line-height: 1.35;
  }
  #conn .ok { color: #3fb950; }
  #conn .bad { color: #f85149; }
  /* 뒤로가기 잠금 등 안내용 토스트 */
  #toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(8px);
    z-index: 60; max-width: min(90vw, 420px); text-align: center;
    background: rgba(13, 10, 5, 0.96); color: var(--parchment);
    border: 1px solid var(--gold-deep); border-radius: 999px;
    padding: 10px 18px; font-size: 13px; letter-spacing: .3px; line-height: 1.4;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* board가 숨겨져도(메뉴/로비/결과 화면) 절대배치 패널이 채울 영역을 확보.
     board의 min-height(420, border-box)와 맞춘다. 안 그러면 stage 높이가 0이 돼 패널이 겹친다. */
  /* width는 body 패딩을 제외한 실제 콘텐츠 폭(100%) 기준 — 96vw는 패딩과 합쳐져 모바일에서 가로 넘침을 유발했음 */
  #stage {
    position: relative;
    width: 100%;
    max-width: 560px;
    min-width: 0;
    min-height: 420px;
    margin: clamp(220px, 29svh, 305px) auto 0;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  body.screen-playing #stage,
  body.screen-lobby #stage,
  body.screen-over #stage {
    padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
  }

  /* 게임 보드 */
  #board {
    background: var(--card); border: 2px solid var(--warm-border); border-radius: 10px;
    padding: 18px; box-shadow: inset 0 0 0 1px rgba(230, 192, 74, 0.22), 0 10px 34px rgba(0, 0, 0, 0.6);
    min-height: 420px; box-sizing: border-box;
  }
  #board.hidden { display: none; }
  /* 범용 숨김 — chatPanel/chatToggle/otherGameBtn 등 개별 규칙이 없는 요소도 hidden으로 확실히 숨긴다 */
  .hidden { display: none !important; }
  .gameMeta {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 6px 10px;
    margin: -2px 0 10px; padding: 8px 10px; border: 1px solid rgba(201, 162, 39, 0.35);
    border-radius: 8px; background: rgba(13, 10, 5, 0.46);
    color: var(--parchment); font-family: var(--serif); font-size: 12px; letter-spacing: .4px;
  }
  .gameMeta b { color: var(--gold-bright); font-weight: 800; }
  .gameMeta .time { color: var(--gold-soft); white-space: nowrap; }
  /* 실행 중 게임 창 상단의 초대 코드(탭하면 복사) — 실수로 나가도 이 코드로 재입장 */
  #gameCodeWrap { cursor: pointer; white-space: nowrap; }
  #gameCode { letter-spacing: 2px; }
  .poolInfo { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  /* 상대 이탈 안내 배너 */
  #peerAlert {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px 12px;
    margin: 0 0 10px; padding: 8px 12px; border: 1px solid #a5562f; border-radius: 8px;
    background: rgba(165, 86, 47, 0.16); color: #f0b48e; font-size: 12.5px; text-align: center; line-height: 1.4;
  }
  #peerAlert.hidden { display: none; }
  #peerAlert button {
    flex: none; font-family: var(--serif); cursor: pointer; border: 1px solid #f0883e; border-radius: 6px;
    background: rgba(240, 136, 62, 0.18); color: #ffcda6; font-weight: 700; font-size: 12.5px; padding: 6px 12px;
  }
  #peerAlert button:hover { filter: brightness(1.15); }

  .side { margin: 8px 0; padding: 8px; border-radius: 8px; }
  .side.active { background: rgba(230, 192, 74, 0.07); box-shadow: inset 0 0 0 1px rgba(230, 192, 74, 0.4); }
  .side.eliminated { opacity: 0.45; }
  .side .label { font-size: 13px; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .side .label .turnDot { width: 9px; height: 9px; border-radius: 50%; background: #4a3d20; flex: none; }
  .side.active .label .turnDot { background: var(--gold-soft); box-shadow: 0 0 9px rgba(242, 204, 96, 0.9); }
  .side.active .label { color: var(--gold-bright); font-weight: 700; }
  .side .label .badge { font-size: 11px; color: #f85149; border: 1px solid #f85149; border-radius: 4px; padding: 0 5px; }

  .tiles { display: flex; flex-wrap: wrap; gap: 6px; min-height: 62px; align-items: flex-end; }

  .tile {
    width: 40px; height: 58px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; position: relative; border: 2px solid transparent; user-select: none;
    transition: transform 0.08s, box-shadow 0.1s; flex: none;
  }
  .tile.black { background: #0b0e14; color: #e6edf3; border-color: #4a3d20; }
  .tile.white { background: #e6edf3; color: #0d1117; border-color: #cbb26a; }
  .tile.joker.black { color: #f2cc60; }
  .tile.joker.white { color: #b8860b; }
  .tile.hidden-face .num { opacity: 0; }
  .tile.hidden-face::after { content: "?"; position: absolute; font-size: 24px; opacity: 0.6; }
  .tile.secret { border-style: dashed; }
  .tile.black.secret { border-color: var(--gold-bright); }
  .tile.white.secret { border-color: var(--gold); }
  /* 공개된(맞춰진) 타일 — 주황 실선 테두리 + 코너 표시 + 은은한 발광으로 확실히 구분 */
  .tile.up { border-style: solid; border-color: #f0883e; box-shadow: inset 0 0 12px rgba(240, 136, 62, 0.28); }
  .tile.up::after {
    content: ""; position: absolute; top: 3px; right: 3px; width: 7px; height: 7px;
    border-radius: 50%; background: #f0883e; box-shadow: 0 0 5px rgba(240, 136, 62, 0.9);
  }
  .tile.drawn { transform: translateY(-8px); box-shadow: 0 0 0 2px #f2cc60, 0 4px 12px rgba(242, 204, 96, 0.4); }
  /* NEW 배지: 배경 없는 금색 글자가 위쪽 플레이어 이름과 겹쳐 안 보이던 문제 →
     불투명 배지(어두운 배경+테두리)로 중앙 정렬하고 z-index로 항상 위에 그린다. */
  .tile.drawn::before {
    content: "NEW"; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 4;
    padding: 1px 4px; border: 1px solid #f2cc60; border-radius: 3px; background: #17110a;
    font-size: 8px; letter-spacing: .5px; line-height: 1.3; color: #f2cc60; font-weight: 800; white-space: nowrap;
  }
  .tile.guessable { cursor: pointer; }
  .tile.guessable:hover { box-shadow: 0 0 0 2px var(--gold-bright); }
  .tile.selected { box-shadow: 0 0 0 3px var(--gold-bright) !important; }
  .tile.flash-right { animation: flashRight 0.7s; }
  .tile.flash-wrong { animation: flashWrong 0.7s; }
  @keyframes flashRight { 0%,100% { box-shadow: none; } 30% { box-shadow: 0 0 0 3px #3fb950; } }
  @keyframes flashWrong { 0%,100% { box-shadow: none; } 30% { box-shadow: 0 0 0 3px #f85149; } }

  /* 조커 배치용 삽입 지점 */
  .gap { width: 14px; height: 58px; border-radius: 4px; border: 2px dashed #f2cc60; background: rgba(242,204,96,0.08); cursor: pointer; flex: none; }
  .gap:hover { background: rgba(242,204,96,0.28); }

  #status { text-align: center; font-size: 14px; margin: 14px 0 6px; min-height: 20px; line-height: 1.5; }
  #feedback { text-align: center; font-size: 13px; color: var(--muted); min-height: 18px; }

  #numpad { margin: 12px auto 0; max-width: 340px; }
  #numpad.hidden { display: none; }
  /* 손패가 많아 보드가 길어져도 숫자패드는 항상 화면 하단에 고정 노출 → 스크롤 없이 선택 가능.
     지목 대상(상대 타일)은 보드 상단이라 하단 시트에 가리지 않는다. 패드가 길면 내부 스크롤. */
  #numpad:not(.hidden) {
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    z-index: 30;
    width: min(360px, calc(100vw - 16px));
    max-width: none;
    margin: 0;
    padding: 10px 12px calc(12px + env(safe-area-inset-bottom, 0px));
    background: #1a130b;
    border: 1px solid var(--warm-border);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.62);
    max-height: 82svh;
    overflow-y: auto;
  }
  #numpad:not(.hidden) .npCancel { margin-top: 10px; }
  /* 숫자패드가 열리면 그 높이만큼 아래 여백 확보 → 패드 뒤에 가리던 보드 하단까지 스크롤로 볼 수 있게 */
  body.numpad-open #stage { padding-bottom: var(--numpad-space, 320px); }
  #numpad .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  #numpad .np { font-family: inherit; font-size: 17px; font-weight: 600; padding: 10px 0; border: 1px solid var(--warm-border); border-radius: 6px; background: var(--warm-bg); color: var(--warm-text); cursor: pointer; }
  #numpad .np:hover { filter: brightness(1.35); border-color: var(--gold); }
  #numpad .np.joker { grid-column: span 2; color: var(--gold-soft); border-color: var(--gold-soft); }
  #numpad .npCancel { margin-top: 8px; width: 100%; background: transparent; }

  #decide { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  #decide.hidden { display: none; }

  /* 패널 — 한 번에 하나만 표시되므로 절대배치 오버레이가 아니라 일반 흐름으로 두어
     stage가 내용 높이에 맞게 늘어나게 한다(내용이 길어져도 위/아래로 삐져나오지 않음). */
  .panel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 13px; background: var(--card); border: 2px solid var(--warm-border); border-radius: 10px; padding: 24px 18px; box-sizing: border-box; text-align: center; min-height: 420px; box-shadow: inset 0 0 0 1px rgba(230, 192, 74, 0.22), 0 10px 34px rgba(0, 0, 0, 0.6); }
  .panel.hidden { display: none; }
  .panel h2, .overCard h2 { font-family: var(--serif); font-size: clamp(24px, 7vw, 30px); font-weight: 800; margin: 0; color: var(--gold-bright); letter-spacing: 1.5px; text-shadow: 0 1px 0 #000, 0 0 14px rgba(230, 192, 74, 0.2); }
  .panel .sub, .overCard .sub { font-size: 14px; color: var(--parchment); margin-top: -2px; line-height: 1.55; }
  /* 채팅/이모지 */
  #chatToggle { position: fixed; left: 10px; bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 45; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--warm-border); background: rgba(26,19,11,0.9); color: #f2cc60; font-size: 18px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.5); opacity: .55; transition: opacity .15s; }
  #chatToggle:hover, #chatToggle:focus { opacity: 1; }
  #chatBadge { position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; border-radius: 9px; background: #a6402f; color: #fff; font-size: 11px; line-height: 18px; padding: 0 4px; }
  #chatPanel { position: fixed; left: 12px; bottom: calc(70px + env(safe-area-inset-bottom)); z-index: 46; width: min(300px, calc(100vw - 24px)); background: rgba(20,14,7,0.98); border: 1px solid var(--warm-border); border-radius: 12px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 8px; }
  #chatHead { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
  #chatClose { background: rgba(166,64,47,0.85); border: 1px solid var(--warm-border); color: #fff; font-size: 12px; font-weight: 700; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  #chatFeed { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
  .cmsg { background: rgba(13,10,5,0.5); border-radius: 6px; padding: 4px 7px; line-height: 1.4; word-break: break-word; }
  .cmsg.mine { background: rgba(201,162,39,0.14); }
  .cmsg b { color: var(--gold-soft); margin-right: 5px; }
  #chatEmojis { display: flex; gap: 4px; flex-wrap: wrap; }
  .chatEmoji { font-size: 20px; border: 1px solid var(--warm-border); border-radius: 8px; background: var(--warm-bg); cursor: pointer; padding: 4px 8px; }
  #chatInputRow { display: flex; gap: 6px; }
  #chatInput { flex: 1; min-width: 0; font-size: 14px; padding: 8px; border-radius: 8px; border: 1px solid var(--warm-border); background: #0d0b05; color: var(--parchment); }
  #chatSend { font-family: var(--serif); border: 1px solid var(--gold); border-radius: 8px; background: rgba(201,162,39,0.14); color: var(--gold-bright); padding: 0 12px; cursor: pointer; }
  /* 숫자패드(하단 시트)가 열리면 채팅 버튼이 겹치지 않도록 숨긴다 */
  body.numpad-open #chatToggle, body.numpad-open #chatPanel { display: none; }
  /* 채팅 패널이 열리면 아래 여백을 확보해 내 손패를 패널 위로 스크롤해 볼 수 있게 한다 */
  body.chat-open #stage { padding-bottom: 340px; }
  /* 결과(승/패)는 중앙 팝업(모달) */
  #over {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 18px;
    background: rgba(8, 5, 2, 0.74); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  #over.hidden { display: none; }
  .overCard {
    width: min(340px, 100%); max-height: calc(100svh - 36px); overflow-y: auto;
    display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;
    background: var(--card); border: 2px solid var(--warm-border); border-radius: 12px;
    padding: 24px 22px; box-shadow: inset 0 0 0 1px rgba(230, 192, 74, 0.22), 0 18px 54px rgba(0, 0, 0, 0.7);
  }
  .overCard .btn { width: 100%; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button.btn {
    font-family: var(--serif); cursor: pointer; border: 1px solid var(--warm-border); border-radius: 7px;
    background: linear-gradient(180deg, var(--warm-bg2), var(--warm-bg)); color: var(--parchment);
    padding: 11px 24px; font-size: 15px; letter-spacing: .5px;
    box-shadow: inset 0 1px 0 rgba(255, 240, 200, 0.08), 0 2px 6px rgba(0, 0, 0, 0.4);
    transition: filter .12s, transform .05s;
  }
  button.btn:hover { filter: brightness(1.18); }
  button.btn:active { transform: translateY(1px); }
  /* 주요 CTA — 황동 엠보스 */
  button.primary, button.host {
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-deep));
    border-color: var(--gold-deep); color: var(--ink); font-weight: 700; letter-spacing: 1px;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.28);
    box-shadow: inset 0 1px 0 rgba(255, 250, 220, 0.6), inset 0 -2px 5px rgba(120, 90, 20, 0.45), 0 3px 8px rgba(0, 0, 0, 0.45);
  }

  /* ===== 메뉴(런처) 레이아웃 ===== */
  .menu {
    gap: 16px;
    width: min(400px, calc(100vw - 32px));
    max-width: 100%;
    box-sizing: border-box;
    padding: 18px 36px 16px;
    min-height: 0;
    background: rgba(23, 15, 8, 0.44);
    border: 1px solid rgba(201, 162, 39, 0.36);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
  }
  .menu .section { width: 100%; display: flex; flex-direction: column; gap: 9px; }
  /* 단계 제목: 번호 배지 + 큰 골드 텍스트 → '무엇을 할지' 한눈에 */
  .sectionHead { display: flex; align-items: center; gap: 9px; font-family: var(--serif); font-size: 17px; font-weight: 700; color: var(--gold-bright); letter-spacing: .5px; text-align: left; }
  .sectionHead.subtle { font-size: 15px; color: var(--parchment); font-weight: 600; }
  .stepNo {
    flex: none; width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
    color: var(--ink); font-size: 13px; font-weight: 800; line-height: 22px; text-align: center;
    box-shadow: inset 0 1px 0 rgba(255,250,220,.6), 0 1px 3px rgba(0,0,0,.5);
  }
  /* 세그먼트(모드/인원): 토글 성격 → CTA보다 덜 강조 */
  .seg { display: flex; width: 100%; border: 1px solid var(--warm-border); border-radius: 8px; overflow: hidden; box-shadow: inset 0 1px 0 rgba(255, 240, 200, 0.05), 0 2px 6px rgba(0, 0, 0, 0.32); }
  .seg button { flex: 1 1 0; min-width: 0; font-family: var(--serif); cursor: pointer; border: none; background: linear-gradient(180deg, var(--warm-bg2), var(--warm-bg)); color: var(--muted); padding: 12px 6px; font-size: 15px; letter-spacing: .5px; border-right: 1px solid var(--warm-border); transition: filter .1s, color .1s; }
  .seg button:hover { filter: brightness(1.18); color: var(--parchment); }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep)); color: var(--ink); font-weight: 800; text-shadow: 0 1px 0 rgba(255, 255, 255, 0.28); }
  /* 선택한 모드 한 줄 요약 + 상세 규칙 보기 링크 */
  .modeSummary { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 10px; font-size: 13px; color: var(--parchment); line-height: 1.5; text-align: left; }
  /* 요약문은 항상 한 줄 유지 — 폭이 좁으면 '규칙 자세히' 링크가 아래 줄로 내려가고 요약은 줄바꿈되지 않음 */
  .modeSummary #modeSummaryText { white-space: nowrap; }
  .linkBtn { flex: none; margin-left: auto; background: none; border: none; cursor: pointer; color: var(--gold-bright); font-family: var(--serif); font-size: 12.5px; font-weight: 700; letter-spacing: .3px; padding: 2px 0; text-decoration: underline; text-underline-offset: 3px; }
  .linkBtn:hover { color: var(--gold-soft); }

  /* ===== 버튼 중요도(위계) ===== */
  /* 1순위 CTA: '방 만들기' — 가장 크고 밝은 황동, 굵게 */
  .cta-primary {
    width: 100%; font-family: var(--serif); cursor: pointer; border: 1px solid #7b2419; border-radius: 9px;
    background: linear-gradient(180deg, #d46a45 0%, var(--seal) 48%, #5b1712 100%);
    color: #fff1d2; font-weight: 800; font-size: 18px; letter-spacing: 1.5px; padding: 15px 24px;
    text-shadow: 0 1px 0 rgba(40, 6, 3, 0.85), 0 0 8px rgba(255, 210, 140, 0.18);
    box-shadow: inset 0 1px 0 rgba(255,210,170,0.42), inset 0 -2px 7px rgba(55,8,5,0.58), 0 5px 16px rgba(166,64,47,0.36);
    transition: filter .12s, transform .05s;
  }
  .cta-primary:hover { filter: brightness(1.16) saturate(1.08); }
  .cta-primary:active { transform: translateY(1px); }
  /* 2순위 CTA: '입장' — 골드 외곽선(속 비움)으로 한 단계 낮은 강조 */
  .cta-secondary {
    flex: none; font-family: var(--serif); cursor: pointer; border: 1.5px solid var(--gold); border-radius: 8px;
    background: rgba(201,162,39,0.1); color: var(--gold-bright); font-weight: 700; font-size: 15px; letter-spacing: .8px; padding: 0 20px;
    transition: filter .12s, background .12s, transform .05s;
  }
  .cta-secondary:hover { background: rgba(201,162,39,0.22); }
  .cta-secondary:active { transform: translateY(1px); }

  /* '또는' 구분선 */
  .orDivider { width: 100%; display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; letter-spacing: 2px; }
  .orDivider::before, .orDivider::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-deep), transparent); }

  /* 코드 입장: 입력창 + 버튼을 하나의 그룹처럼 */
  .joinGroup { display: flex; width: 100%; gap: 0; }
  .joinGroup #codeInput { flex: 1; min-width: 0; width: auto; border-radius: 8px 0 0 8px; border-right: none; letter-spacing: 5px; }
  .joinGroup .cta-secondary { border-radius: 0 8px 8px 0; }

  /* 규칙 상세 모달(팝업) */
  .modalOverlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 18px; background: rgba(8, 5, 2, 0.72); backdrop-filter: blur(3px); }
  .modalOverlay.hidden { display: none; }
  .modalCard { width: min(360px, 100%); background: var(--card); border: 2px solid var(--warm-border); border-radius: 12px; padding: 22px 22px 18px; box-shadow: inset 0 0 0 1px rgba(230,192,74,0.22), 0 16px 44px rgba(0,0,0,0.7); text-align: left; }

  .modalCard .btn { width: 100%; }
  #numpad .npDouble { grid-column: span 6; margin-top: 2px; border: 1px solid var(--gold-soft); border-radius: 6px; background: var(--warm-bg); color: var(--gold-soft); font-family: inherit; font-size: 13px; padding: 8px 0; cursor: pointer; }
  #numpad .npDouble.on { background: var(--gold-soft); color: var(--ink); font-weight: 700; }
  /* 아직 켜지 않은 더블 후보 버튼은 은은한 골드 글로우로 주목도↑ */
  #numpad .npDouble:not(.on) { box-shadow: 0 0 0 1px rgba(230, 192, 74, 0.22), 0 0 10px rgba(230, 192, 74, 0.18); }

  #codeInput { font-family: var(--serif); font-size: 20px; letter-spacing: 6px; text-align: center; text-transform: uppercase; width: 150px; padding: 12px 10px; border-radius: 7px; border: 1px solid var(--warm-border); background: #0d0b05; color: var(--gold-bright); box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5); }
  #codeInput::placeholder { color: #8a7648; font-size: 15px; letter-spacing: 1px; text-transform: none; }
  #roomCode { font-family: var(--serif); font-size: clamp(34px, 12vw, 52px); font-weight: 800; letter-spacing: 10px; color: var(--gold-soft); margin: 6px 0; text-shadow: 0 2px 3px #000, 0 0 18px rgba(242, 204, 96, 0.3); }
  #rosterInfo { font-size: 14px; color: var(--muted); }
  .err { color: #f85149; font-size: 13px; min-height: 16px; }
  /* 양끝이 사라지는 황동 장식선(가운데 마름모) */
  .divider { width: 82%; height: 14px; border: 0; margin: 6px 0; position: relative; }
  .divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-deep) 20%, var(--gold) 50%, var(--gold-deep) 80%, transparent); }
  .divider::after { content: "◆"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 10px; background: var(--card); padding: 0 8px; }
  /* 메뉴 화면에서도 #stage는 런처 높이에 맞게 축소만(고정 오버레이 아님) */
  #stage:has(#menu:not(.hidden)) {
    min-height: 0;
  }
  @media (max-height: 760px) {

  /* Final button normalization: 버튼 크기와 문구를 안정적으로 고정 */
  .menu button,

  /* Background lock: 원본 보드 상단의 DaVinci code 타이틀을 반드시 노출 */

<body>
  <h1>다빈치코드<span class="tagline">ONLINE · 온라인 추리 대전</span></h1>
  <div id="conn">서버 연결 중…</div>

  <div id="stage">
