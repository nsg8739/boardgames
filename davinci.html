<script>
(() => {
  "use strict";

  // ===== 서버 주소 (versus.html과 동일한 중계 서버 재사용) =====
  const RENDER_URL = "wss://pingpong-server-hgl2.onrender.com";
  const override = new URLSearchParams(location.search).get("server");
  const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname) || location.protocol === "file:";
  const SERVER_URL = override || (isLocal ? "ws://localhost:8080" : RENDER_URL);

  // ===== 네트워크/화면 상태 =====
  let ws = null;
  let myIndex = null;         // 이 클라이언트의 플레이어 인덱스(0 = 호스트)
  let isHost = false;
  const JOKERS = 2;  // 조커는 옵션에서 제외 — 모든 버전 고정 2개(더미에 포함, 뽑기로 등장)
  const cfg = { count: 2, jokers: JOKERS, version: "basic" };  // 호스트가 방 만들 때 선택 → 게임 초기화에 사용
  let optPlayers = 2, optVersion = "basic";  // 메뉴 세그먼트 선택값
  let soloMode = false, aiTimer = null;       // 1명(솔로) = 나 vs 컴퓨터(AI). 서버 없이 로컬 진행
  let myNick = ""; try { myNick = (localStorage.getItem("bg_nick") || "").trim().slice(0, 8); } catch (e) {}
  let hostNames = {};  // 호스트: 슬롯 index → 닉네임
  const AI_INDEX = 1;

  const SCREEN = { CONNECTING: "connecting", MENU: "menu", LOBBY: "lobby", PLAYING: "playing", OVER: "over" };
  let screen = SCREEN.CONNECTING;

  let lastView = null;
  let selTarget = null, selIndex = null;  // 추리 중 선택된 (상대 인덱스, 타일 인덱스)
  let candDoubleLeft = null, dblOn = false; // Zion: 인접 동일숫자 '더블' 후보(왼쪽 인덱스)와 토글 상태
  let elapsedTimer = null;

  const $ = (id) => document.getElementById(id);

  // ===== 재접속용 세션/상태 저장 (localStorage: 새로고침·탭 닫기에도 유지 → 실수로 나가도 코드로 복귀) =====
  let myCode = null, myToken = null;
  let handoffMode = false; let reconnectTries = 0, reconnectTimer = null;   // 방 유지로 이 게임에 도착(?room=1) → 메뉴 대신 같은 방에 재접속
  let handoffCap = 0;        // 방 유지 시 방 정원(전원 복귀 판단용)
  let intentionalNav = false; // 방 유지 이동 등 의도적 페이지 이동(beforeunload 확인창 억제)
  const missingPeers = new Set();  // 현재 접속이 끊긴 슬롯(방 유지 이동 가능 여부 판단)
  const SESS_KEY = "davinci_session", STATE_KEY = "davinci_state";
  const REJOIN_WINDOW_MS = 300000;  // 최근 이 시간 내 활동한 세션만 자동 재접속 시도(서버 유예 5분과 맞춤)
  function saveSession() {
    try { localStorage.setItem(SESS_KEY, JSON.stringify({ code: myCode, index: myIndex, token: myToken, isHost, ts: Date.now() })); } catch {}
  }
  function touchSession() {  // 진행 중 활동 시각 갱신 → 오래 이어진 게임도 '최근'으로 유지
    try { const s = JSON.parse(localStorage.getItem(SESS_KEY) || "null"); if (s) { s.ts = Date.now(); localStorage.setItem(SESS_KEY, JSON.stringify(s)); } } catch {}
  }
  function getSession() { try { return JSON.parse(localStorage.getItem(SESS_KEY) || "null"); } catch { return null; } }
  function sessionFresh(s) { return !!(s && s.ts && Date.now() - s.ts < REJOIN_WINDOW_MS); }
  function clearSession() { try { localStorage.removeItem(SESS_KEY); localStorage.removeItem(STATE_KEY); localStorage.removeItem(STATE_KEY + "_n"); } catch {} }
  function restoreConn() { $("conn").innerHTML = "<span class='ok'>● 서버 연결됨</span>"; }
  // 호스트만: 권한 상태 G를 저장. drawn.tile은 손패 타일과 같은 객체라 복원 시 재연결 필요.
  function saveState() {
    if (!isHost || !G) return;
    try {
      const inHand = G.drawn ? G.players[G.drawn.owner].hand.includes(G.drawn.tile) : false;
      localStorage.setItem(STATE_KEY, JSON.stringify({ g: G, drawnInHand: inHand }));
      localStorage.setItem(STATE_KEY + "_n", JSON.stringify(hostNames));
    } catch {}
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY); if (!raw) return null;
      const { g, drawnInHand } = JSON.parse(raw);
      if (g && g.drawn && drawnInHand) {  // drawn.tile을 실제 손패 타일 객체로 재연결(참조 복원)
        const t = g.players[g.drawn.owner].hand.find(
          (x) => x.color === g.drawn.tile.color && x.value === g.drawn.tile.value && x.joker === g.drawn.tile.joker);
        if (t) g.drawn.tile = t;
      }
      return g;
    } catch { return null; }
  }

  // ========================================================================
  //  게임 엔진 (호스트만 실행)
  // ========================================================================
  let G = null;
  // G = { pool, players:[{hand,eliminated}], count, jokers, turn, phase, drawn, winner, lastGuess }
  // phase: 'guess' | 'decide' | 'penalty' | 'placeJoker' | 'over'

  const keyOf = (t) => t.value * 2 + (t.color === "w" ? 1 : 0);
  const allUp = (h) => h.every((t) => t.faceUp);
  const hasDown = (h) => h.some((t) => !t.faceUp);

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // 숫자 타일을 정렬 위치에 삽입. 조커는 건드리지 않음(핀 고정).
  // 규칙: 자기보다 큰 "숫자" 타일 바로 앞에 삽입 → 숫자끼리는 항상 오름차순 유지.
  function insertNumbered(hand, tile) {
    let i = 0;
    while (i < hand.length) {
      const t = hand[i];
      if (!t.joker && keyOf(t) > keyOf(tile)) break;
      i++;
    }
    hand.splice(i, 0, tile);
  }

  function newGame() {
    const count = cfg.count, jokers = cfg.jokers, version = cfg.version;
    // 숫자 타일 24장(흑/백 0~11)
    const numbered = [];
    for (const c of ["b", "w"]) for (let v = 0; v <= 11; v++) numbered.push({ color: c, value: v, joker: false, faceUp: false });
    shuffle(numbered);

    const players = [];
    let pool;
    if (version === "zion") {
      // Zion: 각 플레이어에게 검정 2 + 흰색 2 = 4장(인원 수와 무관하게 고정)
      const blacks = numbered.filter((t) => t.color === "b");
      const whites = numbered.filter((t) => t.color === "w");
      for (let p = 0; p < count; p++) {
        const hand = [blacks.pop(), blacks.pop(), whites.pop(), whites.pop()];
        hand.sort((a, b) => keyOf(a) - keyOf(b));
        players.push({ hand, eliminated: false });
      }
      pool = blacks.concat(whites);  // 남은 숫자 타일
    } else {
      const per = count === 2 ? 4 : 3;  // 기본: 2인 4장, 3~4인 3장
      for (let p = 0; p < count; p++) {
        const hand = [];
        for (let k = 0; k < per; k++) hand.push(numbered.pop());
        hand.sort((a, b) => keyOf(a) - keyOf(b));
        players.push({ hand, eliminated: false });
      }
      pool = numbered.slice();
    }

    // 남은 숫자 + 조커를 섞어 더미 구성. (조커는 초기 손패엔 안 나오고 더미에서만 등장)
    for (let k = 0; k < jokers; k++) pool.push({ color: k === 0 ? "w" : "b", value: null, joker: true, faceUp: false });
    shuffle(pool);

    G = {
      pool, players, count, jokers, version,
      startedAt: Date.now(),
      turn: Math.floor(Math.random() * count),  // 선공 랜덤
      phase: "guess", drawn: null, drawReason: null, winner: null, lastGuess: null,
    };
    if (version !== "zion") startTurnDraw();  // Zion은 턴 시작 시 뽑지 않음
    broadcast();
  }

  function aliveIndices() { return G.players.map((p, i) => (p.eliminated ? -1 : i)).filter((i) => i >= 0); }

  // (기본 Ver) 현재 턴 플레이어가 더미에서 1장 뽑기.
  function startTurnDraw() {
    G.phase = "guess";
    if (G.pool.length > 0) {
      const t = G.pool.pop();
      t.faceUp = false;
      G.drawn = { owner: G.turn, tile: t };
      G.drawReason = "turn";
      if (t.joker) {
        G.phase = "placeJoker";  // 소유자가 위치를 골라 삽입할 때까지 손패에 넣지 않음
      } else {
        insertNumbered(G.players[G.turn].hand, t);
      }
    } else {
      G.drawn = null;  // 더미 소진 시 뽑지 않고 바로 추리
    }
  }

  // from 다음의 살아있는 플레이어로 턴을 넘김. (기본은 뽑기, Zion은 뽑지 않음)
  function nextTurn(from) {
    let i = from;
    do { i = (i + 1) % G.count; } while (G.players[i].eliminated);
    G.turn = i;
    if (G.version === "zion") { G.phase = "guess"; G.drawn = null; G.drawReason = null; }
    else startTurnDraw();
  }

  // 어떤 공개 직후 게임 종료(최후 1인) 여부 확인. 종료면 true.
  function checkWinner() {
    const alive = aliveIndices();
    if (alive.length <= 1) { G.winner = alive.length === 1 ? alive[0] : null; G.phase = "over"; return true; }
    return false;
  }

  function applyAction(a) {
    if (!G || G.winner != null) return;
    if (a.from !== G.turn) return;  // 자기 차례가 아니면 무시
    if (a.action === "guess" && G.phase === "guess") {
      if (G.version === "zion") doGuessZion(a.from, a.target, a.index, a);
      else doGuess(a.from, a.target, a.index, a);
    }
    else if (a.action === "decide" && G.phase === "decide") doDecide(a.from, a.choice);
    else if (a.action === "penalty" && G.phase === "penalty") doPenalty(a.from, a.index);
    else if (a.action === "placeJoker" && G.phase === "placeJoker") doPlaceJoker(a.from, a.slot);
  }

  function doPlaceJoker(from, slot) {
    if (!G.drawn || !G.drawn.tile.joker) return;
    const hand = G.players[from].hand;
    const s = Math.max(0, Math.min(hand.length, slot | 0));
    hand.splice(s, 0, G.drawn.tile);
    if (G.drawReason === "penalty") {
      // Zion 오답 벌칙으로 받은 조커 → 배치 후 턴 넘김
      G.drawn = null; G.drawReason = null;
      nextTurn(from);
    } else {
      G.phase = "guess";  // 기본 Ver: drawn 참조 유지(NEW 강조 + 오답 시 공개 대상), 같은 턴 계속
    }
    broadcast();
  }

  // PLUS / Basic 공통 추리. 둘 다 턴 시작에 1장 뽑음.
  //  - 정답: PLUS는 계속/멈추기(decide), Basic은 바로 턴 넘김.
  //  - 오답: PLUS는 뽑은 타일 공개(더미 없으면 내 타일 공개), Basic은 벌칙 없이 턴 넘김.
  function doGuess(from, target, index, a) {
    if (target === from) return;
    const opp = G.players[target];
    if (!opp || opp.eliminated) return;
    const tile = opp.hand[index];
    if (!tile || tile.faceUp) return;

    const guessJoker = !!a.joker;
    const correct = guessJoker ? !!tile.joker : (!tile.joker && tile.value === a.number);
    G.lastGuess = { by: from, target, index, correct, guessJoker, number: a.number };

    if (correct) {
      tile.faceUp = true;
      if (allUp(opp.hand)) opp.eliminated = true;
      if (checkWinner()) { broadcast(); return; }
      if (G.version === "plus") G.phase = "decide";  // PLUS만 연속 추리 선택
      else nextTurn(from);                            // Basic: 바로 턴 넘김
    } else if (G.version === "plus") {
      if (G.drawn) {
        G.drawn.tile.faceUp = true;   // 방금 뽑은 타일 공개
        G.drawn = null;
        if (allUp(G.players[from].hand)) G.players[from].eliminated = true;
        if (checkWinner()) { broadcast(); return; }
        nextTurn(from);
      } else if (hasDown(G.players[from].hand)) {
        G.phase = "penalty";          // 더미 없음 → 내 가림 타일 하나를 공개
      } else {
        nextTurn(from);
      }
    } else {
      nextTurn(from);  // Basic: 오답 벌칙 없음 — 뽑은 타일은 가린 채 턴 넘김
    }
    broadcast();
  }

  function doDecide(from, choice) {
    if (choice === "continue") G.phase = "guess";
    else { G.drawn = null; nextTurn(from); }
    broadcast();
  }

  function doPenalty(from, index) {
    const t = G.players[from].hand[index];
    if (!t || t.faceUp) return;
    t.faceUp = true;
    if (allUp(G.players[from].hand)) G.players[from].eliminated = true;
    if (checkWinner()) { broadcast(); return; }
    nextTurn(from);
    broadcast();
  }

  // ===== Zion Ver 추리 =====
  // 대상 타일이 인접한 '같은 숫자 쌍'의 일부인가? (검정 왼쪽·흰색 오른쪽, 둘 다 가림)
  // 이때 단일 지목은 인정되지 않고 '더블'로 두 장을 함께 지목해야 한다.
  function isPartOfDouble(hand, k) {
    const t = hand[k];
    if (t.joker) return false;
    const R = hand[k + 1], L = hand[k - 1];
    if (R && !R.joker && !R.faceUp && R.value === t.value) return true;
    if (L && !L.joker && !L.faceUp && L.value === t.value) return true;
    return false;
  }

  // 오답 벌칙: 더미에서 1장을 가림 상태로 손패에 받음. 조커면 배치 대기(true 반환).
  function zionPenalty(from) {
    if (G.pool.length > 0) {
      const t = G.pool.pop();
      t.faceUp = false;
      if (t.joker) { G.drawn = { owner: from, tile: t }; G.drawReason = "penalty"; G.phase = "placeJoker"; return true; }
      insertNumbered(G.players[from].hand, t);
      nextTurn(from);
      return false;
    }
    // 더미 소진: PLUS와 동일하게 자기 가림 타일 1장을 공개(무벌칙으로 무제한 추리하는 것 방지). 없으면 턴만 넘김.
    if (hasDown(G.players[from].hand)) { G.phase = "penalty"; return true; }
    nextTurn(from);
    return false;
  }

  function doGuessZion(from, target, index, a) {
    if (target === from) return;
    const opp = G.players[target];
    if (!opp || opp.eliminated) return;

    if (a.double) {
      // 더블 지목: index = 왼쪽(검정) 인덱스, 쌍 = (index, index+1)
      const t1 = opp.hand[index], t2 = opp.hand[index + 1];
      if (!t1 || !t2 || t1.faceUp || t2.faceUp) return;
      const validPair = !t1.joker && !t2.joker && t1.color === "b" && t2.color === "w";
      const correct = validPair && !a.joker && t1.value === a.number && t2.value === a.number;
      G.lastGuess = { by: from, target, index, double: true, number: a.number, correct };
      if (correct) {
        t1.faceUp = true; t2.faceUp = true;
        if (allUp(opp.hand)) opp.eliminated = true;
        if (checkWinner()) { broadcast(); return; }
        nextTurn(from);
      } else {
        if (zionPenalty(from)) { broadcast(); return; }  // 조커 배치 대기
      }
      broadcast();
      return;
    }

    const tile = opp.hand[index];
    if (!tile || tile.faceUp) return;
    const partOfDouble = isPartOfDouble(opp.hand, index);
    const guessJoker = !!a.joker;
    // 더블의 일부면 단일 지목은 무조건 오답(더블로 지목해야 인정)
    const correct = !partOfDouble && (guessJoker ? !!tile.joker : (!tile.joker && tile.value === a.number));
    G.lastGuess = { by: from, target, index, double: false, number: a.number, guessJoker, correct };
    if (correct) {
      tile.faceUp = true;
      if (allUp(opp.hand)) opp.eliminated = true;
      if (checkWinner()) { broadcast(); return; }
      nextTurn(from);
    } else {
      if (zionPenalty(from)) { broadcast(); return; }
    }
    broadcast();
  }

  // 플레이어 pi 관점의 view
  function viewFor(pi) {
    const drawnTile = G.drawn ? G.drawn.tile : null;
    const me = G.players[pi];
    const others = [];
    for (let i = 0; i < G.count; i++) {
      if (i === pi) continue;
      const p = G.players[i];
      others.push({
        index: i, eliminated: p.eliminated,
        tiles: p.hand.map((t) => ({
          color: t.color, faceUp: t.faceUp, drawn: t === drawnTile,
          value: t.faceUp && !t.joker ? t.value : null,
          joker: t.faceUp ? !!t.joker : false,   // 가림 상태에선 조커 여부 비공개
        })),
      });
    }
    let lg = null;
    if (G.lastGuess) {
      const g = G.lastGuess;
      lg = {
        by: g.by, byMe: g.by === pi,
        target: g.target, targetMe: g.target === pi, index: g.index,
        correct: g.correct, double: !!g.double,
        text: g.double ? `${g.number} 더블` : (g.guessJoker ? "조커" : String(g.number)),
      };
    }
    return {
      myIndex: pi, count: G.count, hasJokers: G.jokers > 0, version: G.version,
      startedAt: G.startedAt || Date.now(),
      turn: G.turn, myTurn: G.turn === pi,
      phase: G.phase, poolCount: G.pool.length,
      winner: G.winner, iWon: G.winner === pi,
      drawnMine: G.drawn && G.drawn.owner === pi ? { color: G.drawn.tile.color, joker: !!G.drawn.tile.joker, value: G.drawn.tile.joker ? null : G.drawn.tile.value } : null,
      my: me.hand.map((t) => ({ color: t.color, joker: !!t.joker, value: t.joker ? null : t.value, faceUp: t.faceUp, drawn: t === drawnTile })),
      others, lastGuess: lg,
      names: Array.from({ length: G.count }, (_, i) => hostNames[i] || null),
    };
  }

  function broadcast() {
    if (intentionalNav) return;  // 방 유지 이동 중인 호스트는 이전 게임 view를 더 보내지 않는다(다른 게임 페이지 오염 방지)
    if (!soloMode) for (let i = 1; i < G.count; i++) send({ type: "view", view: viewFor(i), to: i });  // 각 게스트에게 개인화 view
    renderView(viewFor(0));  // 호스트(솔로에선 사람) 로컬 렌더
    saveState();             // 새로고침 대비 상태 저장(호스트)
    if (!soloMode) touchSession();  // 세션 활동 시각 갱신(재접속 가능 시간 연장)
    if (soloMode) maybeAI();  // 솔로: 컴퓨터 차례면 두게 한다
  }

  // ========================================================================
  //  솔로(1명) — 나 vs 컴퓨터. 서버 없이 호스트 엔진을 로컬에서 돌린다.
  //  AI는 '공개된 정보'(공개 타일·타일 색·오름차순 제약)와 내 손패만으로 추리한다(정답 안 봄).
  // ========================================================================
  function startSolo() {
    soloMode = true; isHost = true; myIndex = 0; myCode = myToken = null;
    cfg.count = 2; cfg.jokers = JOKERS; cfg.version = optVersion;
    resetSel();
    newGame();  // broadcast → 화면 전환(PLAYING) + 컴퓨터 선공이면 자동 진행
  }
  function updateCreateLabel() {
    $("createBtn").textContent = optPlayers === 1 ? "혼자 시작 (vs 컴퓨터)" : "방 만들기";
  }
  function maybeAI() {  // 컴퓨터 차례면 잠깐 뒤 두게 한다(사람처럼 딜레이)
    if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
    if (!soloMode || !G || G.winner != null || G.turn !== AI_INDEX) return;
    if (!["guess", "decide", "penalty", "placeJoker"].includes(G.phase)) return;
    aiTimer = setTimeout(aiAct, G.phase === "placeJoker" ? 450 : 800);
  }
  function aiAct() {
    aiTimer = null;
    if (!soloMode || !G || G.winner != null || G.turn !== AI_INDEX) return;
    const hand = G.players[AI_INDEX].hand;
    if (G.phase === "placeJoker") {  // 조커는 어디든 합법 → 임의 위치
      applyAction({ from: AI_INDEX, action: "placeJoker", slot: Math.floor(Math.random() * (hand.length + 1)) });
      return;
    }
    if (G.phase === "penalty") {  // PLUS: 더미 없을 때 오답 벌칙 → 내 가림 타일 하나 공개
      const idx = hand.findIndex((t) => !t.faceUp);
      applyAction({ from: AI_INDEX, action: "penalty", index: idx < 0 ? 0 : idx });
      return;
    }
    const plan = aiPlanGuess();
    if (G.phase === "decide") {  // PLUS 정답 후: 확실한 지목이 더 있으면 계속, 아니면 멈춤
      applyAction({ from: AI_INDEX, action: "decide", choice: plan && plan.certain ? "continue" : "stop" });
      return;
    }
    if (G.phase === "guess") {
      if (!plan) {  // 안전장치(거의 도달 안 함)
        const i = G.players[0].hand.findIndex((t) => !t.faceUp);
        applyAction({ from: AI_INDEX, action: "guess", target: 0, index: i < 0 ? 0 : i, number: 0 });
      } else {
        applyAction(Object.assign({ from: AI_INDEX, action: "guess" }, plan.action));
      }
    }
  }
  // 상대(사람, 0) 가림 타일 후보를 공개 정보만으로 추린다.
  function aiPlanGuess() {
    const opp = G.players[0]; if (!opp || opp.eliminated) return null;
    const me = G.players[AI_INDEX];
    const keyCV = (c, v) => v * 2 + (c === "w" ? 1 : 0);
    // taken: 이미 세상에 드러난 (색,값) — 내 손패 전부 + 그 외엔 공개된 것만(히든 값은 절대 안 봄)
    const taken = new Set();
    for (const p of G.players) for (const t of p.hand) {
      const known = (p === me) || t.faceUp;
      if (!known || t.joker) continue;
      taken.add(t.color + ":" + t.value);
    }
    const tiles = opp.hand;
    // 각 위치의 가능 숫자: 공개=확정, 히든=색으로 가능한 값(taken 제외). 공개 조커는 순서에서 제외.
    const cand = tiles.map((t) => {
      if (t.faceUp) return t.joker ? { joker: true, vals: [] } : { vals: [t.value] };
      const vals = [];
      for (let v = 0; v <= 11; v++) if (!taken.has(t.color + ":" + v)) vals.push(v);
      return { vals };
    });
    // 오름차순 제약 양방향 전파 — 히든도 숫자로 가정해 이웃과 순서를 강제(사람의 추리와 동일) → 후보 대폭 축소.
    const seq = [];
    for (let k = 0; k < tiles.length; k++) if (!cand[k].joker) seq.push(k);
    let lo = -1;
    for (const k of seq) {
      const t = tiles[k];
      cand[k].vals = cand[k].vals.filter((v) => keyCV(t.color, v) > lo);
      if (cand[k].vals.length) lo = Math.min.apply(null, cand[k].vals.map((v) => keyCV(t.color, v)));
    }
    let hi = 24;
    for (let i = seq.length - 1; i >= 0; i--) {
      const k = seq[i], t = tiles[k];
      cand[k].vals = cand[k].vals.filter((v) => keyCV(t.color, v) < hi);
      if (cand[k].vals.length) hi = Math.max.apply(null, cand[k].vals.map((v) => keyCV(t.color, v)));
    }
    // 값 선택: 같은 색의 다른 히든 위치와 덜 겹치는(더 확정적인) 값을 우선.
    const share = {};
    for (let k = 0; k < tiles.length; k++) { if (tiles[k].faceUp) continue; for (const v of cand[k].vals) { const key = tiles[k].color + ":" + v; share[key] = (share[key] || 0) + 1; } }
    const pickVal = (k) => { const t = tiles[k]; let best = cand[k].vals[0], bs = Infinity; for (const v of cand[k].vals) { const s = share[t.color + ":" + v]; if (s < bs) { bs = s; best = v; } } return best; };
    function bestSingle() {
      let best = null;
      for (let k = 0; k < tiles.length; k++) {
        if (tiles[k].faceUp) continue;
        const vs = cand[k].vals; if (!vs.length) continue;
        if (!best || vs.length < best.count) best = { k, v: pickVal(k), count: vs.length, certain: vs.length === 1 };
      }
      return best;
    }
    if (G.version === "zion") {
      // 실제 더블은 드물다 → '확실한 더블'(양쪽 후보가 동일 단일값)만 더블로 지목, 나머지는 단일.
      for (let k = 0; k + 1 < tiles.length; k++) {
        const a = tiles[k], b = tiles[k + 1];
        if (a.faceUp || b.faceUp || a.color !== "b" || b.color !== "w") continue;
        const ca = cand[k].vals, cb = cand[k + 1].vals;
        if (ca.length === 1 && cb.length === 1 && ca[0] === cb[0])
          return { action: { target: 0, index: k, number: ca[0], double: true }, certain: true };
      }
    }
    const single = bestSingle();
    if (single) return { action: { target: 0, index: single.k, number: single.v }, certain: single.certain };
    const jk = tiles.findIndex((t) => !t.faceUp);  // 숫자 후보 소진 → 조커로 추정
    if (jk >= 0) return { action: { target: 0, index: jk, joker: true }, certain: false };
    return null;
  }

  // ========================================================================
  //  액션 디스패치 (호스트는 직접 적용, 게스트는 호스트(0)에게 전송)
  // ========================================================================
  function dispatch(a) {
    a.from = myIndex;
    if (isHost) applyAction(a);
    else send({ type: "act", to: 0, a });
  }
  function sendNick() { if (isHost) { if (myIndex != null) hostNames[myIndex] = myNick; if (G) broadcast(); } else if (myNick) { send({ type: "nick", name: myNick, to: 0 }); } }

  // ========================================================================
  //  렌더링
  // ========================================================================
  const colorName = (c) => (c === "b" ? "검정" : "흰색");
  function faceText(t) { return t.joker ? "J" : (t.value != null ? t.value : ""); }

  function tileEl(t, owner) {
    const el = document.createElement("div");
    el.className = "tile " + (t.color === "b" ? "black" : "white") + (t.joker ? " joker" : "");
    const num = document.createElement("span");
    num.className = "num";
    num.textContent = faceText(t);
    el.appendChild(num);
    if (owner === "me") { if (!t.faceUp) el.classList.add("secret"); }
    else { if (!t.faceUp) el.classList.add("hidden-face"); }
    if (t.faceUp) el.classList.add("up");   // 공개된(맞춰진) 타일 강조
    if (t.drawn) el.classList.add("drawn");
    return el;
  }

  function labelFor(v, idx) {
    if (soloMode && idx === AI_INDEX) return "컴퓨터";
    if (v.names && v.names[idx]) return v.names[idx];
    return v.count === 2 ? "상대" : `플레이어 ${idx + 1}`;
  }

  function modeLabel(version) {
    return ({ basic: "BASIC", plus: "PLUS", zion: "ZION" })[version] || String(version || "").toUpperCase();
  }

  function formatElapsed(startedAt) {
    const start = Number(startedAt) || Date.now();
    const total = Math.max(0, Math.floor((Date.now() - start) / 1000));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(s).padStart(2, "0");
    return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  function renderGameMeta(v) {
    if (!v) return;
    $("gameModeLabel").textContent = modeLabel(v.version);
    $("gameElapsed").textContent = formatElapsed(v.startedAt);
    // 온라인 게임이면 초대 코드를 상단에 노출(솔로는 코드 없으므로 숨김)
    const cw = $("gameCodeWrap");
    if (myCode) { cw.style.display = ""; $("gameCode").textContent = myCode; }
    else cw.style.display = "none";
  }

  elapsedTimer = setInterval(() => {
    if ((screen === SCREEN.PLAYING || screen === SCREEN.OVER) && lastView) renderGameMeta(lastView);
  }, 1000);

  function renderView(v) {
    if (!v || !Array.isArray(v.others)) return;  // 다른 게임에서 넘어온 잔여 view 방어
    lastView = v;
    if (v.winner != null) { showOver(v); return; }
    if (screen !== SCREEN.PLAYING) setScreen(SCREEN.PLAYING);

    renderGameMeta(v);
    $("poolCount").textContent = v.poolCount;
    $("myLabel").textContent = v.count === 2 ? "나" : `나 (플레이어 ${v.myIndex + 1})`;

    // 상대 영역
    const area = $("oppArea");
    area.innerHTML = "";
    for (const o of v.others) {
      const side = document.createElement("div");
      side.className = "side opp" + (v.turn === o.index ? " active" : "") + (o.eliminated ? " eliminated" : "");
      const label = document.createElement("div");
      label.className = "label";
      label.innerHTML = `<span class="turnDot"></span>${labelFor(v, o.index)}` + (o.eliminated ? ` <span class="badge">탈락</span>` : "");
      side.appendChild(label);
      const row = document.createElement("div");
      row.className = "tiles";
      o.tiles.forEach((t, i) => {
        const el = tileEl(t, "opp");
        if (v.myTurn && v.phase === "guess" && !t.faceUp && !o.eliminated) {
          el.classList.add("guessable");
          if (selTarget === o.index && selIndex === i) el.classList.add("selected");
          el.addEventListener("click", () => openNumpad(o.index, i));
        }
        row.appendChild(el);
      });
      side.appendChild(row);
      area.appendChild(side);
    }

    // 내 손패
    $("mySide").classList.toggle("active", v.myTurn);
    const myWrap = $("myTiles");
    myWrap.innerHTML = "";

    if (v.myTurn && v.phase === "placeJoker") {
      // 조커 배치: 타일 사이사이에 삽입 지점(gap) 표시
      const addGap = (slot) => {
        const g = document.createElement("div");
        g.className = "gap";
        g.title = "여기에 놓기";
        g.addEventListener("click", () => dispatch({ action: "placeJoker", slot }));
        myWrap.appendChild(g);
      };
      addGap(0);
      v.my.forEach((t, i) => { myWrap.appendChild(tileEl(t, "me")); addGap(i + 1); });
    } else {
      v.my.forEach((t, i) => {
        const el = tileEl(t, "me");
        if (v.myTurn && v.phase === "penalty" && !t.faceUp) {
          el.classList.add("guessable");
          el.addEventListener("click", () => dispatch({ action: "penalty", index: i }));
        }
        myWrap.appendChild(el);
      });
    }

    flashLastGuess(v);

    const showNumpad = v.myTurn && v.phase === "guess" && selTarget != null && selIndex != null;
    $("numpad").classList.toggle("hidden", !showNumpad);
    document.body.classList.toggle("numpad-open", showNumpad);
    if (showNumpad) {
      renderNumpad(v);
      // 고정 숫자패드가 하단을 가리므로, 그 높이만큼 아래 여백을 확보하고(스크롤로 보드 전체 접근) 선택 타일을 보이게 스크롤
      requestAnimationFrame(() => {
        const npH = $("numpad").offsetHeight;
        document.documentElement.style.setProperty("--numpad-space", (npH + 28) + "px");
        const sel = document.querySelector("#oppArea .tile.selected");
        if (sel) sel.scrollIntoView({ block: "center", behavior: "smooth" });
      });
    } else {
      $("numpadHint").textContent = "";
    }
    $("decide").classList.toggle("hidden", !(v.myTurn && v.phase === "decide"));

    renderStatus(v);
  }

  function flashLastGuess(v) {
    if (!v.lastGuess) return;
    const g = v.lastGuess;
    const cls = g.correct ? "flash-right" : "flash-wrong";
    const idxs = g.double ? [g.index, g.index + 1] : [g.index];  // 더블이면 두 장 모두
    const flashRow = (row) => { for (const i of idxs) { const el = row && row.children[i]; if (el) el.classList.add(cls); } };
    if (g.targetMe) {
      flashRow($("myTiles"));
    } else {
      const sections = $("oppArea").children;
      let oi = 0;
      for (const o of v.others) {
        if (o.index === g.target) { flashRow(sections[oi].querySelector(".tiles")); break; }
        oi++;
      }
    }
  }

  function renderStatus(v) {
    const st = $("status"), fb = $("feedback");
    const zion = v.version === "zion";
    if (!v.myTurn) {
      const who = labelFor(v, v.turn);
      st.innerHTML = `⏳ <b>${who}</b>의 차례입니다…`;
    } else if (v.phase === "placeJoker") {
      const d = v.drawnMine;
      const lead = zion ? "벌칙으로 받은" : "뽑은";
      st.innerHTML = `🃏 ${lead} <b style="color:#f2cc60">${colorName(d.color)} 조커</b> — 손패에서 놓을 위치를 고르세요`;
    } else if (v.phase === "guess" && zion) {
      st.innerHTML = `🔎 <b>내 차례</b> — 상대 타일의 숫자를 맞혀보세요 <span style="color:var(--muted)">(틀리면 더미에서 1장을 가림으로 받고 턴 종료)</span>`;
    } else if (v.phase === "guess") {
      const d = v.drawnMine;
      const drawnTxt = d
        ? (d.joker ? `조커 배치 완료 · ` : `뽑은 타일 <b style="color:#f2cc60">[${colorName(d.color)} ${d.value}]</b> · `)
        : `더미가 비어 이번엔 뽑지 않았습니다 · `;
      st.innerHTML = `🔎 <b>내 차례</b> — ${drawnTxt}상대 타일을 골라 숫자를 맞혀보세요`;
    } else if (v.phase === "decide") {
      st.innerHTML = "✅ <b style='color:#3fb950'>정답!</b> 계속 추리할지 멈출지 선택하세요";
    } else if (v.phase === "penalty") {
      st.innerHTML = "❌ <b style='color:#f85149'>오답</b> — 공개할 내 타일 하나를 고르세요";
    }

    if (v.lastGuess) {
      const g = v.lastGuess;
      const who = g.byMe ? "내가" : `${labelFor(v, g.by)}가`;
      const target = g.targetMe ? "내" : (g.byMe ? "상대" : labelFor(v, g.target) + "의");
      const res = g.correct ? `<span style="color:#3fb950">정답</span>` : `<span style="color:#f85149">오답</span>`;
      fb.innerHTML = `${who} ${target} 타일을 <b>${g.text}</b>로 추측 → ${res}`;
    } else fb.textContent = "";
  }

  // ===== 숫자 패드 =====
  // 현재 선택/모드에 맞춰 숫자패드 내용을 다시 그린다(숫자 0~11 + 조커 + Zion 더블 토글).
  function renderNumpad(v) {
    const grid = $("numpadGrid");
    grid.innerHTML = "";
    for (let n = 0; n <= 11; n++) {
      const b = document.createElement("button");
      b.className = "np"; b.textContent = n;
      b.addEventListener("click", () => submitGuess({ number: n }));
      grid.appendChild(b);
    }
    if (v.hasJokers && !dblOn) {  // 더블 모드에선 조커 지목이 무의미 → 숨김
      const jb = document.createElement("button");
      jb.className = "np joker"; jb.textContent = "🃏 조커";
      jb.addEventListener("click", () => submitGuess({ joker: true }));
      grid.appendChild(jb);
    }
    if (candDoubleLeft != null) {  // Zion: 인접 같은색쌍 후보가 있으면 더블 토글 노출
      const db = document.createElement("button");
      db.className = "npDouble" + (dblOn ? " on" : "");
      db.textContent = (dblOn ? "✓ " : "") + "더블 지목 (옆 타일과 같은 숫자)";
      db.addEventListener("click", () => { dblOn = !dblOn; renderView(lastView); });
      grid.appendChild(db);
    }
    // 더블 후보가 있을 때는 힌트를 골드로 강조 — 단일 지목이 오답 처리되는 이유를 놓치지 않도록.
    const hint = $("numpadHint");
    if (dblOn) {
      hint.textContent = "선택한 검정+흰색 두 장을 같은 숫자로 함께 지목합니다.";
      hint.style.color = "var(--gold-soft)"; hint.style.fontWeight = "600";
    } else if (candDoubleLeft != null) {
      hint.textContent = "⚠ 옆에 붙은 검정·흰색이 같은 숫자면 '더블 지목'을 켜고 함께 맞혀야 정답! (단일 지목은 오답 → 벌칙 1장)";
      hint.style.color = "var(--gold-bright)"; hint.style.fontWeight = "700";
    } else {
      hint.textContent = "";
      hint.style.color = "var(--muted)"; hint.style.fontWeight = "";
    }
  }

  // Zion에서 (target, index) 타일이 인접 '검정-흰색 가림' 쌍의 일부인지 → 쌍의 왼쪽 인덱스 반환(없으면 null)
  function computeCandDouble(v, target, index) {
    if (!v || v.version !== "zion") return null;
    const o = v.others.find((x) => x.index === target);
    if (!o) return null;
    const tiles = o.tiles, t = tiles[index];
    if (!t || t.faceUp || t.joker) return null;
    if (t.color === "b") { const r = tiles[index + 1]; if (r && !r.faceUp && !r.joker && r.color === "w") return index; }
    if (t.color === "w") { const l = tiles[index - 1]; if (l && !l.faceUp && !l.joker && l.color === "b") return index - 1; }
    return null;
  }

  function openNumpad(target, index) {
    selTarget = target; selIndex = index; dblOn = false;
    candDoubleLeft = computeCandDouble(lastView, target, index);
    renderView(lastView);
  }
  function resetSel() { selTarget = selIndex = candDoubleLeft = null; dblOn = false; }
  function submitGuess(guess) {
    if (selTarget == null || selIndex == null) return;
    const t = selTarget;
    if (dblOn && candDoubleLeft != null) {
      const idx = candDoubleLeft; resetSel();
      dispatch({ action: "guess", target: t, index: idx, number: guess.number, double: true });
    } else {
      const i = selIndex; resetSel();
      dispatch({ action: "guess", target: t, index: i, number: guess.number, joker: !!guess.joker });
    }
  }

  // ========================================================================
  //  네트워크
  // ========================================================================
  function send(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

  function connect() {
    $("conn").innerHTML = "서버 연결 중… <span style='color:var(--muted)'>(무료 서버는 첫 접속에 30~60초 걸릴 수 있어요)</span>";
    try { ws = new WebSocket(SERVER_URL); }
    catch (e) { $("conn").innerHTML = "<span class='bad'>서버 주소 오류</span>"; return; }

    ws.addEventListener("open", () => {
      $("conn").innerHTML = "<span class='ok'>● 서버 연결됨</span>";
      // 방 유지 이동(?room=1): bg_room에 남긴 재접속 정보로 같은 방에 복귀
      const wantRoom = new URLSearchParams(location.search).get("room");
      const ho = wantRoom ? getRoomHandoff() : null;
      if (ho) {
        clearRoomHandoff();
        handoffMode = true; handoffCap = ho.cap || 0;
        isHost = (ho.index === 0); myIndex = ho.index; myCode = ho.code; myToken = ho.token;
        $("lobbyTitle").textContent = "방 유지 — 다른 플레이어 대기 중…";
        $("lobbyCodeWrap").style.display = "none";
        $("rosterInfo").textContent = "";
        setScreen(SCREEN.LOBBY);
        send({ type: "rejoin", code: ho.code, index: ho.index, token: ho.token });
        return;
      }
      const sess = getSession();
      if (sess && sess.code && sess.token != null && sessionFresh(sess)) {
        // 최근 활동 세션이 있으면(새로고침·탭 닫았다 다시 옴) 자동 재접속 시도
        isHost = sess.isHost; myIndex = sess.index; myCode = sess.code; myToken = sess.token;
        $("lobbyTitle").textContent = "이전 게임에 재접속 중…";
        $("lobbyCodeWrap").style.display = "none";
        $("rosterInfo").textContent = "";
        setScreen(SCREEN.LOBBY);
        send({ type: "rejoin", code: sess.code, index: sess.index, token: sess.token });
      } else {
        setScreen(SCREEN.MENU);
      }
    });
    ws.addEventListener("close", () => {
      $("conn").innerHTML = "<span class='bad'>● 서버 연결 끊김</span>";
      if (intentionalNav) return;
      if (!soloMode && myToken != null && (screen === SCREEN.PLAYING || screen === SCREEN.LOBBY)) {
        const _s = getSession();
        if (_s && sessionFresh(_s) && reconnectTries < 4) {
          reconnectTries++;
          $("conn").innerHTML = "<span class='bad'>● 재접속 시도 중… (" + reconnectTries + ")</span>";
          if (reconnectTimer) clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 1200 * reconnectTries);
        } else showMenuWithError("서버 연결이 끊겼습니다.");
      }
    });
    ws.addEventListener("error", () => { $("conn").innerHTML = "<span class='bad'>● 서버에 연결할 수 없습니다</span> (주소/상태 확인)"; });
    ws.addEventListener("message", (ev) => { let m; try { m = JSON.parse(ev.data); } catch { return; } onMessage(m); });
  }

  function onMessage(m) { reconnectTries = 0;
    switch (m.type) {
      case "created":
        isHost = true; myIndex = 0; myCode = m.code; myToken = m.token;
        cfg.count = m.capacity; cfg.jokers = JOKERS; cfg.version = optVersion;
        saveSession();
        $("roomCode").textContent = m.code;
        $("lobbyTitle").textContent = "상대를 기다리는 중…";
        $("lobbyCodeWrap").style.display = "";
        setScreen(SCREEN.LOBBY);
        sendNick();
        break;
      case "joined":
        isHost = false; myIndex = m.index; myCode = m.code; myToken = m.token;
        cfg.count = m.capacity;
        saveSession();
        $("lobbyTitle").textContent = "입장 완료! 시작 대기 중…";
        $("lobbyCodeWrap").style.display = "none";
        setScreen(SCREEN.LOBBY);
        sendNick();
        break;
      case "rejoined": {   // 새로고침 후 재접속 성공
        myIndex = m.index; myCode = m.code; myToken = m.token; isHost = (m.index === 0);
        cfg.count = m.capacity; saveSession();
        restoreConn();
        resetSel();
        if (handoffMode) {
          // 방 유지로 도착 → 이전 게임 상태 복원하지 않고, 전원 모이면 새 게임 시작
          handoffCap = m.capacity;
          if (isHost) { $("lobbyTitle").textContent = "방 유지 — 다른 플레이어 대기 중…"; setScreen(SCREEN.LOBBY); maybeStartHandoff(m.count); }
          else { $("lobbyTitle").textContent = "방 유지됨 — 방장이 곧 새 게임을 시작합니다…"; setScreen(SCREEN.LOBBY); }
          sendNick();
          break;
        }
        if (isHost) {
          try { hostNames = JSON.parse(localStorage.getItem(STATE_KEY + "_n") || "{}"); } catch { hostNames = {}; }
          const g = loadState();
          if (g) { G = g; cfg.version = G.version; cfg.count = G.count; cfg.jokers = G.jokers; broadcast(); }
          else {  // 게임 시작 전(로비)에 새로고침 → 로비로 복귀
            $("roomCode").textContent = m.code; $("lobbyCodeWrap").style.display = "";
            $("lobbyTitle").textContent = "상대를 기다리는 중…";
            setScreen(SCREEN.LOBBY);
          }
        } else {
          // 게스트: 호스트가 view를 다시 보내줄 때까지 대기(호스트는 peer-reconnected로 재전송)
          $("lobbyTitle").textContent = "재접속됨 — 상태 동기화 중…";
          setScreen(SCREEN.LOBBY);
        }
        sendNick();
        break;
      }
      case "rejoin-failed":
        clearSession(); isHost = false; myIndex = myCode = myToken = null;
        showMenuWithError(m.message || "이전 게임에 재접속하지 못했습니다.");
        break;
      case "peer-reconnected":  // 다른 플레이어가 재접속함 → 호스트는 최신 view 재전송
        if (m.index != null) missingPeers.delete(m.index);
        restoreConn();
        hidePeerAlert();
        sendNick();
        if (isHost && G) broadcast();
        break;
      case "peer-disconnected":  // 다른 플레이어 접속 끊김(유예 대기) — 비파괴적 안내
        if (m.index != null) missingPeers.add(m.index);
        $("conn").innerHTML = "<span class='bad'>● 상대 접속 끊김 — 재접속 대기 중…</span>";
        if (screen === SCREEN.PLAYING || screen === SCREEN.OVER) showPeerAlert();  // 호스트는 여기서 '게임 종료' 가능
        break;
      case "ended": clearSession(); showMenuWithError("방장이 게임을 종료했습니다."); break;
      case "roster":
        $("rosterInfo").textContent = `${m.count} / ${m.capacity}명 입장`;
        if (handoffMode && isHost) maybeStartHandoff(m.count);
        break;
      case "nick":
        if (isHost) { hostNames[m.from] = (m.name || "").toString().trim().slice(0, 8); if (G) broadcast(); }
        break;
      case "chat":
        addChatMsg(m.name, m.text, false);
        break;
      case "goto": {  // 방장이 다른 게임으로 이동 → 같은 방 정보를 들고 함께 이동
        const g = ROOM_GAMES.find((x) => x.key === m.game);
        if (g) { saveRoomHandoff(); intentionalNav = true; setTimeout(() => { location.href = handoffUrl(g.file); }, 60); }
        break;
      }
      case "peer-joined":  // 정원 참 → 시작
        resetSel();
        if (isHost) newGame();          // 호스트가 게임 초기화 후 broadcast
        else setScreen(SCREEN.PLAYING); // 게스트는 첫 view 대기
        sendNick();
        break;
      case "view":
        if (!isHost) { handoffMode = false; resetSel(); renderView(m.view); touchSession(); }
        break;
      case "act":
        if (isHost) applyAction(m.a);
        break;
      case "restart":
        if (isHost) { resetSel(); newGame(); }
        break;
      case "error":
        $("menuErr").textContent = m.message || "오류가 발생했습니다.";
        break;
      case "ended":  // 호스트가 상대 이탈 후 게임을 종료함 → 남은 모두 메뉴로
        clearSession();
        if (ws) { try { ws.close(); } catch {} }
        isHost = false; myIndex = myCode = myToken = null;
        hidePeerAlert();
        showMenuWithError("호스트가 게임을 종료했습니다.");
        connect();
        break;
      case "peer-left":
        clearSession();
        hidePeerAlert();
        showMenuWithError("상대가 나갔습니다. 새 방을 만들거나 다시 입장하세요.");
        break;
    }
  }

  // ========================================================================
  //  화면 전환
  // ========================================================================
  function setScreen(s) {
    screen = s;
    if (s === SCREEN.MENU) { soloMode = false; if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; } }  // 메뉴로 나가면 솔로 종료
    document.body.classList.remove("screen-connecting", "screen-menu", "screen-lobby", "screen-playing", "screen-over");
    document.body.classList.add(`screen-${s}`);
    $("board").classList.toggle("hidden", !(s === SCREEN.PLAYING || s === SCREEN.OVER));
    $("menu").classList.toggle("hidden", s !== SCREEN.MENU);
    $("lobby").classList.toggle("hidden", s !== SCREEN.LOBBY);
    $("over").classList.toggle("hidden", s !== SCREEN.OVER);
    // 채팅은 온라인 방(솔로 아님)에서 플레이/결과 화면일 때만 노출
    const inGame = !soloMode && (s === SCREEN.PLAYING || s === SCREEN.OVER);
    $("chatToggle").classList.toggle("hidden", !inGame);
    if (!inGame) { $("chatPanel").classList.add("hidden"); document.body.classList.remove("chat-open"); }
    updateHistoryGuard(s);  // 게임/로비면 뒤로가기 잠금 arm, 아니면 해제
  }
  function showMenuWithError(text) { $("menuErr").textContent = text || ""; setScreen(SCREEN.MENU); }

  // ===== 상대 이탈 배너 + 호스트 게임 종료 =====
  function showPeerAlert() {
    const el = $("peerAlert");
    el.innerHTML = "<span>⚠ 상대 접속이 끊겼어요 — 재접속을 기다리는 중…</span>";
    if (isHost) {  // 호스트만: 기다리지 않고 즉시 게임을 끝낼 수 있다
      const b = document.createElement("button");
      b.textContent = "게임 종료";
      b.addEventListener("click", endGameByHost);
      el.appendChild(b);
    }
    el.classList.remove("hidden");
  }
  function hidePeerAlert() { const el = $("peerAlert"); el.classList.add("hidden"); el.innerHTML = ""; }
  function endGameByHost() {
    send({ type: "ended" });  // 연결된 다른 피어들에게 종료 통지(서버가 중계)
    clearSession();
    if (ws) { try { ws.close(); } catch {} }
    isHost = false; myIndex = myCode = myToken = null;
    hidePeerAlert();
    showMenuWithError("게임을 종료했습니다.");
    connect();
  }
  // 세그먼트 버튼 중 data-v가 val인 것을 활성(on) 처리
  function setSegActive(id, val) {
    const seg = $(id); if (!seg) return;
    [...seg.children].forEach((c) => c.classList.toggle("on", c.getAttribute("data-v") === String(val)));
  }

  function showOver(v) {
    renderGameMeta(v);
    if (v.iWon) {
      $("overTitle").textContent = "🎉 승리!";
      $("overSub").textContent = "최후의 1인으로 살아남았습니다!";
    } else {
      $("overTitle").textContent = "😢 패배";
      const w = v.winner;
      $("overSub").textContent = w != null ? `${labelFor(v, w)}가 승리했습니다.` : "게임 종료.";
    }
    // 호스트는 다시 하기 전에 새 방 없이 모드를 바꿀 수 있다. 게스트는 숨김(호스트 설정을 따름).
    if (isHost) { $("overModeWrap").classList.remove("hidden"); setSegActive("segVersionOver", cfg.version); }
    else $("overModeWrap").classList.add("hidden");
    // 방 유지: 방장·온라인에서만 '다른 게임' 노출(피커는 접어둔 상태로 초기화)
    $("gamePicker").classList.add("hidden");
    $("againBtn").classList.remove("hidden");
    $("otherGameBtn").classList.toggle("hidden", !(isHost && isOnlineRoom()));
    setScreen(SCREEN.OVER);
  }

  // ========================================================================
  //  메뉴 옵션(세그먼트) + 버튼
  // ========================================================================
  function initSeg(id, onPick) {
    const seg = $(id);
    seg.addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      [...seg.children].forEach((c) => c.classList.remove("on"));
      b.classList.add("on");
      onPick(b.getAttribute("data-v"));
    });
  }
  const RULE_NOTES = {
    basic: { title: "BASIC 규칙", summary: "가장 단순한 입문용 — 틀려도 벌칙 없음.", points: [
      "매 턴 더미에서 1장 뽑아 상대 숫자 추리",
      "맞히면 그 타일 공개 후 턴 넘김",
      "틀려도 벌칙 없이 턴 넘김",
    ] },
    plus: { title: "PLUS 규칙", summary: "연속 추리 가능 — 대신 틀리면 내 타일 공개.", points: [
      "매 턴 1장 뽑아 상대 숫자 추리",
      "맞히면 ‘계속 추리 / 멈추기’ 선택",
      "틀리면 방금 뽑은 내 타일 공개",
    ] },
    zion: { title: "ZION 규칙", summary: "흑2·백2 고정 시작 — ‘더블’ 지목 규칙 추가.", points: [
      "흑2·백2로 시작 (턴마다 뽑기 없음)",
      "맞히면 턴 넘김, 틀리면 더미에서 1장 받기",
      "같은 숫자가 나란히 있으면 ‘더블’로 지목",
    ] },
  };
  // 모드 선택 시: 한 줄 요약만 인라인 노출(가독성). 상세는 모달로.
  function updateModeSummary() {
    const r = RULE_NOTES[optVersion];
    $("modeSummaryText").textContent = r ? r.summary : "";
  }
  function openRuleModal() {
    const r = RULE_NOTES[optVersion];
    if (!r) return;
    $("ruleModalTitle").textContent = r.title;
    $("ruleModalList").innerHTML = r.points.map((p) => `<li>${p}</li>`).join("");
    $("ruleModal").classList.remove("hidden");
  }
  function closeRuleModal() { $("ruleModal").classList.add("hidden"); }
  initSeg("segPlayers", (v) => { optPlayers = Number(v); updateCreateLabel(); });
  initSeg("segVersion", (v) => { optVersion = v; updateModeSummary(); });
  // 종료 화면의 모드 선택(호스트) — 새 방 없이 모드만 바꿔 재시작. cfg.version에 바로 반영.
  initSeg("segVersionOver", (v) => { optVersion = v; cfg.version = v; setSegActive("segVersion", v); updateModeSummary(); });
  updateModeSummary();
  updateCreateLabel();
  $("nickInput").value = myNick;
  $("nickInput").addEventListener("input", () => { myNick = $("nickInput").value.trim().slice(0, 8); try { localStorage.setItem("bg_nick", myNick); } catch {} });
  $("ruleMoreBtn").addEventListener("click", openRuleModal);
  $("ruleModalClose").addEventListener("click", closeRuleModal);
  $("ruleModal").addEventListener("click", (e) => { if (e.target === $("ruleModal")) closeRuleModal(); });

  $("createBtn").addEventListener("click", () => {
    $("menuErr").textContent = "";
    if (optPlayers === 1) { startSolo(); return; }  // 1명 = 서버 없이 즉시 솔로(vs 컴퓨터)
    // reconnect:true → 서버가 끊겨도 유예 시간 동안 방 유지(새로고침 재접속 대비)
    send({ type: "create", capacity: optPlayers, reconnect: true });  // jokers는 호스트 로컬(cfg)에 보관
  });
  $("joinBtn").addEventListener("click", () => {
    const code = $("codeInput").value.trim().toUpperCase();
    if (code.length !== 4) { $("menuErr").textContent = "4자리 코드를 입력하세요."; return; }
    $("menuErr").textContent = "";
    const s = getSession();
    if (s && s.code === code && s.token != null) {
      // 입력한 코드가 '내가 있던 방'이면 새 자리 대신 원래 자리로 재접속(실수로 나갔다가 코드로 복귀)
      isHost = s.isHost; myIndex = s.index; myCode = s.code; myToken = s.token;
      $("lobbyTitle").textContent = "이전 게임에 재접속 중…";
      $("lobbyCodeWrap").style.display = "none";
      setScreen(SCREEN.LOBBY);
      send({ type: "rejoin", code: s.code, index: s.index, token: s.token });
    } else {
      send({ type: "join", code });
    }
  });
  $("codeInput").addEventListener("keydown", (e) => { if (e.code === "Enter") $("joinBtn").click(); });
  $("gameCodeWrap").addEventListener("click", () => {  // 상단 코드 탭 → 복사
    if (!myCode) return;
    navigator.clipboard?.writeText(myCode).then(() => {
      const b = $("gameCode"); b.textContent = "복사됨"; setTimeout(() => (b.textContent = myCode), 1000);
    }).catch(() => {});
  });
  $("copyBtn").addEventListener("click", () => {
    const code = $("roomCode").textContent;
    navigator.clipboard?.writeText(code).then(() => {
      const b = $("copyBtn"), old = b.textContent; b.textContent = "복사됨!"; setTimeout(() => (b.textContent = old), 1200);
    }).catch(() => {});
  });
  $("cancelBtn").addEventListener("click", () => {
    clearSession();  // 명시적 나가기 → 재접속 세션 폐기
    if (ws) { try { ws.close(); } catch {} }
    isHost = false; myIndex = myCode = myToken = null; connect();
  });
  $("toMenuBtn").addEventListener("click", () => {
    if (!confirm("게임을 종료하고 게임 메뉴로 나갈까요?")) return;
    clearSession(); intentionalNav = true;  // 세션 폐기 후 이 게임을 새로(방 코드 없이) 로드 → 게임 메뉴
    const cur = new URLSearchParams(location.search); const q = new URLSearchParams();
    if (cur.get("server")) q.set("server", cur.get("server"));
    if (cur.has("debug")) q.set("debug", cur.get("debug") || "1");
    location.href = location.pathname + (q.toString() ? "?" + q.toString() : "");
  });
  $("npCancel").addEventListener("click", () => { resetSel(); renderView(lastView); });
  $("decide").addEventListener("click", (e) => {
    const c = e.target.getAttribute("data-choice");
    if (c) dispatch({ action: "decide", choice: c });
  });
  $("againBtn").addEventListener("click", () => {
    resetSel();
    if (isHost) newGame();
    else send({ type: "restart", to: 0 });
  });

  // ===== 진단 훅 (?debug 일 때만) =====
  if (location.search.includes("debug")) {
    window.__dbg = () => ({
      screen, isHost, myIndex,
      turn: lastView && lastView.turn, myTurn: lastView && lastView.myTurn,
      phase: lastView && lastView.phase, winner: lastView && lastView.winner,
      version: lastView && lastView.version,
      poolCount: lastView && lastView.poolCount, count: lastView && lastView.count,
      myCount: lastView && lastView.my.length,
      othersCounts: lastView && lastView.others.map((o) => o.tiles.length),
    });
    window.__act = (a) => dispatch(a);
    window.__view = () => lastView;
    window.__truth = () => (isHost ? G : null);  // 호스트만: 테스트가 정답을 알도록
    window.__goto = (k) => gotoGame(k);           // 방 유지 이동 테스트용
    window.__st = () => ({ screen, isHost, myIndex, myCode, handoffMode, intentionalNav, count: cfg.count, missing: missingPeers.size });
  }

  // ===== 실수 이탈 방지 + 재접속 =====
  // (1) 새로고침/창닫기: 브라우저 기본 확인창(재접속으로 복원되지만 실수 방지).
  window.addEventListener("beforeunload", (e) => {
    if (intentionalNav) return;  // 방 유지 이동 등 의도적 이동은 확인창 없이 진행
    if (screen === SCREEN.PLAYING || screen === SCREEN.LOBBY) { e.preventDefault(); e.returnValue = ""; }
  });

  // (2) 뒤로가기 잠금: 게임/로비 진입 시 히스토리 항목을 하나 밀어넣어 뒤로가기가 페이지를
  //     떠나지 않고 popstate로 잡히게 한다. 실수로 한 번 누르면 머물고, 2.5초 안에 한 번 더
  //     누르면 실제로 나간다(의도적 이탈).
  let historyGuardArmed = false, lastBackAt = 0;
  function updateHistoryGuard(s) {
    const inGame = (s === SCREEN.PLAYING || s === SCREEN.LOBBY);
    if (inGame && !historyGuardArmed) { history.pushState({ davinci: "guard" }, ""); historyGuardArmed = true; }
    else if (!inGame) { historyGuardArmed = false; }  // 메뉴/결과면 잠금 해제(재진입 시 다시 arm)
  }
  window.addEventListener("popstate", () => {
    if (!(screen === SCREEN.PLAYING || screen === SCREEN.LOBBY)) return;
    const now = Date.now();
    if (now - lastBackAt < 2500) {  // 두 번째 뒤로가기 → 실제 나가기
      clearSession();
      if (ws) { try { ws.close(); } catch {} }
      historyGuardArmed = false;
      history.back();               // 우리가 넣은 항목 이전(진짜 이전 페이지)으로
      return;
    }
    lastBackAt = now;
    history.pushState({ davinci: "guard" }, "");  // 다시 밀어넣어 현재 화면 유지(이탈 차단)
    flashToast("한 번 더 ‘뒤로가기’를 누르면 게임에서 나갑니다");
  });

  // (3) bfcache 복원(뒤로/앞으로 이동으로 얼어붙었던 페이지가 되살아난 경우): 소켓이 죽어 있으면
  //     재접속 → open 시 세션이 있으면 자동 rejoin.
  window.addEventListener("pageshow", (e) => {
    // 솔로(vs 컴퓨터)는 서버가 필요 없다. bfcache 복원 시 재접속하면 진행 중이던 솔로 게임이
    // 메뉴로 초기화되므로, 온라인 세션(myToken 보유)일 때만 재연결한다.
    if (e.persisted && !soloMode && myToken != null && (!ws || ws.readyState > WebSocket.OPEN)) connect();
  });

  // 간단 토스트(자동 사라짐)
  let toastTimer = null;
  function flashToast(msg) {
    let t = document.getElementById("toast");
    if (!t) { t = document.createElement("div"); t.id = "toast"; document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
  }

  // ── 채팅/이모지 (온라인 방에서만) ──
  const EMOJIS = ["👍", "😂", "😮", "😢", "🎉", "❤️"];
  let chatUnread = 0;
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function addChatMsg(name, text, mine) {
    const feed = $("chatFeed"); const d = document.createElement("div"); d.className = "cmsg" + (mine ? " mine" : "");
    d.innerHTML = `<b>${escapeHtml(name || "상대")}</b>${escapeHtml(text)}`; feed.appendChild(d);
    while (feed.children.length > 40) feed.removeChild(feed.firstChild); feed.scrollTop = feed.scrollHeight;
    if (!mine && $("chatPanel").classList.contains("hidden")) { chatUnread++; const b = $("chatBadge"); b.textContent = chatUnread > 9 ? "9+" : chatUnread; b.classList.remove("hidden"); }
  }
  function sendChat(text) { text = String(text).trim().slice(0, 60); if (!text || !myCode) return; send({ type: "chat", name: myNick, text }); addChatMsg(myNick || "나", text, true); }
  (function initChat() {
    const er = $("chatEmojis"); EMOJIS.forEach((e) => { const b = document.createElement("button"); b.className = "chatEmoji"; b.textContent = e; b.addEventListener("click", () => sendChat(e)); er.appendChild(b); });
    function setChat(open) {
      $("chatPanel").classList.toggle("hidden", !open);
      document.body.classList.toggle("chat-open", open);
      if (open) { chatUnread = 0; $("chatBadge").classList.add("hidden"); const ms = $("mySide"); if (ms) ms.scrollIntoView({ block: "start", behavior: "smooth" }); }
    }
    $("chatToggle").addEventListener("click", () => setChat($("chatPanel").classList.contains("hidden")));
    $("chatClose").addEventListener("click", () => setChat(false));
    $("chatSend").addEventListener("click", () => { sendChat($("chatInput").value); $("chatInput").value = ""; });
    $("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") { sendChat($("chatInput").value); $("chatInput").value = ""; } });
  })();

  // ── 방 유지: 게임을 마친 뒤 같은 서버 방을 유지한 채 다른 게임으로 이동 ──
  const THIS_GAME = "davinci";
  const ROOM_GAMES = [
    { key: "davinci",    file: "davinci.html",    label: "🔎 다빈치코드", min: 2, max: 4 },
    { key: "loveletter", file: "loveletter.html", label: "💌 러브레터",   min: 2, max: 4 },
    { key: "oncard",     file: "oncard.html",     label: "🃏 원카드",     min: 2, max: 4 },
    { key: "nothanks",   file: "nothanks.html",   label: "🙅 노땡스",     min: 2, max: 4 },
    { key: "sixnimmt",   file: "sixnimmt.html",   label: "🐂 젝스님트",   min: 2, max: 4 },
    { key: "setgame",    file: "setgame.html",    label: "🔺 세트",       min: 2, max: 4 },
    { key: "incan",      file: "incangold.html",  label: "💎 잉카의 황금", min: 2, max: 4 },
    { key: "hanabi",     file: "hanabi.html",     label: "🎆 하나비",     min: 2, max: 4 },
    { key: "pointsalad", file: "pointsalad.html", label: "🥗 포인트 샐러드", min: 2, max: 4 },
    { key: "splendor",   file: "splendor.html",   label: "💠 스플렌더",   min: 2, max: 4 },
    { key: "rummikub",   file: "rummikub.html",   label: "🁴 루미큐브",   min: 2, max: 4 },
    { key: "hallicups",  file: "hallicups.html",  label: "🥤 할리갈리 컵스", min: 2, max: 4 },
    { key: "ubongo",     file: "ubongo.html",     label: "🧩 우봉고",     min: 2, max: 4 },
    { key: "carcassonne", file: "carcassonne.html", label: "🏰 카르카손", min: 2, max: 4 },
    { key: "baseball",   file: "baseball.html",   label: "🔢 숫자야구",   min: 2, max: 2 },
    { key: "grid",       file: "gridgames.html",  label: "🔷 격자 대전",  min: 2, max: 2 },
    { key: "battleship", file: "battleship.html", label: "🚢 배틀십",     min: 2, max: 2 },
  ];
  const ROOM_HANDOFF_MS = 90 * 1000;  // 이동 후 도착까지 유효 시간(핸드오프 전용)
  function roomCap() { return cfg.count || handoffCap || 2; }
  function isOnlineRoom() { return !soloMode && !!myCode && myIndex != null && myToken != null; }
  function saveRoomHandoff() {
    if (!isOnlineRoom()) return;
    try { localStorage.setItem("bg_room", JSON.stringify({ code: myCode, index: myIndex, token: myToken, cap: roomCap(), ts: Date.now() })); } catch {}
  }
  function getRoomHandoff() {
    try { const r = JSON.parse(localStorage.getItem("bg_room") || "null");
      if (r && r.code && r.token != null && (Date.now() - r.ts) < ROOM_HANDOFF_MS) return r; } catch {}
    return null;
  }
  function clearRoomHandoff() { try { localStorage.removeItem("bg_room"); } catch {} }
  function handoffUrl(file) {  // ?room=1 + 기존 server/debug 파라미터 이어받기(커스텀 서버·테스트 유지)
    const cur = new URLSearchParams(location.search); const q = new URLSearchParams(); q.set("room", "1");
    if (cur.get("server")) q.set("server", cur.get("server"));
    if (cur.has("debug")) q.set("debug", cur.get("debug") || "1");
    return file + "?" + q.toString();
  }
  function gotoGame(key) {
    const g = ROOM_GAMES.find((x) => x.key === key); if (!g) return;
    if (missingPeers.size > 0) { flashToast("접속이 끊긴 사람이 있어 방을 유지할 수 없어요. 새 방을 만들어 주세요."); return; }
    saveRoomHandoff();
    send({ type: "goto", game: key });   // 방 전체에 이동 알림(브로드캐스트)
    intentionalNav = true;
    setTimeout(() => { location.href = handoffUrl(g.file); }, 150);  // 메시지 전송 보장 후 이동
  }
  function maybeStartHandoff(count) {  // 호스트: 전원 복귀 시 새 게임 시작
    if (!handoffMode || !isHost) return;
    if (count >= (handoffCap || cfg.count)) {
      handoffMode = false;
      resetSel();
      cfg.count = handoffCap || cfg.count; cfg.version = optVersion; cfg.jokers = JOKERS;
      newGame();     // G 생성 + broadcast → 호스트 PLAYING, 게스트는 view 수신
      sendNick();
    }
  }
  function openGamePicker() {
    // 접속이 끊긴 사람이 있으면 방 유지로 새 게임을 시작할 수 없다(정원이 다 모여야 시작되므로).
    if (missingPeers.size > 0) {
      flashToast("접속이 끊긴 사람이 있어 방을 유지한 채 다른 게임을 시작할 수 없어요. 재접속을 기다리거나 새 방을 만들어 주세요.");
      return;
    }
    const cap = roomCap();
    const list = ROOM_GAMES.filter((g) => g.key !== THIS_GAME && cap >= g.min && cap <= g.max);
    const box = $("gamePicker"); box.innerHTML = "";
    list.forEach((g) => {
      const b = document.createElement("button"); b.className = "btn"; b.textContent = g.label;
      b.addEventListener("click", () => gotoGame(g.key)); box.appendChild(b);
    });
    const cancel = document.createElement("button"); cancel.className = "btn"; cancel.textContent = "취소"; cancel.style.opacity = ".8";
    cancel.addEventListener("click", () => { box.classList.add("hidden"); $("otherGameBtn").classList.remove("hidden"); $("againBtn").classList.remove("hidden"); });
    box.appendChild(cancel);
    box.classList.remove("hidden");
    $("otherGameBtn").classList.add("hidden"); $("againBtn").classList.add("hidden");
  }
  $("otherGameBtn").addEventListener("click", openGamePicker);

  // ===== 시작 =====
  setScreen(SCREEN.MENU);
  // 방 유지 이동(?room)이나 재접속할 최근 세션이 있을 때만 즉시 연결한다.
  // 순수 솔로(vs 컴퓨터) 방문에선 불필요한 연결 시도와 "연결 실패" 배지를 피한다(온라인 선택 시 연결).
  { const _room = new URLSearchParams(location.search).get("room"); const _s = getSession(); if (_room || (_s && sessionFresh(_s))) connect(); }
})();
</script>
</body>
