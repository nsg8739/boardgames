<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 탁구로봇과 탁구 대결</title>
<meta property="og:type" content="website" /><meta property="og:locale" content="ko_KR" />
<meta property="og:site_name" content="보드게임 모음" />
<meta property="og:title" content="탁구 (AI 대결)" />
<meta property="og:description" content="AI 탁구로봇과 혼자 즐기는 1인용 탁구. 오프라인에서도 바로." />
<meta property="og:url" content="https://nsg8739.github.io/boardgames/pong.html" />
<meta property="og:image" content="https://nsg8739.github.io/boardgames/og-pong.png" />
<meta property="og:image:width" content="1200" /><meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" /><meta name="twitter:image" content="https://nsg8739.github.io/boardgames/og-pong.png" />
<style>
  html, body {
    margin: 0;
    min-height: 100%;
    background: #0d1117;
    color: #e6edf3;
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding: 16px;
    box-sizing: border-box;
    /* 게임은 한 화면에 맞춰지므로 스크롤이 필요 없음.
       캔버스 밖을 드래그할 때 페이지가 패닝되거나(특히 전체화면에서 화면이 움직임)
       가장자리에서 당겨지는 바운스가 생기는 것을 막는다. 버튼 탭에는 영향 없음. */
    overscroll-behavior: none;
    touch-action: none;
  }
  h1 {
    font-weight: 600;
    font-size: clamp(16px, 5vw, 20px); /* 화면이 좁으면 제목 글자도 작아짐 */
    margin: 0 0 12px;
    letter-spacing: 1px;
    text-align: center;
  }
  /* AI 로봇 캐릭터 영역. min-height로 말풍선이 떠도 레이아웃이 흔들리지 않게 함 */
  #robot {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 64px;
    margin-bottom: 8px;
  }
  .eye { animation: blink 4s infinite; } /* 눈 깜빡임 */
  @keyframes blink {
    0%, 92%, 100% { opacity: 1; }
    95% { opacity: 0.15; }
  }
  #bubble {
    position: relative;
    background: #ffffff;
    color: #161b22;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    max-width: 280px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
  }
  #bubble.show { opacity: 1; transform: translateY(0); }
  /* 말풍선 꼬리(로봇 쪽을 향함) */
  #bubble::after {
    content: "";
    position: absolute;
    left: -7px;
    top: 50%;
    transform: translateY(-50%);
    border: 7px solid transparent;
    border-right-color: #ffffff;
  }
  #stage {
    position: relative; /* 오버레이를 캔버스 위에 겹치기 위한 기준 */
  }
  #game {
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    touch-action: none;
    cursor: none;
    display: block;
    /* 반응형: canvas는 width/height 속성(800x500)으로 고유 크기·비율을 가지므로,
       width/height를 auto로 두고 max-width·max-height만 주면 두 제약 안에서
       비율(8:5)을 유지하며 축소된다(반응형 이미지와 동일한 replaced-element 맞춤).
       max-height가 없으면 세로 모드에서 너비가 커진 만큼 캔버스 높이도 커져
       제목·로봇·안내까지 한 화면에 안 들어옴 → 뷰포트 높이에서 UI 몫(약 210px)을 뺀 값으로 상한. */
    width: auto;
    height: auto;
    max-width: 94vw;
    max-height: calc(100vh - 210px);  /* dvh 미지원 브라우저 폴백 */
    max-height: calc(100dvh - 210px); /* 모바일 주소창 변화를 반영하는 동적 뷰포트 높이 */
  }
  /* 난이도 선택 팝업: 캔버스를 반투명하게 덮음 */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(13, 17, 23, 0.85);
    border-radius: 8px;
    cursor: default;
  }
  #overlay.hidden { display: none; }
  #ovTitle { font-size: 28px; font-weight: 700; }
  #ovSub { font-size: 14px; color: #8b949e; margin-top: -6px; }
  #diffButtons { display: flex; gap: 10px; }
  button.diff, #startBtn {
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #21262d;
    color: #e6edf3;
    padding: 10px 20px;
    font-size: 15px;
    transition: filter 0.1s;
  }
  button.diff.active { background: #1f6feb; border-color: #1f6feb; }
  #startBtn {
    background: #238636;
    border-color: #238636;
    font-weight: 600;
    padding: 12px 32px;
    font-size: 16px;
    margin-top: 4px;
  }
  button.diff:hover, #startBtn:hover { filter: brightness(1.2); }
  /* 2인 온라인 대전(versus.html / davinci.html)으로 가는 링크 */
  .versusLink {
    margin-top: 10px;
    color: #58a6ff;
    font-size: 14px;
    text-decoration: none;
    border-bottom: 1px dashed #30363d;
  }
  .versusLink:hover { filter: brightness(1.3); }
  #hint {
    margin-top: 12px;
    font-size: 13px;
    color: #8b949e;
    text-align: center;
    line-height: 1.6;
  }
  kbd {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
  }
  /* 전체화면 토글 버튼: 화면 우상단에 고정. 게임 영역과 겹치지 않게 반투명 처리 */
  #fsBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 10;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #30363d;
    border-radius: 6px;
    background: rgba(33, 38, 45, 0.8);
    color: #e6edf3;
    padding: 6px 10px;
    font-size: 16px;
    line-height: 1;
  }
  #fsBtn:hover { filter: brightness(1.3); }
  .touch-only { display: none; } /* 터치 기기에서만 보이는 안내 문구 */
  @media (pointer: coarse) {
    .touch-only { display: inline; }
  }
  /* 세로(portrait) 또는 낮은 화면: 위아래 UI 여백을 줄여 캔버스까지 한 화면에 들어오게.
     justify-content를 flex-start로 두어 살짝 넘쳐도 상단이 잘리지 않게 함. */
  @media (orientation: portrait), (max-height: 560px) {
    body { padding: 8px; justify-content: flex-start; }
    h1 { margin: 4px 0 6px; }
    #robot { min-height: 48px; margin-bottom: 4px; }
    #robot svg { width: 48px; height: 48px; }
    #hint { margin-top: 8px; font-size: 12px; line-height: 1.5; }
    #game {
      max-height: calc(100vh - 168px);
      max-height: calc(100dvh - 168px);
    }
  }
</style>
</head>
<body>
  <button id="fsBtn" type="button" title="전체화면 (F)" aria-label="전체화면 전환">⛶</button>
  <h1>🏓 AI 탁구로봇과 탁구 대결</h1>

  <!-- AI 탁구로봇 캐릭터 + 도발 말풍선 -->
  <div id="robot">
    <svg width="64" height="64" viewBox="0 0 70 70" aria-label="AI 탁구로봇">
      <!-- 안테나 -->
      <line x1="35" y1="4" x2="35" y2="16" stroke="#8b949e" stroke-width="2" />
      <circle cx="35" cy="4" r="3.5" fill="#f85149" />
      <!-- 머리 -->
      <rect x="11" y="15" width="48" height="42" rx="11" fill="#30363d" stroke="#8b949e" stroke-width="2" />
      <!-- 눈 -->
      <circle class="eye" cx="26" cy="34" r="6" fill="#58a6ff" />
      <circle class="eye" cx="44" cy="34" r="6" fill="#58a6ff" />
      <!-- 입 -->
      <rect x="24" y="46" width="22" height="4" rx="2" fill="#8b949e" />
    </svg>
    <div id="bubble"></div>
  </div>

  <div id="stage">
    <canvas id="game" width="800" height="500"></canvas>
    <!-- 시작/종료 시 캔버스 위에 뜨는 난이도 선택 팝업 -->
    <div id="overlay">
      <div id="ovTitle">시작하기</div>
      <div id="ovSub">난이도를 고르세요</div>
      <div id="diffButtons">
        <button class="diff" data-d="1">쉬움</button>
        <button class="diff" data-d="2">보통</button>
        <button class="diff" data-d="3">어려움</button>
      </div>
      <button id="startBtn">시작 ▶</button>
      <a class="versusLink" href="./index.html">🎲 다른 게임 (메인으로)</a>
    </div>
  </div>
  <div id="hint">
    마우스(또는 터치)·<kbd>↑</kbd> <kbd>↓</kbd>로 패들 이동 ·
    공을 받을수록 게이지가 차고 가득 차면 <b style="color:#f2cc60">자동 스매시 ⚡</b> · AI도 가끔 <b style="color:#f2cc60">강타</b>하니 주의!<br />
    <kbd>Space</kbd> 시작 / 일시정지 · <kbd>M</kbd> 음소거 · <kbd>F</kbd> 전체화면 · 먼저 <b>7점</b> 내면 승리
  </div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;

  // ===== 설정값 (감각·난이도 조정은 여기서) =====
  const PADDLE_W = 12;
  const PADDLE_H = 90;
  const PADDLE_MARGIN = 24;
  const PLAYER_SPEED = 9;
  const BALL_SPEED_UP = 1.04;
  const BALL_SPEED_MAX = 14;
  const SMASH_MULTIPLIER = 1.9;
  const SMASH_SPEED_MAX = 22;
  const SMASH_GAUGE_MAX = 3;      // 공을 이만큼 받으면 게이지가 가득 차고, 다음 타구가 자동 스매시
  const WIN_SCORE = 7;
  const AI_SMASH_MIN_RALLY = 3;   // AI는 랠리가 이만큼 이어진 뒤부터 스매시 시도(서브 직후 첫 응수부터 강타 방지)

  // 난이도별 AI 속도·공 초기 속도·AI 스매시 확률(매 응수마다 판정, 0이면 스매시 안 함)
  const DIFFICULTIES = {
    1: { name: "쉬움",   aiSpeed: 5.5, ballSpeed: 6, smashChance: 0    },
    2: { name: "보통",   aiSpeed: 6,   ballSpeed: 6, smashChance: 0.12 },
    3: { name: "어려움", aiSpeed: 8,   ballSpeed: 7, smashChance: 0.25 },
  };
  let difficulty = 2; // 기본 보통

  // 점점 빨라지는 모드: 랠리가 길어질수록 전체 속도에 곱해지는 배율
  const RAMP_PER_SECOND = 0.05;   // 1초당 5%씩 빨라짐
  const RAMP_MAX = 1.8;           // 최대 1.8배까지만

  // ===== 기록 (브라우저 localStorage에 저장) =====
  // try/catch: 일부 환경(프라이빗 모드 등)에서 localStorage 접근이 막힐 수 있음
  function loadRecord(key) {
    try { return parseInt(localStorage.getItem(key) || "0", 10) || 0; }
    catch (e) { return 0; }
  }
  function saveRecord(key, val) {
    try { localStorage.setItem(key, String(val)); } catch (e) { /* 저장 불가 시 무시 */ }
  }
  let bestRally = loadRecord("pp_bestRally");
  let winStreak = loadRecord("pp_winStreak");

  // ===== 상태 =====
  const STATE = { READY: "ready", PLAYING: "playing", PAUSED: "paused", OVER: "over" };
  let state = STATE.READY;
  let winnerText = "";
  let muted = false;

  // 세로 모드 여부: 세로에선 캔버스가 작게 축소되므로 점수 글자를 키워 가독성을 높인다.
  // matchMedia는 회전 시 change 이벤트로 갱신 → 매 프레임 계산하지 않아도 됨.
  let portrait = false;
  const portraitMQ = window.matchMedia("(orientation: portrait)");
  const updateOrientation = () => { portrait = portraitMQ.matches; };
  updateOrientation();
  portraitMQ.addEventListener("change", updateOrientation);

  const player = { x: PADDLE_MARGIN, y: H / 2 - PADDLE_H / 2, score: 0, h: PADDLE_H };
  const ai = { x: W - PADDLE_MARGIN - PADDLE_W, y: H / 2 - PADDLE_H / 2, score: 0, h: PADDLE_H };
  const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: 8, smash: false };

  let rally = 0;            // 현재 주고받은 횟수
  let speedScale = 1;       // 점점 빨라지는 배율(랠리 동안 누적)
  let rallyTimer = 0;       // 현재 랠리 경과 시간(초)

  const keys = { up: false, down: false };
  let smashGauge = 0; // 0 ~ SMASH_GAUGE_MAX. 가득 차면 다음 타구가 자동 스매시

  // ===== 난이도 선택 팝업(overlay) 제어 =====
  const overlay = document.getElementById("overlay");
  const ovTitle = document.getElementById("ovTitle");
  const ovSub = document.getElementById("ovSub");
  const startBtn = document.getElementById("startBtn");
  const diffButtons = document.querySelectorAll("button.diff");

  function updateDiffButtons() {
    diffButtons.forEach((b) => b.classList.toggle("active", Number(b.dataset.d) === difficulty));
  }
  function showOverlay(title, sub) {
    ovTitle.textContent = title;
    ovSub.textContent = sub;
    updateDiffButtons();
    overlay.classList.remove("hidden");
  }
  function hideOverlay() { overlay.classList.add("hidden"); }

  // ===== AI 로봇 도발 멘트 =====
  const bubble = document.getElementById("bubble");
  let bubbleTimer = null;
  const TAUNTS = {
    start:       ["내 공격을 받아랏!", "오늘은 안 봐준다, 인간!", "준비됐나? 시작하지!", "내 서브를 막아보시지!"],
    aiScore:     ["이건 못 받겠지?", "하하! 너무 느린데?", "이게 로봇의 실력이다!", "내 승리는 정해져 있다!"],
    playerScore: ["인간~ 쫌 하는데?", "바, 방심했을 뿐이다!", "운이 좋았군!", "다음 공은 못 막는다!"],
    rally:       ["제법 버티는군!", "오~ 끈질긴데?", "이 정도로는 안 끝나지!"],
    aiSmash:     ["받아랏, 강타!", "이건 못 막지!", "스매시!! 하하!", "로봇의 필살기다!"],
    aiWin:       ["역시 로봇의 승리! 하하!", "인간은 아직 멀었군.", "기계는 지치지 않는다!"],
    playerWin:   ["크윽... 다음엔 안 진다!", "인간 승리... 인정한다.", "재대결을 신청한다!"],
  };
  function sayRobot(lines) {
    const msg = lines[Math.floor(Math.random() * lines.length)];
    bubble.textContent = msg;
    bubble.classList.add("show");
    clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => bubble.classList.remove("show"), 2600);
  }

  // 난이도 버튼 클릭
  diffButtons.forEach((b) => {
    b.addEventListener("click", () => { difficulty = Number(b.dataset.d); updateDiffButtons(); });
  });
  // 시작 버튼 클릭
  startBtn.addEventListener("click", () => { ensureAudio(); startGame(); });

  // 화면 흔들림(스매시·득점 시)
  let shake = 0;

  // 공 잔상: 최근 위치 몇 개를 저장
  const trail = [];

  // 파티클(충돌 이펙트)
  const particles = [];

  // 파워업 아이템: 화면에 떠 있다가 공이 닿으면 발동
  let item = null;            // {x, y, r, type}
  let itemTimer = 0;          // 다음 아이템 등장까지 카운트(초)
  const ITEM_TYPES = ["bigPaddle", "slowBall", "smallAI"];
  const activeEffects = {};   // {effectType: 남은시간(초)}

  // 장애물: 가운데에서 위아래로 움직이는 벽
  const obstacle = { x: W / 2 - 7, y: H / 2 - 35, w: 14, h: 70, vy: 3 };

  // ===== 사운드 (Web Audio로 즉석 생성, 음원 파일 불필요) =====
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  // 짧은 비프음 한 방. freq=음높이, dur=길이, type=파형
  function beep(freq, dur, type = "square", vol = 0.15) {
    if (muted || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }
  const sfx = {
    hit:    () => beep(440, 0.06),
    wall:   () => beep(300, 0.05),
    smash:  () => beep(660, 0.12, "sawtooth", 0.2),
    score:  () => beep(200, 0.25, "triangle", 0.2),
    item:   () => beep(880, 0.15, "sine", 0.2),
    win:    () => { beep(523, 0.15); setTimeout(() => beep(784, 0.3), 150); },
  };

  // ===== 헬퍼 =====
  function randRange(min, max) { return Math.random() * (max - min) + min; }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = randRange(0, Math.PI * 2);
      const sp = randRange(1, 5);
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, color,
      });
    }
  }

  function resetBall(serveDir) {
    const base = DIFFICULTIES[difficulty].ballSpeed;
    ball.x = W / 2;
    ball.y = H / 2;
    const angle = (Math.random() * 0.5 - 0.25) * Math.PI;
    ball.vx = serveDir * base * Math.cos(angle);
    ball.vy = base * Math.sin(angle);
    ball.smash = false;
    rally = 0;
    rallyTimer = 0;
    speedScale = 1;
    trail.length = 0;
  }

  function startGame() {
    player.score = 0;
    ai.score = 0;
    player.h = PADDLE_H;
    ai.h = PADDLE_H;
    player.y = H / 2 - PADDLE_H / 2;
    smashGauge = 0;
    ai.y = H / 2 - PADDLE_H / 2;
    winnerText = "";
    item = null;
    itemTimer = randRange(4, 8);
    for (const k in activeEffects) delete activeEffects[k];
    resetBall(Math.random() < 0.5 ? -1 : 1);
    state = STATE.PLAYING;
    hideOverlay();
    sayRobot(TAUNTS.start);
  }

  function hitsPaddle(p) {
    return (
      ball.x - ball.r < p.x + PADDLE_W &&
      ball.x + ball.r > p.x &&
      ball.y - ball.r < p.y + p.h &&
      ball.y + ball.r > p.y
    );
  }

  function bounceFrom(p, dir, isSmash) {
    const relative = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
    let speed = Math.hypot(ball.vx, ball.vy) * BALL_SPEED_UP;
    if (isSmash) {
      speed = Math.min(speed * SMASH_MULTIPLIER, SMASH_SPEED_MAX);
      ball.smash = true;
      shake = 12;
      spawnParticles(ball.x, ball.y, "#f2cc60", 18);
      sfx.smash();
    } else {
      speed = Math.min(speed, BALL_SPEED_MAX);
      ball.smash = false;
      spawnParticles(ball.x, ball.y, dir > 0 ? "#58a6ff" : "#f85149", 8);
      sfx.hit();
    }
    const bounceAngle = relative * (Math.PI / 4);
    ball.vx = dir * speed * Math.cos(bounceAngle);
    ball.vy = speed * Math.sin(bounceAngle);

    rally++;
    if (rally > bestRally) { bestRally = rally; saveRecord("pp_bestRally", bestRally); }
    // 랠리가 길어지면 가끔 도발(매 타격마다 뜨면 시끄러우므로 특정 횟수에만)
    if (rally === 6 || rally === 12) sayRobot(TAUNTS.rally);
  }

  function applyItem(type) {
    sfx.item();
    spawnParticles(item.x, item.y, "#a371f7", 16);
    if (type === "bigPaddle") { player.h = PADDLE_H * 1.6; activeEffects.bigPaddle = 8; }
    else if (type === "slowBall") { activeEffects.slowBall = 6; }
    else if (type === "smallAI") { ai.h = PADDLE_H * 0.55; activeEffects.smallAI = 8; }
    item = null;
    itemTimer = randRange(6, 11);
  }

  function expireEffect(type) {
    if (type === "bigPaddle") player.h = PADDLE_H;
    if (type === "smallAI") ai.h = PADDLE_H;
  }

  // ===== 업데이트 (dt: 직전 프레임과의 시간차, 초 단위) =====
  function update(dt) {
    if (state !== STATE.PLAYING) {
      if (shake > 0) shake = Math.max(0, shake - 1);
      return;
    }

    // 효과 만료 처리
    for (const k in activeEffects) {
      activeEffects[k] -= dt;
      if (activeEffects[k] <= 0) { delete activeEffects[k]; expireEffect(k); }
    }

    // 시간 기준 이동 배율: 60fps에서 1, 120fps에서 0.5. 기기 주사율과 무관하게 속도 일정
    const f = dt * 60;

    // 플레이어 이동
    if (keys.up) player.y -= PLAYER_SPEED * f;
    if (keys.down) player.y += PLAYER_SPEED * f;
    player.y = Math.max(0, Math.min(H - player.h, player.y));


    // AI 이동
    const aiSpeed = DIFFICULTIES[difficulty].aiSpeed;
    const aiCenter = ai.y + ai.h / 2;
    if (aiCenter < ball.y - 10) ai.y += aiSpeed * f;
    else if (aiCenter > ball.y + 10) ai.y -= aiSpeed * f;
    ai.y = Math.max(0, Math.min(H - ai.h, ai.y));

    // 점점 빨라지는 모드: 랠리가 지속되는 동안 배율 상승
    rallyTimer += dt;
    speedScale = Math.min(RAMP_MAX, 1 + rallyTimer * RAMP_PER_SECOND);

    // slowBall 효과 중이면 속도 절반. f를 곱해 시간 기준으로 이동
    const moveScale = speedScale * (activeEffects.slowBall ? 0.5 : 1) * f;

    // 공 이동(잔상 기록 후)
    trail.push({ x: ball.x, y: ball.y });
    if (trail.length > 12) trail.shift();
    ball.x += ball.vx * moveScale;
    ball.y += ball.vy * moveScale;

    // 위/아래 벽
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; sfx.wall(); }
    else if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy *= -1; sfx.wall(); }

    // 장애물 이동 + 충돌
    obstacle.y += obstacle.vy * f;
    if (obstacle.y < 60 || obstacle.y + obstacle.h > H - 60) obstacle.vy *= -1;
    if (
      ball.x + ball.r > obstacle.x && ball.x - ball.r < obstacle.x + obstacle.w &&
      ball.y + ball.r > obstacle.y && ball.y - ball.r < obstacle.y + obstacle.h
    ) {
      ball.vx *= -1; // 가로 방향 반사
      // 겹침 해소: 공을 장애물 바깥으로 밀어냄
      ball.x += ball.vx > 0 ? 6 : -6;
      sfx.wall();
      spawnParticles(ball.x, ball.y, "#8b949e", 8);
    }

    // 패들 충돌
    if (ball.vx < 0 && hitsPaddle(player)) {
      ball.x = player.x + PADDLE_W + ball.r;
      // 게이지가 가득 찼으면 이번 타구는 자동 스매시 후 리셋, 아니면 일반 타구 + 게이지 충전
      const ready = smashGauge >= SMASH_GAUGE_MAX;
      bounceFrom(player, 1, ready);
      smashGauge = ready ? 0 : smashGauge + 1;
    } else if (ball.vx > 0 && hitsPaddle(ai)) {
      ball.x = ai.x - ball.r;
      // AI 스매시: 난이도별 확률 + 최소 랠리 조건을 만족하면 강타. 발동 시 도발 멘트.
      const aiSmash = rally >= AI_SMASH_MIN_RALLY &&
                      Math.random() < DIFFICULTIES[difficulty].smashChance;
      bounceFrom(ai, -1, aiSmash);
      if (aiSmash) sayRobot(TAUNTS.aiSmash);
    }

    // 아이템 등장/충돌
    if (!item) {
      itemTimer -= dt;
      if (itemTimer <= 0) {
        const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
        item = { x: randRange(W * 0.35, W * 0.65), y: randRange(60, H - 60), r: 14, type };
      }
    } else {
      const dx = ball.x - item.x, dy = ball.y - item.y;
      if (Math.hypot(dx, dy) < item.r + ball.r) applyItem(item.type);
    }

    // 득점
    if (ball.x + ball.r < 0) { ai.score++; onScore(1); }
    else if (ball.x - ball.r > W) { player.score++; onScore(-1); }
  }

  function onScore(serveDir) {
    shake = 10;
    sfx.score();
    if (player.score >= WIN_SCORE || ai.score >= WIN_SCORE) {
      state = STATE.OVER;
      const won = player.score > ai.score;
      winnerText = won ? "🎉 승리!" : "😢 패배";
      // 연승 기록 갱신
      winStreak = won ? winStreak + 1 : 0;
      saveRecord("pp_winStreak", winStreak);
      sfx.win();
      showOverlay(winnerText, "다시 도전할 난이도를 고르세요");
      sayRobot(won ? TAUNTS.playerWin : TAUNTS.aiWin);
    } else {
      resetBall(serveDir);
      // serveDir 1 = AI 득점(플레이어 쪽으로 서브), -1 = 플레이어 득점
      sayRobot(serveDir === 1 ? TAUNTS.aiScore : TAUNTS.playerScore);
    }
  }

  // ===== 렌더 =====
  function drawNet() {
    ctx.strokeStyle = "#30363d";
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 14]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawText(text, size, y, color = "#e6edf3") {
    ctx.fillStyle = color;
    ctx.font = `${size}px "Segoe UI", "Malgun Gothic", sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(text, W / 2, y);
  }

  const ITEM_LABEL = { bigPaddle: "패들 확대", slowBall: "느린 공", smallAI: "상대 축소" };
  const ITEM_COLOR = { bigPaddle: "#58a6ff", slowBall: "#3fb950", smallAI: "#f85149" };

  function render() {
    ctx.save();
    // 화면 흔들림: shake 값만큼 무작위로 캔버스를 살짝 이동
    if (shake > 0) {
      ctx.translate(randRange(-shake, shake) * 0.5, randRange(-shake, shake) * 0.5);
    }

    ctx.clearRect(-20, -20, W + 40, H + 40);
    drawNet();

    // 장애물
    ctx.fillStyle = "#6e7681";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

    // 점수 (세로 모드에선 글자·위치를 키워 작은 화면에서도 잘 보이게)
    const scoreSize = portrait ? 76 : 48;
    const scoreY = portrait ? 72 : 60;
    ctx.fillStyle = "#8b949e";
    ctx.font = `${scoreSize}px 'Segoe UI', sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(player.score, W / 2 - 60, scoreY);
    ctx.fillText(ai.score, W / 2 + 60, scoreY);

    // 상단 기록/랠리 표시
    ctx.font = "14px 'Segoe UI', sans-serif";
    ctx.fillStyle = "#8b949e";
    ctx.textAlign = "left";
    ctx.fillText(`랠리 ${rally}  ·  최고 ${bestRally}`, 16, 24);
    ctx.textAlign = "right";
    ctx.fillText(`연승 ${winStreak}`, W - 16, 24);

    // 스매시 게이지(좌상단). 가득 차면 노랗게 "스매시 준비!"
    const ready = smashGauge >= SMASH_GAUGE_MAX;
    const gx = 16, gy = 34, gw = 96, gh = 9;
    ctx.fillStyle = "#21262d";
    ctx.fillRect(gx, gy, gw, gh);
    ctx.fillStyle = ready ? "#f2cc60" : "#58a6ff";
    ctx.fillRect(gx, gy, gw * Math.min(1, smashGauge / SMASH_GAUGE_MAX), gh);
    ctx.font = "12px 'Segoe UI', sans-serif";
    ctx.textAlign = "left";
    ctx.fillStyle = ready ? "#f2cc60" : "#8b949e";
    ctx.fillText(ready ? "⚡ 스매시 준비!" : "스매시 충전", gx, gy + gh + 13);

    // 진행 중인 효과 표시
    ctx.textAlign = "center";
    const eff = Object.keys(activeEffects);
    if (eff.length) {
      ctx.fillStyle = "#a371f7";
      ctx.fillText(eff.map((e) => ITEM_LABEL[e]).join("  "), W / 2, H - 16);
    }

    // 아이템
    if (item) {
      ctx.fillStyle = ITEM_COLOR[item.type];
      ctx.beginPath();
      ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#0d1117";
      ctx.font = "11px 'Segoe UI', sans-serif";
      ctx.fillText("?", item.x, item.y + 4);
    }

    // 패들
    ctx.fillStyle = "#58a6ff";
    ctx.fillRect(player.x, player.y, PADDLE_W, player.h);
    ctx.fillStyle = "#f85149";
    ctx.fillRect(ai.x, ai.y, PADDLE_W, ai.h);

    // 공 잔상
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      ctx.globalAlpha = (i / trail.length) * 0.4;
      ctx.fillStyle = ball.smash ? "#f2cc60" : "#e6edf3";
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * (i / trail.length), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 공
    if (ball.smash) { ctx.shadowColor = "#f2cc60"; ctx.shadowBlur = 20; ctx.fillStyle = "#f2cc60"; }
    else { ctx.shadowBlur = 0; ctx.fillStyle = "#e6edf3"; }
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 파티클
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 일시정지만 캔버스에 표시. 시작/종료는 HTML 팝업(overlay)이 담당.
    if (state === STATE.PAUSED) {
      drawText("일시정지 — Space로 계속", 24, H / 2 + 6);
    }

    ctx.restore();
  }

  // ===== 파티클·흔들림 갱신 =====
  function updateEffects() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.94; p.vy *= 0.94;
      p.life -= 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (state === STATE.PLAYING && shake > 0) shake = Math.max(0, shake - 0.6);
  }

  // ===== 메인 루프 =====
  let lastT = 0;
  function loop(t) {
    // dt를 초 단위로 환산(첫 프레임/탭 전환 대비 0.05초로 상한)
    const dt = lastT ? Math.min((t - lastT) / 1000, 0.05) : 0;
    lastT = t;
    update(dt);
    updateEffects();
    render();
    requestAnimationFrame(loop);
  }

  // ===== 입력 =====
  // 창 전체에서 마우스 추적: 커서가 테이블 밖에 있어도 그 높이에 맞춰 패들이 따라감
  window.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleY = canvas.height / rect.height;
    const my = (e.clientY - rect.top) * scaleY;
    player.y = Math.max(0, Math.min(H - player.h, my - player.h / 2));
  });
  // 창 전체에서 터치 추적: 마우스와 동일하게, 손가락이 테이블(캔버스) 밖에 있어도
  // 그 높이에 맞춰 패들이 따라감(PC 버전과 동작 일치). passive:false라야 preventDefault 가능.
  window.addEventListener("touchmove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleY = canvas.height / rect.height;
    const my = (e.touches[0].clientY - rect.top) * scaleY;
    player.y = Math.max(0, Math.min(H - player.h, my - player.h / 2));
    e.preventDefault();
  }, { passive: false });

  // 스매시는 게이지가 가득 차면 자동 발동(별도 입력 없음 — 모든 기기 공통)

  document.addEventListener("keydown", (e) => {
    if (e.code === "ArrowUp") { keys.up = true; e.preventDefault(); }
    if (e.code === "ArrowDown") { keys.down = true; e.preventDefault(); }
    if (e.code === "KeyM") muted = !muted;
    if (e.code === "KeyF") { e.preventDefault(); toggleFullscreen(); }
    // 난이도 선택은 시작/종료 대기 상태에서만
    if ((state === STATE.READY || state === STATE.OVER)) {
      if (e.code === "Digit1") { difficulty = 1; updateDiffButtons(); }
      if (e.code === "Digit2") { difficulty = 2; updateDiffButtons(); }
      if (e.code === "Digit3") { difficulty = 3; updateDiffButtons(); }
    }
    if (e.code === "Space") {
      e.preventDefault();
      ensureAudio(); // 사용자 제스처가 있어야 오디오가 켜짐(브라우저 정책)
      if (state === STATE.READY || state === STATE.OVER) startGame();
      else if (state === STATE.PLAYING) state = STATE.PAUSED;
      else if (state === STATE.PAUSED) state = STATE.PLAYING;
    }
  });
  document.addEventListener("keyup", (e) => {
    if (e.code === "ArrowUp") keys.up = false;
    if (e.code === "ArrowDown") keys.down = false;
  });

  // ===== 전체화면 토글 (버튼 ⛶ / 단축키 F) =====
  // 페이지 전체(documentElement)를 전체화면으로 → 로봇 말풍선·점수까지 그대로 노출.
  // 구형 사파리 대비 webkit 프리픽스 폴백 포함. requestFullscreen은 Promise를 반환할 수
  // 있어(거부 시 reject) catch로 무시. 참고: iOS 사파리는 임의 요소 전체화면을 지원하지
  // 않아 동작하지 않을 수 있음(미지원 시 버튼이 조용히 아무 일도 하지 않음).
  const fsBtn = document.getElementById("fsBtn");
  function fsElement() { return document.fullscreenElement || document.webkitFullscreenElement; }
  function toggleFullscreen() {
    const el = document.documentElement;
    if (!fsElement()) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) { const p = req.call(el); if (p && p.catch) p.catch(() => {}); }
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document);
    }
  }
  function updateFsBtn() {
    const on = !!fsElement();
    fsBtn.textContent = on ? "🗗" : "⛶";
    fsBtn.title = on ? "전체화면 종료 (F)" : "전체화면 (F)";
  }
  fsBtn.addEventListener("click", toggleFullscreen);
  document.addEventListener("fullscreenchange", updateFsBtn);
  document.addEventListener("webkitfullscreenchange", updateFsBtn);

  // 첫 화면: 난이도 선택 팝업 표시
  showOverlay("🏓 시작하기", "난이도를 고르세요");
  updateDiffButtons();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
