<style>
  :root {
    --bg: #17110a; --card: rgba(26, 19, 11, 0.94); --warm-bg: #241a0e; --warm-bg2: #2e2211;
    --warm-border: #3a2c15; --gold: #c9a227; --gold-bright: #e6c04a; --gold-soft: #f2cc60; --gold-deep: #6b5417;
    --parchment: #e9dcc0; --muted: #9c8a63; --ink: #201607;
    --serif: "Georgia", "Nanum Myeongjo", serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; width: 100%; background: var(--bg); color: var(--parchment); font-family: "Segoe UI", "Malgun Gothic", sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; padding: 14px 12px 40px; }
  .wrap { width: 100%; max-width: 520px; }
  #conn { position: fixed; top: 8px; right: 10px; z-index: 20; font-size: 11px; color: var(--muted); background: rgba(13,10,5,0.72); border: 1px solid var(--warm-border); border-radius: 999px; padding: 4px 10px; max-width: 62vw; text-align: right; }
  #conn .ok { color: #7fd18f; } #conn .bad { color: #e08a7a; }
  .top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .home { text-decoration: none; color: var(--gold-bright); font-size: 13px; font-weight: 700; } .home:hover { color: var(--gold-soft); }
  h1 { font-family: var(--serif); font-size: clamp(20px, 6vw, 26px); font-weight: 800; margin: 0; color: var(--gold-bright); text-align: center; letter-spacing: .5px; flex: 1; }
  .panel { background: var(--card); border: 1px solid var(--warm-border); border-radius: 12px; padding: 18px 16px; margin-top: 6px; display: flex; flex-direction: column; gap: 14px; }
  .rules { font-size: 12px; color: var(--muted); line-height: 1.6; text-align: center; }
  .optRow { display: flex; flex-direction: column; gap: 6px; }
  .optLabel { font-size: 13px; color: var(--parchment); font-weight: 700; }
  .seg { display: flex; width: 100%; border: 1px solid var(--warm-border); border-radius: 8px; overflow: hidden; }
  .seg button { flex: 1; min-width: 0; font-family: var(--serif); cursor: pointer; border: none; background: linear-gradient(180deg, var(--warm-bg2), var(--warm-bg)); color: var(--muted); padding: 11px 4px; font-size: 14px; border-right: 1px solid var(--warm-border); white-space: nowrap; }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep)); color: var(--ink); font-weight: 800; }
  .cta { width: 100%; font-family: var(--serif); cursor: pointer; border: 1px solid #7b2419; border-radius: 9px; background: linear-gradient(180deg, #b5442f, #7b2419); color: #fff; font-weight: 800; font-size: 16px; padding: 13px 0; }
  .cta:hover { filter: brightness(1.08); }
  .orDivider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; letter-spacing: 2px; }
  .orDivider::before, .orDivider::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-deep), transparent); }
  #onlineBox { display: flex; flex-direction: column; gap: 12px; }
  .nick { width: 100%; font-family: var(--serif); font-size: 15px; text-align: center; padding: 11px; border-radius: 8px; border: 1px solid var(--warm-border); background: #0d0b05; color: var(--gold-bright); }
  .joinGroup { display: flex; }
  .joinGroup input { flex: 1; min-width: 0; font-family: var(--serif); font-size: 20px; letter-spacing: 6px; text-align: center; text-transform: uppercase; padding: 12px; border-radius: 8px 0 0 8px; border: 1px solid var(--warm-border); border-right: none; background: #0d0b05; color: var(--gold-bright); }
  .cta2 { flex: none; font-family: var(--serif); cursor: pointer; border: 1.5px solid var(--gold); border-radius: 0 8px 8px 0; background: rgba(201,162,39,0.12); color: var(--gold-bright); font-weight: 700; padding: 0 18px; }
  .btn { font-family: var(--serif); cursor: pointer; border: 1px solid var(--warm-border); border-radius: 8px; background: linear-gradient(180deg, var(--warm-bg2), var(--warm-bg)); color: var(--parchment); padding: 11px 18px; font-size: 15px; }
  .menuErr { color: #e08a7a; font-size: 13px; text-align: center; min-height: 16px; }
  .menuHome { text-align: center; margin-top: 4px; } .menuHome a { color: var(--gold-bright); font-size: 13px; font-weight: 700; text-decoration: none; }

  #lobby { text-align: center; }
  #roomCode { font-family: var(--serif); font-size: clamp(34px, 12vw, 52px); font-weight: 800; letter-spacing: 10px; color: var(--gold-soft); margin: 4px 0; text-shadow: 0 2px 3px #000; }
  #lobbyTitle { font-family: var(--serif); font-size: 18px; color: var(--gold-bright); margin: 8px 0; }
  #rosterInfo { color: var(--muted); font-size: 13px; }
  .hint { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .gameMeta { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 10px; border: 1px solid rgba(201,162,39,0.35); border-radius: 8px; background: rgba(13,10,5,0.46); font-family: var(--serif); font-size: 12px; margin-bottom: 8px; }
  .gameMeta b { color: var(--gold-bright); font-weight: 800; }
  #gameCodeWrap { cursor: pointer; white-space: nowrap; }

  .rows { display: flex; flex-direction: column; gap: 6px; margin: 8px 0; }
  .row { display: flex; align-items: center; gap: 4px; background: rgba(13,10,5,0.4); border: 1px solid var(--warm-border); border-radius: 8px; padding: 5px 6px; min-height: 52px; }
  .rowcards { display: flex; gap: 3px; flex: 1; flex-wrap: wrap; }
  .cardv { position: relative; min-width: 34px; height: 44px; border-radius: 6px; background: linear-gradient(180deg,#f3e6c6,#e2cf9f); color: #4a2f14; font-family: var(--serif); font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .cardv .bh { position: absolute; top: -6px; right: -5px; background: #a6402f; color: #fff; border-radius: 8px; font-size: 9px; padding: 0 3px; font-family: sans-serif; }
  .rowbull { font-size: 11px; color: var(--muted); min-width: 34px; text-align: right; }

  #statusBar { text-align: center; font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--gold-bright); min-height: 22px; margin: 6px 0; }
  #logBox { font-size: 11.5px; color: var(--muted); line-height: 1.5; min-height: 30px; text-align: center; margin-bottom: 4px; }

  .scb .snm { color: var(--gold-bright); font-weight: 700; } .scb .sbl { color: var(--parchment); }

  .myLabel { font-size: 13px; color: var(--gold-bright); font-weight: 800; text-align: center; margin-bottom: 8px; }
  #hand { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
  #hand .cardv { cursor: pointer; }
  #hand .cardv.pick { outline: 3px solid var(--gold-soft); transform: translateY(-4px); }
  #hand .cardv.dim { opacity: 0.5; }
  .backHome { text-align: center; margin-top: 14px; } .backHome a { color: var(--gold-bright); font-size: 13px; font-weight: 700; text-decoration: none; }

  #over { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 18px; background: rgba(8,5,2,0.72); }
  #over.hidden { display: none; }
  .overCard { width: min(360px, 100%); background: var(--card); border: 2px solid var(--warm-border); border-radius: 12px; padding: 22px; text-align: center; box-shadow: 0 16px 44px rgba(0,0,0,0.7); }
  .overCard h2 { font-family: var(--serif); font-size: 24px; margin: 0 0 10px; color: var(--gold-bright); }
  #scoreTable { font-size: 14px; margin-bottom: 14px; }
  #scoreTable .sr { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid rgba(201,162,39,0.15); }
  #scoreTable .sr.win { color: var(--gold-soft); font-weight: 800; }
  .overCard button { width: 100%; font-family: var(--serif); font-size: 16px; font-weight: 800; padding: 13px 0; border-radius: 9px; cursor: pointer; border: 1px solid var(--gold-deep); background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-deep)); color: var(--ink); }
  .hidden { display: none !important; }

  #chatToggle { position: fixed; left: 10px; bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 45; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--warm-border); background: rgba(26,19,11,0.9); color: #f2cc60; font-size: 18px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.5); opacity: .55; transition: opacity .15s; }
  #chatToggle:hover, #chatToggle:focus { opacity: 1; }
  #chatBadge { position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; border-radius: 9px; background: #a6402f; color: #fff; font-size: 11px; line-height: 18px; padding: 0 4px; }
  #chatPanel { position: fixed; left: 12px; bottom: calc(70px + env(safe-area-inset-bottom)); z-index: 46; width: min(300px, calc(100vw - 24px)); background: rgba(20,14,7,0.98); border: 1px solid var(--warm-border); border-radius: 12px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 8px; }
  #chatHead { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
  #chatClose { background: rgba(166,64,47,0.85); border: 1px solid var(--warm-border); color: #fff; font-size: 12px; font-weight: 700; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  #chatFeed { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
  .cmsg { background: rgba(13,10,5,0.5); border-radius: 6px; padding: 4px 7px; line-height: 1.4; word-break: break-word; }
  .cmsg.mine { background: rgba(201,162,39,0.14); }
  .cmsg b { color: var(--gold-soft); margin-right: 5px; }
  #chatEmojis { display: flex; gap: 4px; flex-wrap: wrap; }
  .chatEmoji { font-size: 20px; border: 1px solid var(--warm-border); border-radius: 8px; background: var(--warm-bg); cursor: pointer; padding: 4px 8px; }
  #chatInputRow { display: flex; gap: 6px; }
  #chatInput { flex: 1; min-width: 0; font-size: 14px; padding: 8px; border-radius: 8px; border: 1px solid var(--warm-border); background: #0d0b05; color: var(--parchment); }
  #chatSend { font-family: var(--serif); border: 1px solid var(--gold); border-radius: 8px; background: rgba(201,162,39,0.14); color: var(--gold-bright); padding: 0 12px; cursor: pointer; }
</style>

<body>
  <div id="conn">서버 연결 중…</div>
  <div class="wrap">
    <div class="top">
      <a class="home" href="./index.html">🎲 메인</a>
      <h1>젝스님트</h1>
      <span style="width:44px"></span>
    </div>

    <div id="menu" class="panel">
      <div class="rules">동시에 카드 한 장씩 → 낮은 순서로 배치.<br>줄의 <b>6번째</b> 카드를 낸 사람이 그 줄(1~5)을 벌점으로 가져갑니다. 벌점(🐂)이 가장 적으면 승리!</div>
      <div class="optRow">
        <span class="optLabel">인원</span>
        <div class="seg" id="segCount"><button data-v="2" class="on">2명</button><button data-v="3">3명</button><button data-v="4">4명</button></div>
      </div>
      <div class="optRow">
        <span class="optLabel">방식</span>
        <div class="seg" id="segMode"><button data-v="solo" class="on">혼자 (vs 컴퓨터)</button><button data-v="online">온라인</button></div>
      </div>
      <button id="startSoloBtn" class="cta">게임 시작</button>
      <div id="onlineBox" class="hidden">
        <input id="nickInput" class="nick" maxlength="8" placeholder="닉네임 (예: 아빠)" autocomplete="off" />
        <div class="orDivider"><span>온라인</span></div>
        <button id="createBtn" class="cta">방 만들기</button>
        <div class="joinGroup"><input id="codeInput" maxlength="4" placeholder="방 코드" autocomplete="off" /><button id="joinBtn" class="cta2">입장</button></div>
      </div>
      <div class="menuErr" id="menuErr"></div>
      <div class="menuHome"><a href="./index.html">← 다른 게임 고르기</a></div>
    </div>

    <div id="lobby" class="panel hidden">
      <div id="lobbyTitle">상대를 기다리는 중…</div>
      <div id="lobbyCodeWrap"><div class="hint">이 코드를 상대에게 알려주세요</div><div id="roomCode">----</div><button id="copyBtn" class="btn">코드 복사</button></div>
      <div id="rosterInfo"></div>
      <button id="cancelBtn" class="btn" style="margin-top:12px;">나가기</button>
    </div>

    <div id="board" class="hidden">
      <div class="gameMeta">
        <span>🐂 젝스님트 <b id="metaRound"></b></span>
        <span id="gameCodeWrap" class="hidden" title="탭하면 코드 복사">CODE <b id="metaCode">----</b></span>
        <span id="metaMode">혼자</span>
      </div>
      <div class="rows" id="rows"></div>
      <div class="scores" id="scores"></div>
      <div id="statusBar"></div>
      <div id="logBox"></div>
      <div class="myhand">
        <div class="myLabel" id="myLabel">내 카드 — 낼 카드를 고르세요</div>
        <div id="hand"></div>
      </div>
      <div class="backHome"><button id="toMenuBtn" style="background:none;border:none;color:var(--gold-bright);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">↩ 게임 메뉴</button> · <a href="./index.html">🎲 메인</a></div>
    </div>
  </div>

  <div id="over" class="hidden">
    <div class="overCard">
      <h2 id="overTitle">게임 종료</h2>
      <div id="scoreTable"></div>
      <button id="againBtn">다시 하기</button>
      <button id="otherGameBtn" class="hidden" style="margin-top:8px;background:linear-gradient(180deg,var(--warm-bg2),var(--warm-bg));border:1px solid var(--warm-border);color:var(--parchment);">🔀 다른 게임</button>
      <div id="gamePicker" class="hidden" style="display:flex;flex-direction:column;gap:8px;margin-top:8px;"></div>
    </div>
  </div>

  <button id="chatToggle" class="hidden" title="채팅">💬<span id="chatBadge" class="hidden"></span></button>
  <div id="chatPanel" class="hidden">
    <div id="chatHead"><span>채팅</span><button id="chatClose" title="닫기">✕ 닫기</button></div>
    <div id="chatFeed"></div>
    <div id="chatEmojis"></div>
    <div id="chatInputRow"><input id="chatInput" maxlength="60" placeholder="메시지…" autocomplete="off" /><button id="chatSend">보내기</button></div>
  </div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const RENDER_URL = "wss://pingpong-server-hgl2.onrender.com";
  const override = new URLSearchParams(location.search).get("server");
  const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname) || location.protocol === "file:";
  const SERVER_URL = override || (isLocal ? "ws://localhost:8080" : RENDER_URL);

  const HAND_SIZE = 10;
  const SCREEN = { MENU: "menu", LOBBY: "lobby", PLAYING: "playing", OVER: "over" };
  let screen = SCREEN.MENU;
  let ws = null, myIndex = null, isHost = false, myCode = null, myToken = null;
  let optCount = 2, optMode = "solo", onlineMode = false;
  let soloMode = false, aiTimer = null;
  let G = null, lastView = null;
  let myNick = ""; try { myNick = (localStorage.getItem("bg_nick") || "").trim().slice(0, 8); } catch (e) {}
  let hostNames = {};
  let handoffMode = false, handoffCap = 0, intentionalNav = false;
  const missingPeers = new Set();

  const SESS_KEY = "sixnimmt_session", STATE_KEY = "sixnimmt_state", REJOIN_WINDOW_MS = 300000;
  function saveSession() { try { localStorage.setItem(SESS_KEY, JSON.stringify({ code: myCode, index: myIndex, token: myToken, isHost, ts: Date.now() })); } catch {} }
  function touchSession() { try { const s = JSON.parse(localStorage.getItem(SESS_KEY) || "null"); if (s) { s.ts = Date.now(); localStorage.setItem(SESS_KEY, JSON.stringify(s)); } } catch {} }
  function getSession() { try { return JSON.parse(localStorage.getItem(SESS_KEY) || "null"); } catch { return null; } }
  function sessionFresh(s) { return !!(s && s.ts && Date.now() - s.ts < REJOIN_WINDOW_MS); }
  function clearSession() { try { localStorage.removeItem(SESS_KEY); localStorage.removeItem(STATE_KEY); localStorage.removeItem(STATE_KEY + "_n"); } catch {} }
  function saveState() { if (isHost && G) { try { localStorage.setItem(STATE_KEY, JSON.stringify(G)); localStorage.setItem(STATE_KEY + "_n", JSON.stringify(hostNames)); } catch {} } }
  function loadState() { try { return JSON.parse(localStorage.getItem(STATE_KEY) || "null"); } catch { return null; } }
  function restoreConn() { $("conn").innerHTML = "<span class='ok'>● 서버 연결됨</span>"; }

  // ===== 엔진 =====
  function bulls(n) { if (n === 55) return 7; if (n % 11 === 0) return 5; if (n % 10 === 0) return 3; if (n % 5 === 0) return 2; return 1; }
  function rowBulls(row) { return row.reduce((s, x) => s + bulls(x), 0); }
  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
  function newGame(count) {
    const deck = []; for (let n = 1; n <= 104; n++) deck.push(n); shuffle(deck);
    const rows = [[deck.pop()], [deck.pop()], [deck.pop()], [deck.pop()]];
    const hands = []; for (let i = 0; i < count; i++) hands.push(deck.splice(0, HAND_SIZE).sort((a, b) => a - b));
    G = { count, rows, hands, bulls: new Array(count).fill(0), picks: new Array(count).fill(null), round: 1, phase: "select", winner: null, log: [] };
  }
  function nm(i) { if (soloMode) return i === 0 ? "나" : "컴퓨터" + i; return hostNames[i] || ("P" + (i + 1)); }
  function resolveRound() {
    const plays = G.picks.map((c, pi) => ({ c, pi })).filter((x) => x.c != null).sort((a, b) => a.c - b.c);
    const ev = [];
    for (const { c, pi } of plays) {
      let best = -1, bestLast = -1;
      G.rows.forEach((row, ri) => { const last = row[row.length - 1]; if (last < c && last > bestLast) { bestLast = last; best = ri; } });
      if (best === -1) {
        let tr = 0, tb = Infinity;
        G.rows.forEach((row, ri) => { const b = rowBulls(row); if (b < tb) { tb = b; tr = ri; } });
        G.bulls[pi] += tb; ev.push(`${nm(pi)}: ${c} 너무 낮아 ${tr + 1}번 줄 가져감 (+${tb}🐂)`); G.rows[tr] = [c];
      } else if (G.rows[best].length >= 5) {
        const b = rowBulls(G.rows[best]); G.bulls[pi] += b; ev.push(`${nm(pi)}: ${c} → ${best + 1}번 줄 6번째! 가져감 (+${b}🐂)`); G.rows[best] = [c];
      } else { G.rows[best].push(c); ev.push(`${nm(pi)}: ${c} → ${best + 1}번 줄`); }
      G.hands[pi] = G.hands[pi].filter((x) => x !== c);
    }
    G.picks = new Array(G.count).fill(null);
    G.log = ev; G.round++;
    if (G.hands.every((h) => h.length === 0)) { G.phase = "over"; let best = Infinity, w = 0; G.bulls.forEach((b, i) => { if (b < best) { best = b; w = i; } }); G.winner = w; }
  }
  function applyAction(a) {
    if (!G || G.phase !== "select") return;
    if (a.action !== "pick") return;
    const pi = a.from;
    if (G.picks[pi] != null) return;
    if (!G.hands[pi].includes(a.card)) return;
    G.picks[pi] = a.card;
    if (soloMode) { for (let i = 1; i < G.count; i++) if (G.picks[i] == null) G.picks[i] = aiPick(i); resolveRound(); broadcast(); return; }
    if (G.picks.every((p) => p != null)) resolveRound();
    broadcast();
  }
  function dispatch(a) { a.from = myIndex; if (isHost) applyAction(a); else send({ type: "act", to: 0, a }); }

  // ===== AI =====
  function aiPick(i) {
    const hand = G.hands[i]; let best = hand[0], bestScore = Infinity;
    for (const c of hand) {
      let ri = -1, rl = -1; G.rows.forEach((row, k) => { const last = row[row.length - 1]; if (last < c && last > rl) { rl = last; ri = k; } });
      let pen;
      if (ri === -1) pen = 10 + Math.min.apply(null, G.rows.map(rowBulls));
      else if (G.rows[ri].length >= 5) pen = 8 + rowBulls(G.rows[ri]);
      else pen = G.rows[ri].length * 0.5 + (c - rl) * 0.02;
      if (pen < bestScore) { bestScore = pen; best = c; }
    }
    return best;
  }

  // ===== 뷰 =====
  function viewFor(pi) {
    return {
      online: !soloMode, count: G.count, round: G.round, phase: G.phase, winner: G.winner,
      rows: G.rows.map((r) => r.slice()), myHand: G.hands[pi].slice(), myPick: G.picks[pi],
      picked: G.picks.map((p) => p != null), bulls: G.bulls.slice(), myIndex: pi,
      names: Array.from({ length: G.count }, (_, i) => hostNames[i] || null), log: G.log.slice(),
    };
  }
  function broadcast() {
    if (intentionalNav) return;
    if (!soloMode) for (let i = 1; i < G.count; i++) send({ type: "view", view: viewFor(i), to: i });
    renderView(viewFor(0));
    saveState();
    if (!soloMode) touchSession();
  }

  // ===== 렌더 =====
  function nmv(v, i) { if (soloMode) return i === 0 ? "나" : "컴퓨터" + i; const n = v.names[i]; if (i === v.myIndex) return n || "나"; return n || ("P" + (i + 1)); }
  function cardHtml(n, cls) { return `<div class="cardv ${cls || ""}" data-c="${n}">${n}<span class="bh">${bulls(n)}</span></div>`; }
  function renderView(v) {
    if (!v || !Array.isArray(v.rows) || !Array.isArray(v.myHand)) return;
    lastView = v;
    if (screen !== SCREEN.PLAYING && screen !== SCREEN.OVER) setScreen(SCREEN.PLAYING);
    $("metaRound").textContent = (v.round <= 10 ? v.round : 10) + "/10";
    $("metaMode").textContent = v.online ? "온라인 " + v.count + "인" : "혼자";
    $("gameCodeWrap").classList.toggle("hidden", !(v.online && myCode));
    if (v.online && myCode) $("metaCode").textContent = myCode;

    $("rows").innerHTML = v.rows.map((row) => `<div class="row"><div class="rowcards">${row.map((n) => cardHtml(n)).join("")}</div><div class="rowbull">${row.reduce((s, x) => s + bulls(x), 0)}🐂</div></div>`).join("");
    $("scores").innerHTML = Array.from({ length: v.count }, (_, i) => `<div class="scb ${i === v.myIndex ? "me" : ""} ${v.picked[i] ? "picked" : ""}"><span class="snm">${escapeHtml(nmv(v, i))}</span> <span class="sbl">${v.bulls[i]}🐂${v.picked[i] ? " ✓" : ""}</span></div>`).join("");

    const picked = v.myPick != null;
    $("statusBar").textContent = v.phase === "over" ? "" : (picked ? "다른 플레이어를 기다리는 중…" : "낼 카드를 고르세요");
    $("logBox").innerHTML = (v.log || []).map((l) => `<div>${escapeHtml(l)}</div>`).join("");

    const hand = $("hand"); hand.innerHTML = v.myHand.map((n) => cardHtml(n, n === v.myPick ? "pick" : (picked ? "dim" : ""))).join("");
    if (!picked && v.phase === "select") hand.querySelectorAll(".cardv").forEach((el) => el.addEventListener("click", () => { const c = +el.getAttribute("data-c"); dispatch({ action: "pick", card: c }); }));
    $("myLabel").textContent = picked ? `선택함: ${v.myPick}` : "내 카드 — 낼 카드를 고르세요";

    if (v.phase === "over") showOver(v);
    else if (screen === SCREEN.OVER) setScreen(SCREEN.PLAYING);
  }
  function showOver(v) {
    $("overTitle").textContent = v.winner === v.myIndex ? "🎉 승리!" : "게임 종료";
    const rows = Array.from({ length: v.count }, (_, i) => ({ i, b: v.bulls[i] })).sort((a, b) => a.b - b.b);
    $("scoreTable").innerHTML = rows.map((r) => `<div class="sr ${r.i === v.winner ? "win" : ""}">${escapeHtml(nmv(v, r.i))}${r.i === v.winner ? " 🏆" : ""}<span>${r.b}🐂</span></div>`).join("");
    $("gamePicker").classList.add("hidden");
    $("otherGameBtn").classList.toggle("hidden", !(isHost && isOnlineRoom()));
    setScreen(SCREEN.OVER);
    $("over").classList.remove("hidden");
  }

  function setScreen(s) {
    screen = s;
    $("menu").classList.toggle("hidden", s !== SCREEN.MENU);
    $("lobby").classList.toggle("hidden", s !== SCREEN.LOBBY);
    $("board").classList.toggle("hidden", !(s === SCREEN.PLAYING || s === SCREEN.OVER));
    if (s !== SCREEN.OVER) $("over").classList.add("hidden");
    if (s === SCREEN.MENU) { soloMode = false; if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; } }
    const inGame = !soloMode && (s === SCREEN.PLAYING || s === SCREEN.OVER);
    $("chatToggle").classList.toggle("hidden", !inGame);
    if (!inGame) $("chatPanel").classList.add("hidden");
    updateHistoryGuard(s);
  }
  function showMenuWithError(msg) { $("menuErr").textContent = msg || ""; onlineMode = false; setScreen(SCREEN.MENU); }
  function startSolo() { soloMode = true; isHost = true; myIndex = 0; myCode = myToken = null; onlineMode = false; hostNames = {}; newGame(optCount); setScreen(SCREEN.PLAYING); broadcast(); }
  function newOnlineGame() { const c = G ? G.count : optCount; newGame(c); broadcast(); }

  function send(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }
  function sendNick() { if (isHost) { if (myIndex != null) hostNames[myIndex] = myNick; if (G) broadcast(); } else if (myNick) { send({ type: "nick", name: myNick, to: 0 }); } }
  function connect() {
    $("conn").innerHTML = "서버 연결 중… <span style='color:var(--muted)'>(무료 서버는 첫 접속 30~60초)</span>";
    try { ws = new WebSocket(SERVER_URL); } catch (e) { $("conn").innerHTML = "<span class='bad'>서버 주소 오류</span>"; return; }
    ws.addEventListener("open", () => {
      restoreConn();
      const wantRoom = new URLSearchParams(location.search).get("room");
      const ho = wantRoom ? getRoomHandoff() : null;
      if (ho) {
        clearRoomHandoff();
        handoffMode = true; handoffCap = ho.cap || 2; onlineMode = true;
        isHost = (ho.index === 0); myIndex = ho.index; myCode = ho.code; myToken = ho.token;
        $("lobbyTitle").textContent = "방 유지 — 다른 플레이어 대기 중…"; $("lobbyCodeWrap").style.display = "none";
        setScreen(SCREEN.LOBBY); send({ type: "rejoin", code: ho.code, index: ho.index, token: ho.token }); return;
      }
      const s = getSession();
      if (s && s.code && s.token != null && sessionFresh(s)) {
        onlineMode = true; isHost = s.isHost; myIndex = s.index; myCode = s.code; myToken = s.token;
        $("lobbyTitle").textContent = "이전 게임에 재접속 중…"; $("lobbyCodeWrap").style.display = "none";
        setScreen(SCREEN.LOBBY); send({ type: "rejoin", code: s.code, index: s.index, token: s.token });
      }
    });
    ws.addEventListener("close", () => { $("conn").innerHTML = "<span class='bad'>● 서버 연결 끊김</span>"; if (onlineMode && (screen === SCREEN.PLAYING || screen === SCREEN.LOBBY)) showMenuWithError("서버 연결이 끊겼습니다."); });
    ws.addEventListener("error", () => { $("conn").innerHTML = "<span class='bad'>● 서버에 연결할 수 없습니다</span>"; });
    ws.addEventListener("message", (ev) => { let m; try { m = JSON.parse(ev.data); } catch { return; } onMessage(m); });
  }
  function onMessage(m) {
    switch (m.type) {
      case "created": onlineMode = true; isHost = true; myIndex = 0; myCode = m.code; myToken = m.token; saveSession(); $("roomCode").textContent = m.code; $("lobbyTitle").textContent = "상대를 기다리는 중…"; $("lobbyCodeWrap").style.display = ""; setScreen(SCREEN.LOBBY); sendNick(); break;
      case "joined": onlineMode = true; isHost = false; myIndex = m.index; myCode = m.code; myToken = m.token; saveSession(); $("lobbyTitle").textContent = "입장 완료! 시작 대기 중…"; $("lobbyCodeWrap").style.display = "none"; setScreen(SCREEN.LOBBY); sendNick(); break;
      case "rejoined":
        onlineMode = true; myIndex = m.index; myCode = m.code; myToken = m.token; isHost = (m.index === 0); saveSession(); restoreConn();
        if (handoffMode) { handoffCap = m.capacity || 2; if (isHost) { $("lobbyTitle").textContent = "방 유지 — 다른 플레이어 대기 중…"; setScreen(SCREEN.LOBBY); maybeStartHandoff(m.count); } else { $("lobbyTitle").textContent = "방 유지됨 — 방장이 곧 새 게임을 시작합니다…"; setScreen(SCREEN.LOBBY); } sendNick(); break; }
        if (isHost) { try { hostNames = JSON.parse(localStorage.getItem(STATE_KEY + "_n") || "{}"); } catch { hostNames = {}; } const g = loadState(); if (g) { G = g; broadcast(); } else { $("roomCode").textContent = m.code; $("lobbyCodeWrap").style.display = ""; $("lobbyTitle").textContent = "상대를 기다리는 중…"; setScreen(SCREEN.LOBBY); } }
        else { $("lobbyTitle").textContent = "재접속됨 — 동기화 중…"; setScreen(SCREEN.LOBBY); }
        sendNick(); break;
      case "rejoin-failed": clearSession(); onlineMode = false; isHost = false; myIndex = myCode = myToken = null; showMenuWithError(m.message || "재접속하지 못했습니다."); break;
      case "peer-reconnected": if (m.index != null) missingPeers.delete(m.index); restoreConn(); sendNick(); if (isHost && G) broadcast(); break;
      case "peer-disconnected": if (m.index != null) missingPeers.add(m.index); $("conn").innerHTML = "<span class='bad'>● 상대 접속 끊김 — 대기 중…</span>"; break;
      case "roster": $("rosterInfo").textContent = `${m.count} / ${m.capacity}명 입장`; if (handoffMode && isHost) maybeStartHandoff(m.count); break;
      case "nick": if (isHost) { hostNames[m.from] = (m.name || "").toString().trim().slice(0, 8); if (G) broadcast(); } break;
      case "chat": addChatMsg(m.name, m.text, false); break;
      case "goto": { const g = ROOM_GAMES.find((x) => x.key === m.game); if (g) { saveRoomHandoff(); intentionalNav = true; setTimeout(() => { location.href = handoffUrl(g.file); }, 60); } break; }
      case "peer-joined": if (isHost) newOnlineGame(); else setScreen(SCREEN.PLAYING); sendNick(); break;
      case "view": if (!isHost) { handoffMode = false; renderView(m.view); touchSession(); } break;
      case "act": if (isHost) applyAction(m.a); break;
      case "restart": if (isHost) newOnlineGame(); break;
      case "error": $("menuErr").textContent = m.message || "오류가 발생했습니다."; break;
      case "peer-left": clearSession(); showMenuWithError("상대가 나갔습니다. 새 방을 만들거나 다시 입장하세요."); break;
    }
  }

  let armed = false, lastBackAt = 0, toastTimer = null;
  function updateHistoryGuard(s) { const inGame = (s === SCREEN.PLAYING || s === SCREEN.LOBBY); if (inGame && !armed) { history.pushState({ g: 1 }, ""); armed = true; } else if (!inGame) armed = false; }
  function toast(msg) { let t = $("toast"); if (!t) { t = document.createElement("div"); t.id = "toast"; t.style.cssText = "position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:60;background:rgba(13,10,5,0.96);color:var(--parchment);border:1px solid var(--gold-deep);border-radius:999px;padding:10px 18px;font-size:13px;max-width:90vw;text-align:center;transition:opacity .2s;"; document.body.appendChild(t); } t.textContent = msg; t.style.opacity = "1"; clearTimeout(toastTimer); toastTimer = setTimeout(() => t.style.opacity = "0", 2200); }
  window.addEventListener("popstate", () => { if (!(screen === SCREEN.PLAYING || screen === SCREEN.LOBBY)) return; const now = Date.now(); if (now - lastBackAt < 2500) { clearSession(); if (ws) { try { ws.close(); } catch {} } armed = false; history.back(); return; } lastBackAt = now; history.pushState({ g: 1 }, ""); toast("한 번 더 ‘뒤로가기’를 누르면 나갑니다"); });
  window.addEventListener("pageshow", (e) => { if (e.persisted && onlineMode && (!ws || ws.readyState > WebSocket.OPEN)) connect(); });
  window.addEventListener("beforeunload", (e) => { if (intentionalNav) return; if (onlineMode && (screen === SCREEN.PLAYING || screen === SCREEN.LOBBY)) { e.preventDefault(); e.returnValue = ""; } });

  function initSeg(id, cb) { $(id).addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; [...$(id).children].forEach((c) => c.classList.remove("on")); b.classList.add("on"); cb(b.getAttribute("data-v")); }); }
  initSeg("segCount", (v) => { optCount = +v; });
  initSeg("segMode", (v) => { optMode = v; $("startSoloBtn").classList.toggle("hidden", v !== "solo"); $("onlineBox").classList.toggle("hidden", v !== "online"); if (v === "online" && (!ws || ws.readyState !== WebSocket.OPEN)) connect(); });
  $("startSoloBtn").addEventListener("click", startSolo);
  $("nickInput").value = myNick;
  $("nickInput").addEventListener("input", () => { myNick = $("nickInput").value.trim().slice(0, 8); try { localStorage.setItem("bg_nick", myNick); } catch {} });
  $("createBtn").addEventListener("click", () => { $("menuErr").textContent = ""; if (!ws || ws.readyState !== WebSocket.OPEN) { $("menuErr").textContent = "서버 연결 중… 잠시 후 다시 시도하세요."; connect(); return; } send({ type: "create", capacity: optCount, reconnect: true }); });
  $("joinBtn").addEventListener("click", () => {
    const code = $("codeInput").value.trim().toUpperCase();
    if (code.length !== 4) { $("menuErr").textContent = "4자리 코드를 입력하세요."; return; }
    if (!ws || ws.readyState !== WebSocket.OPEN) { $("menuErr").textContent = "서버 연결 중… 잠시 후 다시 시도하세요."; connect(); return; }
    $("menuErr").textContent = "";
    const s = getSession();
    if (s && s.code === code && s.token != null) { onlineMode = true; isHost = s.isHost; myIndex = s.index; myCode = s.code; myToken = s.token; $("lobbyTitle").textContent = "이전 게임에 재접속 중…"; $("lobbyCodeWrap").style.display = "none"; setScreen(SCREEN.LOBBY); send({ type: "rejoin", code: s.code, index: s.index, token: s.token }); }
    else send({ type: "join", code });
  });
  $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("joinBtn").click(); });
  $("copyBtn").addEventListener("click", () => { navigator.clipboard?.writeText($("roomCode").textContent).then(() => { const b = $("copyBtn"), o = b.textContent; b.textContent = "복사됨!"; setTimeout(() => b.textContent = o, 1200); }).catch(() => {}); });
  $("gameCodeWrap").addEventListener("click", () => { if (myCode) navigator.clipboard?.writeText(myCode).then(() => toast("코드 복사됨: " + myCode)).catch(() => {}); });
  $("cancelBtn").addEventListener("click", () => { clearSession(); if (ws) { try { ws.close(); } catch {} } onlineMode = false; isHost = false; myIndex = myCode = myToken = null; setScreen(SCREEN.MENU); connect(); });
  $("toMenuBtn").addEventListener("click", () => { if (!confirm("게임을 종료하고 게임 메뉴로 나갈까요?")) return; clearSession(); intentionalNav = true; const cur = new URLSearchParams(location.search); const q = new URLSearchParams(); if (cur.get("server")) q.set("server", cur.get("server")); if (cur.has("debug")) q.set("debug", cur.get("debug") || "1"); location.href = location.pathname + (q.toString() ? "?" + q.toString() : ""); });
  $("againBtn").addEventListener("click", () => { if (soloMode) startSolo(); else if (onlineMode) { if (isHost) newOnlineGame(); else send({ type: "restart", to: 0 }); } });

  const EMOJIS = ["👍", "😂", "😮", "😢", "🎉", "❤️"];
  let chatUnread = 0;
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function addChatMsg(name, text, mine) {
    const feed = $("chatFeed"); const d = document.createElement("div"); d.className = "cmsg" + (mine ? " mine" : "");
    d.innerHTML = `<b>${escapeHtml(name || "상대")}</b>${escapeHtml(text)}`; feed.appendChild(d);
    while (feed.children.length > 40) feed.removeChild(feed.firstChild); feed.scrollTop = feed.scrollHeight;
    if (!mine && $("chatPanel").classList.contains("hidden")) { chatUnread++; const b = $("chatBadge"); b.textContent = chatUnread > 9 ? "9+" : chatUnread; b.classList.remove("hidden"); }
  }
  function sendChat(text) { text = String(text).trim().slice(0, 60); if (!text || !myCode) return; send({ type: "chat", name: myNick, text }); addChatMsg(myNick || "나", text, true); }
  (function initChat() {
    const er = $("chatEmojis"); EMOJIS.forEach((e) => { const b = document.createElement("button"); b.className = "chatEmoji"; b.textContent = e; b.addEventListener("click", () => sendChat(e)); er.appendChild(b); });
    $("chatToggle").addEventListener("click", () => { const p = $("chatPanel"); const willOpen = p.classList.contains("hidden"); p.classList.toggle("hidden"); if (willOpen) { chatUnread = 0; $("chatBadge").classList.add("hidden"); } });
    $("chatClose").addEventListener("click", () => $("chatPanel").classList.add("hidden"));
    $("chatSend").addEventListener("click", () => { sendChat($("chatInput").value); $("chatInput").value = ""; });
    $("chatInput").addEventListener("keydown", (e) => { if (e.key === "Enter") { sendChat($("chatInput").value); $("chatInput").value = ""; } });
  })();

  const THIS_GAME = "sixnimmt";
  const ROOM_GAMES = [
    { key: "davinci",    file: "davinci.html",    label: "🔎 다빈치코드", min: 2, max: 4 },
    { key: "loveletter", file: "loveletter.html", label: "💌 러브레터",   min: 2, max: 4 },
    { key: "oncard",     file: "oncard.html",     label: "🃏 원카드",     min: 2, max: 4 },
    { key: "nothanks",   file: "nothanks.html",   label: "🙅 노땡스",     min: 2, max: 4 },
    { key: "themind",    file: "themind.html",    label: "🧠 더 마인드",  min: 2, max: 4 },
    { key: "sixnimmt",   file: "sixnimmt.html",   label: "🐂 젝스님트",   min: 2, max: 4 },
    { key: "setgame",    file: "setgame.html",    label: "🔺 세트",       min: 2, max: 4 },
    { key: "incan",      file: "incangold.html",  label: "💎 잉카의 황금", min: 2, max: 4 },
    { key: "hanabi",     file: "hanabi.html",     label: "🎆 하나비",     min: 2, max: 4 },
    { key: "baseball",   file: "baseball.html",   label: "🔢 숫자야구",   min: 2, max: 2 },
    { key: "grid",       file: "gridgames.html",  label: "🔷 격자 대전",  min: 2, max: 2 },
    { key: "battleship", file: "battleship.html", label: "🚢 배틀십",     min: 2, max: 2 },
  ];
  const ROOM_HANDOFF_MS = 90 * 1000;
  function roomCap() { return (G && G.count) || handoffCap || optCount || 2; }
  function isOnlineRoom() { return onlineMode && !!myCode && myIndex != null && myToken != null; }
  function saveRoomHandoff() { if (!isOnlineRoom()) return; try { localStorage.setItem("bg_room", JSON.stringify({ code: myCode, index: myIndex, token: myToken, cap: roomCap(), ts: Date.now() })); } catch {} }
  function getRoomHandoff() { try { const r = JSON.parse(localStorage.getItem("bg_room") || "null"); if (r && r.code && r.token != null && (Date.now() - r.ts) < ROOM_HANDOFF_MS) return r; } catch {} return null; }
  function clearRoomHandoff() { try { localStorage.removeItem("bg_room"); } catch {} }
  function handoffUrl(file) { const cur = new URLSearchParams(location.search); const q = new URLSearchParams(); q.set("room", "1"); if (cur.get("server")) q.set("server", cur.get("server")); if (cur.has("debug")) q.set("debug", cur.get("debug") || "1"); return file + "?" + q.toString(); }
  function gotoGame(key) { const g = ROOM_GAMES.find((x) => x.key === key); if (!g) return; if (missingPeers.size > 0) { toast("접속이 끊긴 사람이 있어 방을 유지할 수 없어요. 새 방을 만들어 주세요."); return; } saveRoomHandoff(); send({ type: "goto", game: key }); intentionalNav = true; setTimeout(() => { location.href = handoffUrl(g.file); }, 150); }
  function maybeStartHandoff(count) { if (!handoffMode || !isHost) return; if (count >= (handoffCap || 2)) { handoffMode = false; optCount = handoffCap || optCount; newOnlineGame(); sendNick(); } }
  function openGamePicker() {
    if (missingPeers.size > 0) { toast("접속이 끊긴 사람이 있어 방을 유지한 채 다른 게임을 시작할 수 없어요. 재접속을 기다리거나 새 방을 만들어 주세요."); return; }
    const cap = roomCap();
    const list = ROOM_GAMES.filter((g) => g.key !== THIS_GAME && cap >= g.min && cap <= g.max);
    const box = $("gamePicker"); box.innerHTML = "";
    list.forEach((g) => { const b = document.createElement("button"); b.textContent = g.label; b.style.cssText = "background:linear-gradient(180deg,var(--warm-bg2),var(--warm-bg));border:1px solid var(--warm-border);color:var(--parchment);font-weight:700;"; b.addEventListener("click", () => gotoGame(g.key)); box.appendChild(b); });
    const cancel = document.createElement("button"); cancel.textContent = "취소"; cancel.style.cssText = "background:transparent;border:1px solid var(--warm-border);color:var(--muted);"; cancel.addEventListener("click", () => { box.classList.add("hidden"); $("otherGameBtn").classList.remove("hidden"); $("againBtn").classList.remove("hidden"); });
    box.appendChild(cancel); box.classList.remove("hidden");
    $("otherGameBtn").classList.add("hidden"); $("againBtn").classList.add("hidden");
  }
  $("otherGameBtn").addEventListener("click", openGamePicker);

  setScreen(SCREEN.MENU);
  connect();

  if (location.search.includes("debug")) {
    window.__sn = () => ({ screen, soloMode, onlineMode, isHost, myIndex, myCode, G, lastView, handoffMode, intentionalNav, missing: missingPeers.size });
    window.__snact = (a) => dispatch(a);
    window.__goto = (k) => gotoGame(k);
    window.__st = () => ({ screen, isHost, myIndex, myCode, handoffMode, intentionalNav });
  }
})();
</script>
</body>
</html>
